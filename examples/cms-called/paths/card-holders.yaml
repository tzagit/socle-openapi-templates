/card-holders/{id}:
  get:
    operationId: getCardHoldersById
    summary: Retrieve information of a cardholder
    parameters:
      - name: id
        in: path
        description: >-
          Technical identifier of the cardholder in the banking system.<br>This identifier is provided during the
          subscription by the bank.<br>Afterwards, it is used by the CMS to retrieve the cardholder data from the bank.
        required: true
        schema:
          description: >-
            Cardholder Id<br>Technical identifier of the cardholder in the banking system.<br>This identifier is
            provided during the subscription by the bank.<br>Afterwards, it is used by the CMS to retrieve the
            cardholder data from the bank.
          type: string
          pattern: ^[0-9a-zA-Z\-]{1,36}$
    responses:
      '200':
        description: CardHolder OK
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CardholderRes'
    tags:
      - Get data
