                        (AAAA-MM-JJTHH:MM:SS) en UTC
                      type: string
                      format: date-time
                      example: '2025-06-28T15:04:34'
                    isSuccessful:
                      description: >-
                        Was the connection successful ?<br>Indicateur permettant d'indiquer si la connexion a été
                        réalisée avec succès
                      type: boolean
                      example: true
                    authenticationMethod:
                      $ref: '#/components/schemas/AuthenticationMethod'
                    device:
                      $ref: '#/components/schemas/Device'
              additionalProperties: false
              required:
                - isPaymentWallet
                - walletType
                - authenticationMean
                - dateTime
