                  type: string
                  example: APAY
                  enum:
                    - APAY
                    - CPAY
                    - GPAY
                    - GRAY
                    - MAMA
                    - MTOK
                    - OPAY
                    - RECP
                    - SPAY
                    - WPAY
                  x-enumDescriptions:
                    APAY: Apple Pay
                    CPAY: Click To Pay
                    GPAY: GooglePay
                    GRAY: Garmin Pay
                    MAMA: Masterpass by Mastercard
                    MTOK: Merchant scheme tokenization indicator
                    OPAY: Open Payment
                    RECP: Remote commerce programs
                    SPAY: Samsung Pay
                    WPAY: Wero Pay
                enrolmentChannel:
                  description: >-
                    Indicates the channel through which the card was enrolled into the digital wallet.<br>Indique le
                    canal par lequel la carte a été enrôlée dans le wallet numérique<br>APBA : enrolment from the
                    banking application<br>APWA : enrolment from the wallet application
                  type: string
                  example: APBA
                  enum:
                    - APBA
                    - APWA
                  x-enumDescriptions:
                    APBA: enrolment from the banking application
                    APWA: enrolment from the wallet application
                phoneNumber:
                  description: >-
                    Phone number with usage and security tag<br>Indique le numéro de telephone utilisé lors de
                    l'enrôlement
                  type: object
                  example:
                    phoneNumber: '+33602030405'
                    phoneUsage: PRIV
                    securedPhoneIndicator: true
