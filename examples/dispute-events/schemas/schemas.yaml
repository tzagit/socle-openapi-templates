                dateTime:
                  description: >-
                    Date time on which the payment was authenticated.<br>Date et heure auxquelles le paiement a été
                    authentifié (AAAA-MM-JJTHH:MM:SS) en UTC
                  type: string
                  format: date-time
                  example: '2025-05-29T09:04:34'
                mean:
                  description: >-
                    Strong authentication mean used by the customer to authorise the transacton.<br>Authentification
                    forte utilisée par le client afin d'autoriser la transaction<br>OTHE : OTHER<br>DKEY :
                    DIGITAL_KEY<br>OTPW : OTP<br>CYPA : CYBER_PASS<br>CERT : CERTIFICATE
                  type: string
                  example: OTPW
                  enum:
                    - CERT
                    - CYPA
                    - DKEY
                    - OTHE
                    - OTPW
                  x-enumDescriptions:
                    CERT: Certificate
                    CYPA: Cyber pass
                    DKEY: Digital key
                    OTHE: Other
                    OTPW: OTP
                method:
                  $ref: '#/components/schemas/AuthenticationMethod'
                isSuccessful:
                  description: >-
                    Was the payment authentification successful ?<br>Indicateur permettant d'indiquer si
                    l'authentification de paiement a été réalisée avec succès
                  type: boolean
                  example: true
                device:
                  description: Objet contenant les informations du device
                  type: object
                  additionalProperties: false
                  properties:
                    id:
                      description: >-
                        Technical identifier of the device, enabling its unique identification within the
                        system<br>Identifiant technique du terminal utilisé, permettant de l’identifier de manière
                        unique dans le système
                      type: string
                      example: A8F5F167F44F4964E6C998DEE827110C
                      pattern: ^[0-9A-Za-z]{1,64}$
                    friendlyName:
                      description: Terminal name<br>Nom affecté à l'appareil par l'utilisateur
                      type: string
                      example: Mon Galaxy
                      maxLength: 255
                      minLength: 1
                    deviceTechnicalName:
                      description: Technical name of the device<br>Nom technique de l'appareil
                      type: string
                      example: Galaxy S23 Ultra (SM-S918B)
                      maxLength: 255
                      minLength: 1
                    trustTerminalIndicator:
                      description: Trust terminal indicator<br>Indicateur terminal de confiance (true / false)
                      type: boolean
                      example: true
                    operatingSystem:
                      description: Terminal operating system<br>OS (système d'exploitation) de l'appareil
                      type: string
                      example: Android X.xx
                      maxLength: 255
                      minLength: 1
                    ipAddress:
                      description: IP Address<br>Adresse IP associée au terminal utilisé lors de l’opération
                      type: string
                      example: 123.456.7.89
                      maxLength: 45
                      minLength: 4
                    city:
                      description: City associated with the device<br>Ville associée au terminal utilisé lors de l’opération
                      type: string
                      example: Charenton-Le-Pont
                      maxLength: 70
                      minLength: 1
                    type:
                      description: Device type<br>Type d'appareil<br>La nomenclature sera definie ulteieurement
                      type: string
                      example: '00'
                      maxLength: 2
                      minLength: 1
                  required:
                    - id
                    - type
              additionalProperties: false
          lastOnlineBankingConnection:
            description: Connexion bancaire en ligne la plus proche de la date de paiement contesté
            type: object
            additionalProperties: false
            properties:
              dateTime:
                description: Banking connection date time<br>Date et heure de la derniere connexion (AAAA-MM-JJTHH:MM:SS) en UTC
                type: string
                format: date-time
              isSuccessful:
                description: >-
                  Was the connection successful ?<br>Indicateur permettant d'indiquer si la connexion a été réalisée
                  avec succès
                type: boolean
              authenticationMethod:
                $ref: '#/components/schemas/AuthenticationMethod'
              device:
                $ref: '#/components/schemas/Device'
          lastPersonalInformationChange:
            description: Détail des informations modifiées par l'utilisateur
            type: object
            additionalProperties: false
            properties:
              changeDateTime:
                description: Date time of the change<br>Date et heure de la modification (AAAA-MM-JJTHH:MM:SS) en UTC
                type: string
                format: date-time
                example: '2025-06-28T15:04:34'
              channel:
                description: >-
                  Indicates the channel through which the customer’s authentication device enrollment was
                  performed<br>Indique le canal via lequel la modification a été réalisée
                type: string
                example: MAIL
                enum:
                  - CALL
                  - INAP
                  - MAIL
                  - OTHR
                  - WEBB
                x-enumDescriptions:
                  CALL: Call Center
                  INAP: In-App Banking
                  MAIL: Postal Mail
                  OTHR: Other
                  WEBB: Web Banking
              email:
                description: >-
                  email address<br>Adresse e-mail modifiée (alimenté uniquement si le changement concerne une
                  modification de l'adresse mail)
                type: string
                format: email
                example: some.email@example.com
              phoneNumber:
                description: >-
                  phone number<br>Numéro de télephone modifié (alimenté uniquement si le changement concerne une
                  modification du numéro)
                type: string
                example: '+33602030405'
                pattern: ^\+(\d{1,3})[-\s]?(\d{1,3})[-\s]?(\d{6,10})$
              device:
                description: Objet contenant les informations du device
                type: object
                additionalProperties: false
                properties:
                  id:
                    description: >-
                      Technical identifier of the device, enabling its unique identification within the
                      system<br>Identifiant technique du terminal utilisé, permettant de l’identifier de manière unique
                      dans le système
                    type: string
                    example: A8F5F167F44F4964E6C998DEE827110C
                    pattern: ^[0-9A-Za-z]{1,64}$
                  friendlyName:
                    description: Terminal name<br>Nom affecté à l'appareil par l'utilisateur
                    type: string
                    example: Mon Galaxy
                    maxLength: 255
                    minLength: 1
                  deviceTechnicalName:
                    description: Technical name of the device<br>Nom technique de l'appareil
                    type: string
                    example: Galaxy S23 Ultra (SM-S918B)
                    maxLength: 255
                    minLength: 1
                  trustTerminalIndicator:
                    description: Trust terminal indicator<br>Indicateur terminal de confiance (true / false)
                    type: boolean
                    example: true
                  operatingSystem:
                    description: Terminal operating system<br>OS (système d'exploitation) de l'appareil
                    type: string
                    example: Android X.xx
                    maxLength: 255
                    minLength: 1
                  ipAddress:
                    description: IP Address<br>Adresse IP associée au terminal utilisé lors de l’opération
                    type: string
                    example: 123.456.7.89
                    maxLength: 45
                    minLength: 4
                  city:
                    description: City associated with the device<br>Ville associée au terminal utilisé lors de l’opération
                    type: string
                    example: Charenton-Le-Pont
                    maxLength: 70
                    minLength: 1
                  type:
                    description: Device type<br>Type d'appareil<br>La nomenclature sera definie ulteieurement
                    type: string
                    example: '00'
                    maxLength: 2
                    minLength: 1
                required:
                  - id
          consistencyScore:
            description: >-
              Authentication method usage consistency score.<br>Score déterminant la cohérence de l'utilisateur dans
              l'utilisation de la méthode d'authentification <br>BIOB : le client a utilisé la biométrie pour
              authentifier le paiement contesté, comme pour tous les autres paiements précédents.<br>BIOC : le client a
              utilisé la biométrie pour authentifier le paiement contesté, tandis que certains paiements précédents ont
              été validés par code.<br>CODE : Le client a utilisé le code pour authentifier le paiement contesté
              (l'opération précédente avec le code n'a pas été contestée).<br>CODB : Le client a utilisé le code pour
              authentifier le paiement contesté et a validé le paiement précédant celui qu'il conteste à l'aide de la
              biométrie.<br>CODC : Le client a utilisé le code pour authentifier le paiement contesté et a validé le
              paiement précédant celui qu'il conteste à l'aide du même code.
            type: string
            example: BIOB
            enum:
              - BIOB
              - BIOC
              - CODB
              - CODC
              - CODE
            x-enumDescriptions:
              BIOB: >-
                The customer used biometrics to authenticate the disputed payment, just like all the other previous
                payments.
              BIOC: >-
                The customer used biometrics to authenticate the disputed payment, while some previous payments were
                validated by code.
              CODB: >-
                The customer used the code to authenticate the disputed payment and validated the payment preceding the
                one they are disputing with biometrics.
              CODC: >-
                The customer used the code to authenticate the disputed payment and validated the payment preceding the
                one they are disputing with the PIN, which has been disputed.
              CODE: >-
                The customer used the code to authenticate the disputed payment (previous operation with code was not
                disputed).
          strengthScore:
            description: >-
              Authentication method robustness score.<br>Score déterminant la robustesse de l'authentification forte en
              fonction des moyens utilisés.<br>TTBI : avec le terminal sécurisé et la biométrie.<br>BIOO : avec la
              biométrie uniquement.<br>TTPI : avec le terminal sécurisé et le code PIN.<br>PINO : avec le code PIN
              uniquement.<br>CRDM : avec la méthode du lecteur de carte.<br>TTSM : avec le terminal sécurisé et le
              SMS.<br>SMSO : avec le SMS uniquement.<br>OTHR : tous les autres cas.
            type: string
            example: TTBI
            enum:
              - BIOO
              - CRDM
              - OTHR
              - PINO
              - SMSO
              - TTBI
              - TTPI
              - TTSM
            x-enumDescriptions:
              BIOO: with biometrics only
              CRDM: with the card reader method
              OTHR: all other cases
              PINO: with the PIN code only
              SMSO: with SMS only
              TTBI: with the trusted terminal and biometrics
              TTPI: with the trusted terminal and the PIN code
              TTSM: with the trusted terminal and SMS
          isUsualIpAddress:
            description: >-
              Is true, if the ip address of the disputed transaction has already been used for at least two non-disputed
              transactions.<br>Indicateur permettant d'indiquer si l'adresse ip associée à la transaction contestée a
              déjà été utilisée pour au moins deux transactions non contestées
            type: boolean
            example: true
        additionalProperties: false
        required:
          - identification
          - disputeCaseId
          - strengthScore
