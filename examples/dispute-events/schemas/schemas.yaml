              example:
                phoneNumber: '+33602030405'
                phoneUsage: PRIV
                securedPhoneIndicator: true
          walletCardEnrolmentList:
            type: array
            items:
              type: object
              description: Liste des enrôlements carte dans des wallets de paiement mobile
              properties:
                isPaymentWallet:
                  description: >-
                    Indicates whether this wallet corresponds to the one used for the payment associated with the
                    transaction<br>Indique si ce wallet correspond à celui utilisé lors du paiement associé à la
