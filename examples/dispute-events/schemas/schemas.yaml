CBDisputeEvent:
  description: Objet racine - Evenement suite à l'intégration d'un evenement litige
  type: object
  properties:
    disputeCase:
      description: objet contenant les données sur le dossier de contestation
      type: object
      additionalProperties: false
      properties:
        id:
          description: Dispute Case reference<br>Identifiant du dossier de Contestation attribué par le Processeur
          type: string
          example: S102072507285324
          pattern: ^[0-9A-Za-z]{16}$
      required:
        - id
    card:
      description: objet contenant les données carte
      type: object
      additionalProperties: false
      properties:
        encryptedPrimaryAccountNumber:
          description: >-
            encrypted pan<br>Numéro de carte (PAN) chiffré.<br>Le chiffrement respecte le standard JWE. Une fois
            déchiffrée la donnée représente un PAN, sous forme d'une chaine de 16 à 19 caractères numériques.
          type: string
          example: >-
            eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiYWRtaW4iOnRydWV9.dyt0CoTl4WoVjAHI9Q.wSKhl6d_9rhM3NrXuJttkao.k_CwSKhwcCI6IktZSI6
          pattern: ^[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]*\.[A-Za-z0-9_-]*\.[A-Za-z0-9_-]+$
        primaryAccountNumberId:
          description: Primary Account Number ID<br>Identifiant de substitution du PAN (PAN Id)
          type: string
          format: uuid
          example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
        maskedPrimaryAccountNumber:
          description: Masked Primary Account Number<br>Numéro de carte (PAN) caviardé
          type: string
          example: 1234 45XX XXXX 1234
          maxLength: 30
          minLength: 1
        productCode:
          description: Product Code<br>Code produit carte défini au niveau du CMS
          type: string
          example: 2I
          maxLength: 50
          minLength: 1
      required:
        - primaryAccountNumberId
        - maskedPrimaryAccountNumber
        - productCode
    transaction:
      description: objet contenant plusieurs données liées à la transaction
      type: object
      additionalProperties: false
      properties:
        identification:
          description: objet contenant les informations pour l'identification de la transaction
          type: object
          additionalProperties: false
          properties:
            reference:
              description: >-
                Transaction Reference<br>Identifiant unique de transaction attribué par le Processeur (COIDOP) et fourni
                dans les événements alimentant les historiques.
              type: string
              example: R20250719FOND1029
              maxLength: 35
              minLength: 1
        context:
          description: objet contenant le contexte de la transaction
          type: object
          additionalProperties: false
          properties:
            schemeNature:
              $ref: '#/components/schemas/SchemeNature2'
          required:
            - schemeNature
    eventProcessing:
      description: objet contenant plusieurs données liées à l'évenement
      type: object
      additionalProperties: false
      properties:
        nature:
          description: Event processing nature, text explaination of the step in  processing data.<br>type d'evenement litige
          type: string
          example: Réception représentation
          maxLength: 50
          minLength: 1
        statusCode:
          description: Stautus code of the event<br>Status code of the event
          type: string
          example: TBPR
          enum:
            - TBPR
            - TERM
            - WAIT
          x-enumDescriptions:
            TBPR: To be processed
            TERM: Terminated
            WAIT: Waiting
        localDateTime:
          description: Date of the event<br>date de l'évenement (AAAA-MM-JJTHH:MM:SS) en UTC
          type: string
          format: date-time
          example: '2025-08-30T16:56:23'
        amount:
          description: Amount of the event<br>Montant et devise de la transaction
          type: object
          example:
            amount: '50.50'
            currency: '978'
          properties:
            amount:
              type: string
              pattern: ^\-?[0-9]{1,18}(\.?[0-9]{0,5})?$
            currency:
              type: string
              pattern: ^[0-9]{3}$
          required:
            - amount
            - currency
        manualIndicator:
          description: Manual indicator<br>indique si l'evenement est manuel (true/false)
          type: boolean
          example: false
      required:
        - nature
        - statusCode
        - localDateTime
        - amount
        - manualIndicator
    chargeback:
      description: objet contenant plusieurs données liées à l'impayé
      type: object
      additionalProperties: false
      properties:
        id:
          description: 'Chargeback id<br>pour CB : REF_IMPAYE de LED<br>pour VISA VCR_CASE_NUM<br>pour MC : Claim Id'
          type: string
          example: '1638125042'
          maxLength: 19
          minLength: 1
        reasonCode:
          description: Reason code of the chargeback<br>Code du motif impayé
          type: string
          example: '10.2'
          maxLength: 6
          minLength: 1
        reasonLabel:
          description: Label of the reason of the chargeback<br>Libellé du motif impayé
          type: string
          example: Transfert de responsabilité EMV- Carte Perdue/Volée
          maxLength: 255
          minLength: 1
        acquirerInstitutionId:
          description: Bank Institution Identifier<br>Code banque acquéreur
          type: string
          example: '30056'
          maxLength: 5
          minLength: 1
        bankTransferDate:
          description: Date of the acquiring bank's transfer<br>Date du virement (AAAA-MM-JJTHH:MM:SS) en UTC
          type: string
          format: date-time
          example: '2025-08-30T16:56:23'
        representmentReasonCode:
          description: Reason code of the representment<br>Code du motif de répresentation
          type: string
          example: '4807'
          pattern: ^[0-9A-Za-z]{1,6}$
    processing:
      description: objet contenant plusieurs données liées au traitement de l'évenement
      type: object
      additionalProperties: false
      properties:
        unboundEventIndicator:
          description: Unbound event indicator<br>Indicateur de non rapprochement (true/false)
          type: boolean
          example: true
        unboundEventReason:
          description: Unbound event reason<br>Raison du non rapprochement
          type: string
          example: Opération inexistante dans les dossiers
          maxLength: 255
          minLength: 1
        incompatibilityEventIndicator:
          description: Incompatibility event indicator<br>Indicateur d'incompatibilité (true/false)
          type: boolean
          example: true
        incompatibilityEventReason:
          description: Incompatibility event resaon<br>Raison d'incompatibilité (dossier clos, …)
          type: string
          example: dossier clos
          maxLength: 255
          minLength: 1
      required:
        - unboundEventIndicator
        - incompatibilityEventIndicator
