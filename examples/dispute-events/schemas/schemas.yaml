                  Commerce Security Level Indicator (valorisation dans la documentation de référence)<br><br>non
                  renseignée pour les transactions domestiques
                type: string
                example: '8'
                maxLength: 20
                minLength: 1
              regulatoryAndTechnicalEnvironment:
                description: >-
                  Regulatory and technical environment<br>Environnement réglementaire et technique de la
                  transaction.<br>Renseignée pour les transactions domestiques CB uniquement
                type: string
                example: '70'
                pattern: ^[0-9A-Za-z]{2}$
              cardDataEntryMode:
                $ref: '#/components/schemas/CardDataEntryMode'
              electronicCommerceAuthenticationNature:
                $ref: '#/components/schemas/ElectronicCommerceAuthenticationNature'
              serviceAttribute:
                description: Service attribute<br>Type de facture procédure
                type: string
                enum:
                  - ADCH
                  - AGRE
                  - AITC
                  - AITF
                  - AITI
                  - AITP
                  - ARES
                  - CCPU
                  - CCUP
                  - CDSM
                  - CHDS
                  - DBTR
                  - DREC
                  - FREC
                  - GUAR
                  - INST
                  - IRES
                  - MPFP
                  - NOSH
                  - PAUT
                  - PRES
                  - RPUN
                  - UNSN
                x-enumDescriptions:
                  ADCH: Additional charges
                  AGRE: Aggregation
                  AITC: Acceptor Initiated Transaction following an internet CIT
                  AITF: Acceptor Initiated Transaction following a face-to-face or an unattended CIT
                  AITI: Acceptor Initiated Transaction following an internet CIT
                  AITP: Acceptor Initiated Transaction following a face-to-face or an unattended CIT
                  ARES: Additionnal Payment or charges
                  CCPU: Crypto-currency purchase
                  CCUP: Crypto Currency Purchase
                  CDSM: Cardholder data storage on merchant file
                  CHDS: Cardholder data storage on merchant file
                  DBTR: Debt recovery
                  DREC: Debt Recovery
                  FREC: First Recurring
                  GUAR: Guarantee
                  INST: Instalment
                  IRES: Initial Reservation or Pre-authorisation
                  MPFP: Multiple payment, first payment
                  NOSH: No-show
                  PAUT: Pre-authorisation
                  PRES: Payment after Reservation or Aggregation
                  RPUN: Recurring payment, unknown sequence number
                  UNSN: Recurring payment, unknown sequence number (reserved for international incoming flow)
              acceptanceModeLabel:
                description: Acceptance mode label<br>Mode d'acceptation de la transaction (re-calculé par le processeur)
                type: string
                example: Internet sécurisé (50)
                maxLength: 255
                minLength: 1
              clearingRoute:
                $ref: '#/components/schemas/ClearingRoute'
              qualifScheme:
                $ref: '#/components/schemas/QualifScheme'
            required:
              - manualIndicator
              - scoringEligibilityIndicator
              - schemeNature
          merchant:
            description: données liées au marchand
            type: object
            additionalProperties: false
            properties:
              merchantName:
                description: Merchant Name used by all acquisition services.<br>Raison sociale du commerçant
                type: string
                example: PIZZA WEB
                maxLength: 70
                minLength: 1
              merchantCategoryCode:
                description: Merchant Category Code<br>indique le type d'activité du commerçant
                type: string
                example: '5812'
                pattern: ^[0-9]{4}$
              officialPostalAddress:
                $ref: '#/components/schemas/OfficialPostalAddress'
            required:
              - merchantName
              - officialPostalAddress
        additionalProperties: false
        required:
          - identification
          - totalAmount
          - feesAmount
          - disputeTechnicalInternalId
          - disputeAuditTrailTransactionEligibilityIndicator
      maxItems: 100
      minItems: 1
    deletedTransactionList:
      type: array
      items:
        type: object
        description: liste des opérations carte détachées du dossier
        properties:
          identification:
            description: données d'identification de la transaction
            type: object
            additionalProperties: false
            properties:
              reference:
                description: Transaction Reference<br>Identifiant unique de transaction attribué par le Processeur (COIDOP)
                type: string
                example: R20250719FOND1029
                maxLength: 35
                minLength: 1
            required:
              - reference
        additionalProperties: false
        required:
          - identification
      maxItems: 100
      minItems: 1
  additionalProperties: false
  required:
    - disputeCase
    - issuer
    - card
    - cardholder
  title: DMUpdatedCase
DMUpdatedCaseAdvancement:
  description: Objet racine - Evenement de changement de statut d'un dossier de contestation
  type: object
  properties:
    disputeCase:
      description: Dossier de contestation
      type: object
      additionalProperties: false
      properties:
        id:
          description: Dispute Case reference<br>Identifiant du dossier de Contestation attribué par le Processeur
          type: string
          example: E102072506033789
          pattern: ^[0-9A-Za-z]{16}$
        advancement:
          description: Avancement du dossier
          type: object
          additionalProperties: false
          properties:
            code:
              description: Case Advancement Code<br>indique le code d'avancement du dossier
              type: string
              example: COMP
              enum:
                - ANLY
                - AWCD
                - CLOS
                - COMP
                - DERM
                - INCO
                - PURG
                - RECA
                - REOP
              x-enumDescriptions:
                ANLY: Analysed
                AWCD: Awaiting client document
                CLOS: Closed
                COMP: Complete
                DERM: Decided recovery methods
                INCO: Incomplete
                PURG: Purge
                RECA: Acquirer recovered
                REOP: Reopened
            level:
              description: Case Advancement level<br>indique le niveau d'avancement du dossier
              type: string
              example: '30'
              pattern: ^[0-9]{1,2}$
          required:
            - code
            - level
        statusUpdateDateTime:
          description: Update date time of the status<br>Date de changement de status (AAAA-MM-JJTHH:MM:SS) en UTC
          type: string
          format: date-time
          example: '2025-07-28T15:04:34'
        taskAdvancement:
          description: Task Advancement<br>Précision sur l'avancement du dossier
          type: string
          example: Complet
          maxLength: 255
          minLength: 1
        additionalData:
          description: Additional data<br>Informations supplémentaires
          type: object
          example:
            value: Le client ne veut pas mettre en opposition la carte CB
          properties:
            value:
              type: string
              maxLength: 3000
              minLength: 1
        reclamationIndicator:
          description: >-
            Indicator of customer's reclamation <br>Indicateur pour les cas de réclamation (true/false) <br>true : la
            demande a fait l'objet d'une réclamation<br>false : la demande n'a pas fait l'objet d'une réclamation
          type: boolean
          example: false
        statusChangeReason:
          description: Reason of the change status<br>Raison du changement de statut
          type: string
          example: FOCO
          enum:
            - ALDR
            - ALRD
            - APFC
            - AUAN
            - AUCL
            - AUFC
            - AUPU
            - FOCO
            - MAAN
            - MACL
            - MAFC
            - MARE
            - RECL
          x-enumDescriptions:
            ALDR: All disputes resolved
            ALRD: All recovrement decided
            APFC: API Folder Creation
            AUAN: Automatic analysis
            AUCL: Automatic Closure
            AUFC: Automatic Folder Creation
            AUPU: Automatic purge
            FOCO: Folder completion
            MAAN: Manual Analysis
            MACL: Manual Closure
            MAFC: Manual Folder Creation
            MARE: Manual reopening
            RECL: Reclamation
      required:
        - id
        - advancement
        - statusUpdateDateTime
  additionalProperties: false
  required:
    - disputeCase
  title: DMUpdatedCaseAdvancement
DMOperationDecision:
  description: >-
    Objet racine - Evenement des décisions prises sur l'analyse ou sur le mode recouvrement des opérations d'un dossier
    de contestation
  type: object
  properties:
    disputeCase:
      description: Dossier de contestation
      type: object
      additionalProperties: false
      properties:
        id:
          description: Dispute Case reference<br>Identifiant du dossier de Contestation attribué par le Processeur
          type: string
          example: S102072507285324
          pattern: ^[0-9A-Za-z]{16}$
        refundDecisionCode:
          description: Decision of the dispute<br>Décision sur l'analyse du dossier
          type: string
          example: NORE
          enum:
            - DERM
            - NORE
            - PARE
            - RFDB
          x-enumDescriptions:
            DERM: Decided recovery methods
            NORE: Non refundable
            PARE: Partially refundable
            RFDB: Refundable
        decisionDateTime:
          description: Decision date time<br>Date et heure de la décision (AAAA-MM-JJTHH:MM:SS) en UTC
          type: string
          format: date-time
          example: '2025-07-28T15:04:34'
        scoringEligibilityIndicator:
          description: >-
            Indicator used to determine whether the case must be submitted to a prescore calculation<br>Indicateur
            permettant de déterminer si le dossier doit être soumis à un calcul de prescore
          type: boolean
          example: true
        scoringStatus:
          $ref: '#/components/schemas/ScoringStatus2'
      required:
        - id
        - refundDecisionCode
        - decisionDateTime
        - scoringEligibilityIndicator
    cardholderInsuredIndicator:
      description: Insured indicator<br>Indicateur porteur assuré
      type: boolean
      example: true
    insurance:
      description: Données relatives à l'assurance
      type: object
      additionalProperties: false
      properties:
        cardPackageCode:
          description: Card Package Code<br>Code forfait carte
          type: string
          example: Bouquet liberté
          maxLength: 255
          minLength: 1
        contractNumber:
          description: Insurance Contract Number<br>Numéro de contrat assurance
          type: string
          example: '979394605'
          maxLength: 255
          minLength: 1
        subscriptionDateTime:
          description: >-
            Insurance subscriptiuon date (YYYY-MM-DDThh:mm:ss)<br>Date de souscription à l'assurance
            (AAAA-MM-JJTHH:MM:SS) en UTC
          type: string
          format: date-time
          example: '2025-07-28T15:04:34'
    transactionAnalysisList:
      type: array
      items:
        type: object
        description: Liste des opérations carte contestées
        properties:
          identification:
            description: Données d'identification de la transaction
            type: object
            additionalProperties: false
            properties:
              reference:
                description: >-
                  Transaction Reference<br>Identifiant unique de transaction attribué par le Processeur (COIDOP) et
                  fourni dans les événements alimentant les historiques
                type: string
                example: R20250719FOND1029
                maxLength: 35
                minLength: 1
            required:
              - reference
          totalAmount:
            $ref: '#/components/schemas/TotalAmount'
          refundIndicator:
            description: Refund indicator<br>indique si la transaction est remboursée (true/false)
            type: boolean
            example: false
          nonrefundReasonCode:
            description: >-
              Code reason of the nonrefund of the dispute<br>Code motif Banque de France de raison du refus de
              remboursement
            type: string
            example: HAB
            pattern: ^[0-9A-Za-z]{3}$
          nonrefundReasonLabel:
            description: Resaon of the nonrefund of the dispute<br>indique la raison du refus de remboursement
            type: string
            example: Escroquerie commerçant - HAB
            maxLength: 255
            minLength: 1
          nonrefundReasonTechnicalInternalId:
            description: >-
              Technical internal reference of the nonrefund of the dispute<br>Identifiant technique interne du motif de
              refus de remboursement
            type: string
            example: '5001'
            pattern: ^[0-9]{1,19}$
          recoveryMode:
            description: Recovey mode of the dispute<br>Mode de recouvrement
            type: string
            example: NORE
            enum:
              - ACQU
              - AUTA
              - CLDE
              - INSU
              - ISSU
              - NORE
            x-enumDescriptions:
              ACQU: Acquirer
              AUTA: Automatic acquirer
              CLDE: Client debit
              INSU: Insurance
              ISSU: Issuer
              NORE: Non recovered
          context:
            description: Contexte de la transaction analysée
            type: object
            additionalProperties: false
            properties:
              manualIndicator:
                description: >-
                  Manual indicator<br>indique que la transaction a été ajoutée via une saisie manuelle (et non pas par
                  une recherche - cas d'une transaction non disponible dans l'historique)<br>false: Transaction  non
                  saisie manuellement<br>true: Transaction saisie manuellement
                type: boolean
                example: false
              scoringEligibilityIndicator:
                description: >-
                  Indicator used to determine whether the transaction must be submitted to a prescore
                  calculation<br>Indicateur permettant de déterminer si la transaction doit être soumise à un calcul de
                  prescore
                type: boolean
                example: true
              disputePrescore:
                description: Données préscore du dossier de contestation
                type: object
                additionalProperties: false
                properties:
                  scoringStatus:
                    $ref: '#/components/schemas/ScoringStatus'
                  scoreLabelling:
                    $ref: '#/components/schemas/ScoreLabelling'
                  labellingDateTime:
                    description: Labelling date time<br>Date de labélisation (AAAA-MM-JJTHH:MM:SS) en UTC
                    type: string
                    format: date-time
                    example: '2025-07-28T15:04:34'
            required:
              - manualIndicator
              - scoringEligibilityIndicator
        additionalProperties: false
        required:
          - identification
          - totalAmount
      maxItems: 100
      minItems: 1
  additionalProperties: false
  required:
    - disputeCase
  title: DMOperationDecision
