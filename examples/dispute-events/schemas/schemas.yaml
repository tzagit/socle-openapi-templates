                type: string
                format: date-time
                example: '2025-06-28T15:04:34'
              lastPostalAddressDuration:
                description: >-
                  Duration between the date of postal address change and the date of the disputed
                  transaction<br>Intervalle de durée  entre le dernier changement d'adresse et la contestation -
                  P(n)Y(n)M(n)DT(n)H(n)M(n)S en ISO8601
                type: string
                example: P30DT11H9M8S
              numberOfAdvisorCalls:
                description: >-
                  Number of phone calls with an advisor in the 2 months preceding disputed payment<br>Nombre d'appels
