                minLength: 1
              localDateTime:
                description: Date Time in local region<br>Date et heure de la transaction (AAAA-MM-JJTHH:MM:SS) en UTC
                type: string
                format: date-time
                example: '2025-07-28T19:04:34'
            required:
              - localDateTime
          disputeCaseId:
            description: 'Dispute Case reference<br>Identifiant du dossier de contestation - origine : processeur'
            type: string
            example: S102072507285324
            pattern: ^[0-9A-Za-z]{16}$
          auditTrail:
            description: Objet contenant les données piste d'audit associées à la transaction
            type: object
            additionalProperties: false
            properties:
              numberOfSecurePayments:
                description: >-
                  Number of autorised operation<br>Nombre de transactions sécurisées (i.e :  validées sur le  téléphone)
                  comptabilisées au cours des X derniers mois
                type: string
                example: '36'
                pattern: ^[0-9]{1,5}$
              numberOfSecurePaymentsDuration:
                description: >-
                  Duration used to count the number of autorised operation<br>Période surveillée pour le nombre de
                  transactions remontées au cours des X derniers mois
                type: string
                example: P2M4DT11H9M8S
              numberOfUndisputedSecurePayments:
                description: >-
                  Count of undisputed operation<br>Nombre de transactions, sécurisées, non contestées au cours des X
                  derniers mois
                type: string
                example: '34'
                pattern: ^[0-9]{1,5}$
              numberOfUndisputedSecurePaymentsDuration:
                description: >-
                  Duration used to count the number of undisputed operation<br>Période surveillée pour le nombre de
                  transactions non contestées au cours des X derniers mois
                type: string
                example: P2M4DT11H9M8S
              strongAuthenticationFamiliarity:
                description: >-
