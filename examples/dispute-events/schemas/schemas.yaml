# Généré par tools/import.mjs — dé-factorisé depuis un OpenAPI existant.
DMCreatedCase:
  description: Objet racine - Evenement de création d'un dossier de contestation
  type: object
  properties:
    disputeCase:
      description: objet contenant les informations liées au dossier de contestation
      type: object
      additionalProperties: false
      properties:
        id:
          description: Dispute Case reference<br>Identifiant du dossier de Contestation attribué par le Processeur
          type: string
          example: S102072507285324
          pattern: ^[0-9A-Za-z]{16}$
        internalIdentification:
          description: Dispute data internal reference<br>Identifiant technique du dossier
          type: string
          example: '14395'
          pattern: ^[0-9]{1,19}$
        localDateTime:
          description: Date Time in local region<br>Date de contestation (AAAA-MM-JJTHH:MM:SS) enUTC
          type: string
          format: date-time
          example: '2025-07-28T15:04:34'
        creationDateTime:
          description: Creation date time<br>Date de création du dossier (AAAA-MM-JJTHH:MM:SS) en UTC
          type: string
          format: date-time
          example: '2025-07-28T15:04:34'
        qualification:
          $ref: '#/components/schemas/Qualification'
        condition:
          $ref: '#/components/schemas/Condition'
        totalAmount:
          description: Total amount<br>Montant signé et devise du dossier de contestation
          type: object
          example:
            amount: '-50.50'
            currency: '978'
          properties:
            amount:
              type: string
              pattern: ^\-?[0-9]{1,18}(\.?[0-9]{0,5})?$
            currency:
              type: string
              pattern: ^[0-9]{3}$
          required:
            - amount
            - currency
        transactionsCount:
          description: Transactions count<br>Nombre d'opérations rattachées au dossier
          type: string
          example: '3'
          pattern: ^[0-9]{1,19}$
        auditTrailCaseEligibilityIndicator:
          description: >-
            Audit trail case eligibility indicator<br>indique si le dossier doit être traité dans le processus Piste
            Audit Contestation (PAC) :<br>false: le dossier n'est pas éligible PAC<br>true: le dossier est éligible PAC
          type: boolean
          example: false
        creationChannelcode:
          description: Channel used to create the dispute case<br>Canal d'origine de la création du dossier de contestation
          type: string
          example: SELP
          enum:
            - AGEN
            - ATMD
            - BACO
            - BATC
            - CRCD
            - EAGE
            - EDID
            - EMAI
            - MAIL
            - OTHR
            - SELP
            - SELW
          x-enumDescriptions:
            AGEN: Case created by branch
            ATMD: Case created by ATM
            BACO: Case created by the back office
            BATC: Case created by batch
            CRCD: Case created by the crc
            EAGE: Case created by E-agence
            EDID: Case created by EDI
            EMAI: Case created by email
            MAIL: Case created by mail
            OTHR: Case created by other
            SELP: Case created by selfcare - phone
            SELW: Case created by selfcare - web
      required:
        - id
        - internalIdentification
        - creationDateTime
        - qualification
        - condition
        - totalAmount
        - transactionsCount
        - auditTrailCaseEligibilityIndicator
    issuer:
      description: objet contenant les informations liées à la banque émettrice
      type: object
      additionalProperties: false
      properties:
        institutionId:
          description: Issuer institution Id<br>Code de la banque émetteur du dossier de contestation
          type: string
          example: '10207'
          maxLength: 5
          minLength: 1
        leadInstitutionId:
          description: Issuer Leader institution Id<br>Code chef de file de la banque émetteur  du dossier de contestation
          type: string
          example: '30007'
          maxLength: 5
          minLength: 1
      required:
        - institutionId
        - leadInstitutionId
    card:
      $ref: '#/components/schemas/Card'
    cardholder:
      $ref: '#/components/schemas/Cardholder'
    claimer:
      description: objet contenant les informations liées au réclamant
      type: object
      additionalProperties: false
      properties:
        pushNotificationIndicator:
          description: Indicator of push Notification<br>Souhait client de recevoir des notifications (true / false)
          type: boolean
          example: true
        preferedNotificationChannel:
          description: >-
            preferential communication channel used <br>Canal de communication préferentiel choisi par le client pour la
            réception des notifications
          type: string
          example: SMSE
          enum:
            - EMAI
            - SMSE
          x-enumDescriptions:
            EMAI: Email
            SMSE: Sms
        email:
          description: email address<br>Mail du client à utiliser pour l'envoi des notifications
          type: string
          format: email
          example: adresse@mail.com
        phoneNumber:
          description: >-
            phone number<br>Numéro de téléphone du client (avec indicatif téléphonique international) à utiliser pour
            l'envoi des notifications
          type: string
          example: '+33602030405'
          pattern: ^\+(\d{1,3})[-\s]?(\d{1,3})[-\s]?(\d{6,10})$
    crcCase:
      description: objet contenant les informations liées au dossier CRC
      type: object
      additionalProperties: false
      properties:
        id:
          description: CRC case reference<br>Identifiant de dossier CRC
          type: string
          example: T101072304189878
          pattern: ^[0-9A-Za-z]{16}$
    cardholderInsuredIndicator:
      description: Insured indicator<br>Indicateur porteur assuré
      type: boolean
      example: true
    insurance:
      description: Données relatives à l'assurance
      type: object
      additionalProperties: false
      properties:
        cardPackageCode:
          description: Card Package Code<br>Code forfait carte
          type: string
          example: Bouquet liberté
          maxLength: 255
          minLength: 1
        contractNumber:
          description: Insurance Contract Number<br>Numéro de contrat assurance
          type: string
          example: '979394605'
          maxLength: 255
          minLength: 1
        subscriptionDateTime:
          description: >-
            Insurance subscriptiuon date (YYYY-MM-DDThh:mm:ss)<br>Date de souscription à l'assurance
            (AAAA-MM-JJTHH:MM:SS) en UTC
          type: string
          format: date-time
          example: '2025-07-28T15:04:34'
        coverageLimit:
          description: Limit of the assurance coverage (amount and currency)<br>Montant et devise du plafond d'assurance
          type: object
          example:
            amount: '1200'
            currency: '978'
          properties:
            amount:
              type: string
              pattern: ^\-?[0-9]{1,18}(\.?[0-9]{0,5})?$
            currency:
              type: string
              pattern: ^[0-9]{3}$
          required:
            - amount
            - currency
        sinister:
          description: objet contenant les informations liées au sinistre
          type: object
          additionalProperties: false
          properties:
            cardholderDisclosure:
              description: >-
                Client reported having given their card and/or PIN to a third party, excluding disclosure under
                violence<br>Donnée relative au sinistre permettant de savoir si le porteur a donné sa carte et/ou son
                code à un tiers (hors membre de sa famille, exclusion totale(*)), hors divulgation sous la contrainte
                avec violence
              type: boolean
              example: true
            cardLending:
              description: >-
                Client idicated that they had lent their card<br>Donnée relative au sinistre permettant de savoir si le
                porteur a prêté sa carte
              type: boolean
              example: false
            pinWrittenDown:
              description: >-
                Client indicated that they had written down their PIN on a document<br>Donnée relative au sinistre
                permettant de savoir si le porteur a inscrit son code sur un document
              type: boolean
              example: false
            pinRecompositionOnRequest:
              description: >-
                The cardholder indicates that they re-entered their PIN at the request and un presence of an unknown
                person<br>Donnée relative au sinistre permettant de savoir si le porteur  a recomposé son code à la
                demande et la vue d'un inconnu
              type: boolean
              example: false
            delayedCardStop:
              description: >-
                Client made a card block later than usual in relation to their normal card usage<br>Donnée relative au
                sinistre permettant de savoir si le porteur  a opposé tardivement sa carte par rapport à son utilisation
                habituelle.
              type: boolean
              example: false
            implicitPINTheft:
              description: >-
                The cardholder's PIN was implicitly stolen<br>Donnée relative au sinistre permettant de savoir s'il
                s'agit d'un vol implicite du code sans autres informations.
              type: boolean
              example: false
            temporaryCardLoss:
              description: >-
                The cardholder experienced a temporary loss of their card<br>Donnée relative au sinistre permettant de
                savoir si le porteur  a été momentanément dépossédé de son support (le support est toujours en
                possession du client)
              type: boolean
              example: false
            familyUse:
              description: >-
                The card was used by a family member<br>Donnée relative au sinistre permettant de savoir si la carte a
                été utilisé par un membre de la famille
              type: boolean
              example: false
    transactionList:
      type: array
      items:
        type: object
        description: liste des opérations carte contestées
        properties:
          identification:
            description: objet contenant les informations pour l'identification de la transaction
            type: object
            additionalProperties: false
            properties:
              reference:
                description: Transaction Reference<br>Identifiant unique de transaction attribué par le Processeur (COIDOP)
                type: string
                example: R20250719FOND1029
                maxLength: 35
                minLength: 1
              localDateTime:
                description: Date Time in local region<br>Date et heure de la transaction (AAAA-MM-JJTHH:MM:SS) en UTC
                type: string
                format: date-time
                example: '2025-07-28T15:04:34'
            required:
              - localDateTime
          saleReference:
            description: Sale Reference Number<br>Référence d'archivage de la transaction (CBAE champ 37)
            type: string
            example: '888250530747'
            maxLength: 35
            minLength: 1
          totalAmount:
            description: Total Amount<br>Montant et devise de la transaction
            type: object
            example:
              amount: '-50.50'
              currency: '978'
            properties:
              amount:
                type: string
                pattern: ^\-?[0-9]{1,18}(\.?[0-9]{0,5})?$
              currency:
                type: string
                pattern: ^[0-9]{3}$
            required:
              - amount
              - currency
          vrolTransactionReference:
            description: VISA Resolve Online transaction reference<br>Identifiant transaction VISA (VROL Transaction Identifier)
            type: string
            example: '5303140407'
            pattern: ^[0-9A-Za-z]{1,35}$
          feesAmount:
            $ref: '#/components/schemas/FeesAmount'
          disputeTechnicalInternalId:
            description: Dispute technical internal reference<br>Identifiant technique de l'opération interne au Processeur
            type: string
            example: '13570'
            pattern: ^[0-9]{1,19}$
          disputeAuditTrailTransactionEligibilityIndicator:
            description: >-
              Dispute audit trail transaction eligibility indicator<br>indique si la transaction doit être traitée dans
              le processus Piste Audit Contestation (PAC) :<br>false: la transaction n'est pas éligible PAC<br>true: la
              transaction est éligible PAC
            type: boolean
            example: false
          tokenAuthenticationVerificationValue:
            description: Token authentification verification value<br>Valeur de contrôle du token
            type: string
            example: '3485327705659121'
            pattern: ^([0-9A-F][0-9A-F]){4,40}$
          cardholderAuthenticationMethod:
            $ref: '#/components/schemas/CardholderAuthenticationMethod'
          threeDsMerchantAuthReq:
            description: ' Merchant request for authentication<br>Souhait Commerçant relatif à l''authentification forte'
            type: string
            example: AUTD
            enum:
              - AUTD
              - AUTQ
              - AUTR
              - NAAP
              - NADS
              - NATR
              - NAUT
              - NAUW
              - NPDV
            x-enumDescriptions:
              AUTD: 04-Authentication required
              AUTQ: Authentication requested
              AUTR: 09-Authentication required
              NAAP: 'No authentication: SCA already performed'
              NADS: 'No authentication: data share only'
              NATR: 'No authentication: transaction risk analysis already performed'
              NAUT: No authentication
              NAUW: 'No authentication: whitelist'
              NPDV: No preference – default value if the data element is absent or not set to a value
          tokenCategory:
            $ref: '#/components/schemas/TokenCategory'
          authorisationCode:
            description: authorisation identification response<br>Numéro d'autorisation
            type: string
            example: '146123'
            pattern: ^[0-9A-Za-z]{1,6}$
          threeDsProtocolVersion:
            description: 3DS protocol major version <br>Version de 3DS au format protocolaire (CB2A / CBAE)
            type: string
            example: '22'
            pattern: ^[0-9]{1,2}$
          context:
            description: objet contenant le contexte de la transaction
            type: object
            additionalProperties: false
            properties:
              operationNature:
                $ref: '#/components/schemas/OperationNature'
              transactionNature:
                $ref: '#/components/schemas/TransactionNature'
              multiAppTop:
                $ref: '#/components/schemas/MultiAppTop'
              manualIndicator:
                description: >-
                  Manual indicator<br>indique que la transaction a été ajoutée via une saisie manuelle (et non pas par
                  une recherche - cas d'une transaction non disponible dans l'historique)<br>false: Transaction  non
                  saisie manuellement<br>true: Transaction saisie manuellement
                type: boolean
                example: false
              scoringEligibilityIndicator:
                description: >-
                  Indicator used to determine whether the transaction must be submitted to a prescore
                  calculation<br>Indicateur permettant de déterminer si la transaction doit être soumise à un calcul de
                  prescore
                type: boolean
                example: true
              schemeNature:
                $ref: '#/components/schemas/SchemeNature'
              ecommerceIndicatorInfo:
                description: >-
                  Information about ecommerce indicator<br>ElectronicCommerceIndicator<br>Pour VISA, prend les valeurs
                  :<br>- (blanc)<br>- 1 : Single mail order/telephone order transaction<br>- 2 : Recurring transaction
                  (valid only for U.S.A. Region <br>acquired Transactions)<br>- 3: Instalment Transaction<br>- 4:
                  Unknown classification/other mail order<br>- 5: Secure Electronic Commerce Transaction<br>- 6:
                  Authenticated Security Transaction at a 3-D <br>Secure-capable merchant and the merchant <br>attempted
                  cardholder authentication using 3-D <br>Secure<br>- 7: Authenticated Security Transaction<br>- 8:
                  Secure Transaction<br>- 9: For optional Regional use only<br><br>Pour MasterCard. Exemple de valeur
                  possible :  <br>- PDS 0052—Electronic Commerce Security Level Indicator<br><br>Non renseignée pour les
                  transactions domestiques CB
                type: string
                example: '8'
                maxLength: 20
                minLength: 1
              regulatoryAndTechnicalEnvironment:
                description: >-
                  Regulatory and technical environment<br>Environnement réglementaire et technique de la
                  transaction.<br>Renseignée pour les transactions domestiques CB uniquement
                type: string
                example: '70'
                pattern: ^[0-9A-Za-z]{2}$
              cardDataEntryMode:
                $ref: '#/components/schemas/CardDataEntryMode'
              electronicCommerceAuthenticationNature:
                $ref: '#/components/schemas/ElectronicCommerceAuthenticationNature'
              serviceAttribute:
                description: Service attribute<br>Type de facture procédure
                type: string
                example: AGRE
                enum:
                  - ADCH
                  - AGRE
                  - AITC
                  - AITF
                  - AITI
                  - AITP
                  - ARES
                  - CCPU
                  - CCUP
                  - CDSM
                  - CHDS
                  - DBTR
                  - DREC
                  - FREC
                  - GUAR
                  - INST
                  - IRES
                  - MPFP
                  - NOSH
                  - PAUT
                  - PRES
                  - RPUN
                  - UNSN
                x-enumDescriptions:
                  ADCH: Additional charges
                  AGRE: Aggregation
                  AITC: Acceptor Initiated Transaction following an internet CIT
                  AITF: Acceptor Initiated Transaction following a face-to-face or an unattended CIT
                  AITI: Acceptor Initiated Transaction following an internet CIT
                  AITP: Acceptor Initiated Transaction following a face-to-face or an unattended CIT
                  ARES: Additionnal Payment or charges
                  CCPU: Crypto-currency purchase
                  CCUP: Crypto Currency Purchase
                  CDSM: Cardholder data storage on merchant file
                  CHDS: Cardholder data storage on merchant file
                  DBTR: Debt recovery
                  DREC: Debt Recovery
                  FREC: First Recurring
                  GUAR: Guarantee
                  INST: Instalment
                  IRES: Initial Reservation or Pre-authorisation
                  MPFP: Multiple payment, first payment
                  NOSH: No-show
                  PAUT: Pre-authorisation
                  PRES: Payment after Reservation or Aggregation
                  RPUN: Recurring payment, unknown sequence number
                  UNSN: Recurring payment, unknown sequence number (reserved for international incoming flow)
              acceptanceModeLabel:
                description: Acceptance mode label<br>Mode d'acceptation de la transaction (re-calculé par le processeur)
                type: string
                example: Internet sécurisé (50)
                maxLength: 255
                minLength: 1
              clearingRoute:
                $ref: '#/components/schemas/ClearingRoute'
              qualifScheme:
                $ref: '#/components/schemas/QualifScheme'
            required:
              - manualIndicator
              - scoringEligibilityIndicator
              - schemeNature
          merchant:
            description: objet contenant les informations du marchand
            type: object
            additionalProperties: false
            properties:
              merchantName:
                description: Merchant Name used by all acquisition services.<br>Raison sociale du commerçant
                type: string
                example: PIZZA WEB
                maxLength: 70
                minLength: 1
              merchantCategoryCode:
                description: Merchant Category Code<br>indique le type d'activité du commerçant
                type: string
                example: '5812'
                pattern: ^[0-9]{4}$
              officialPostalAddress:
                $ref: '#/components/schemas/OfficialPostalAddress'
            required:
              - merchantName
              - officialPostalAddress
        additionalProperties: false
        required:
          - identification
          - totalAmount
          - feesAmount
          - disputeTechnicalInternalId
          - disputeAuditTrailTransactionEligibilityIndicator
      maxItems: 100
      minItems: 1
  additionalProperties: false
  required:
    - disputeCase
    - issuer
    - card
    - cardholder
    - claimer
  title: DMCreatedCase
