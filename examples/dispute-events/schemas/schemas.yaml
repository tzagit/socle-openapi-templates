                type: string
                example: '3'
                pattern: ^[0-9]{1,2}$
              numberOfCallCenterCalls:
                description: >-
                  Number of CRC phone calls in the 2 months preceding the disputed payment<br>Nombre d'appels CRC dans
                  les 2 derniers mois précédant la contestation
                type: string
                example: '1'
                pattern: ^[0-9]{1,2}$
              otpPhoneNumber:
                description: PhoneNumber receiving SMS<br>Numero recevant les otp SMS
                type: string
                example: '+33602030405'
                pattern: ^\+(\d{1,3})[-\s]?(\d{1,3})[-\s]?(\d{6,10})$
          phoneNumberList:
            type: array
            items:
              type: object
              properties:
                phoneNumber:
                  type: string
                  pattern: ^\+(\d{1,3})[-\s]?(\d{1,3})[-\s]?(\d{6,10})$
                phoneUsage:
                  $ref: '#/components/schemas/PhoneUsage'
                securedPhoneIndicator:
                  type: boolean
              description: >-
                Phone number with usage and security tag<br>Numéro de téléphone / Usage / Indicateur ''téléphone
