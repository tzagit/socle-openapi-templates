                    phoneNumber:
                      type: string
                      pattern: ^\+(\d{1,3})[-\s]?(\d{1,3})[-\s]?(\d{6,10})$
                    phoneUsage:
                      $ref: '#/components/schemas/PhoneUsage'
                    securedPhoneIndicator:
                      type: boolean
                authenticationMean:
                  description: >-
                    Strong authentication method used for the enrolment of the card into a digital wallet<br>Moyen
                    d’authentification forte utilisé lors de l’enrôlement de la carte dans un wallet<br>OTHE :
                    OTHER<br>DKEY : DIGITAL_KEY<br>OTPW : OTP<br>CYPA : CYBER_PASS<br>CERT : CERTIFICATE
                  type: string
                  example: DKEY
                  enum:
                    - CERT
                    - CYPA
                    - DKEY
                    - OTHE
                    - OTPW
                  x-enumDescriptions:
                    CERT: Certificate
                    CYPA: Cyber pass
                    DKEY: Digital key
                    OTHE: Other
                    OTPW: OTP
                dateTime:
                  description: >-
                    Date and time when the card was enrolled into the digital wallet<br>Date et heure de l'enrôlement de
                    la carte dans le wallet (AAAA-MM-JJTHH:MM:SS) en UTC
                  type: string
                  format: date-time
                  example: '2025-06-28T15:04:34'
                authenticationMethod:
                  description: >-
                    Indicates the technical method of strong authentication used during the card enrolment into the
                    digital wallet<br>Méthode d'authentification forte utilisée pour l'enrôlement<br>CODE : CODE<br>BIOM
                    : BIOMETRIC
                  type: string
                  example: BIOM
                  enum:
                    - BIOM
                    - CODE
                  x-enumDescriptions:
                    BIOM: Biometric
                    CODE: Code
                isSuccessful:
                  description: >-
                    Indicates whether the strong authentication process for the card enrollment into the digital wallet
                    was completed successfully<br>Indicateur permettant d'indiquer si l'authentification utilisée pour
                    l'enrôlement a été réalisée avec succès
                  type: boolean
                  example: true
                enrolmentValidationMessage:
                  description: >-
                    Message associated with the validation of the card enrollment into a digital wallet<br>Message
                    associé à la validation de l’enrôlement de la carte dans un wallet numérique
                  type: string
                  example: Validation de l’enrôlement de la carte réussie
                  maxLength: 255
                  minLength: 1
                device:
                  description: Informations décrivant le terminal utilisé pour effectuer l’enrôlement de la carte dans un wallet
                  type: object
                  additionalProperties: false
                  properties:
                    id:
                      description: >-
                        Technical identifier of the device, enabling its unique identification within the
                        system<br>Identifiant technique du terminal utilisé, permettant de l’identifier de manière
                        unique dans le système
                      type: string
                      example: A8F5F167F44F4964E6C998DEE827110C
                      pattern: ^[0-9A-Za-z]{1,64}$
                    friendlyName:
                      description: Terminal name<br>Nom affecté à l'appareil par l'utilisateur
                      type: string
                      example: Mon Galaxy
                      maxLength: 255
                      minLength: 1
                    deviceTechnicalName:
                      description: Technical name of the device<br>Nom technique de l'appareil
                      type: string
                      example: Galaxy S23 Ultra (SM-S918B)
                      maxLength: 255
                      minLength: 1
                    trustTerminalIndicator:
                      description: Trust terminal indicator<br>Indicateur terminal de confiance (true / false)
                      type: boolean
                      example: true
                    operatingSystem:
                      description: Terminal operating system<br>OS (système d'exploitation) de l'appareil
                      type: string
                      example: Android X.xx
                      maxLength: 255
                      minLength: 1
                    ipAddress:
                      description: IP Address<br>Adresse IP associée au terminal utilisé lors de l’opération
                      type: string
                      example: 123.456.7.89
                      maxLength: 45
                      minLength: 4
                    city:
                      description: City associated with the device<br>Ville associée au terminal utilisé lors de l’opération
                      type: string
                      example: Charenton-Le-Pont
                      maxLength: 70
                      minLength: 1
                    type:
                      description: Device type<br>Type d'appareil<br>La nomenclature sera definie ulteieurement
                      type: string
                      example: '00'
                      maxLength: 2
                      minLength: 1
                onlineBankingConnection:
                  description: >-
                    Informations relatives à la connexion à la banque en ligne associée à l’enrôlement de la carte dans
                    un wallet
                  type: object
                  additionalProperties: false
                  properties:
                    dateTime:
                      description: >-
