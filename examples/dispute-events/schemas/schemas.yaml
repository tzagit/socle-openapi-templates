                    CLRA: Card limit raised
                    CLRE: Card limit reduced
                    FPLO: Foreign payment locked
                    FPUL: Foreign payment unlocked
                    RPLO: Remote payment locked
                    RPUL: Remote payment unlocked
                    WDLO: Withdrawal locked
                    WDUN: Withdrawal unlocked
              additionalProperties: false
          paymentAuthenticationList:
            type: array
            items:
              type: object
              description: Liste des authentifications de paiements
              properties:
                disputeLink:
                  description: >-
                    Link between payment and dispute<br>Description permettant de déterminer si le paiement est en lien
                    avec la contestation<br>DISP : DISPUTE<br>BEDI : LAST_BEFORE_DISPUTE
                  type: string
