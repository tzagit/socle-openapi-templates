/cards/{id}/card-secret-code:
  get:
    operationId: cardSecretCode
    summary: Card secret code (PIN) restitution (CMS1_002)
    description: >-
      Request to retrieve the secret code associated to the card (PIN)<br><br>The public part of the RSA key is required
      in the header request and it will be used to encrypt the card data in the response.
    tags:
      - Cards
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          description: >-
            Card identifier<br>Unique identifier of the card.<br>This identifier is generated by the CMS during the
            subscription, during a remanufacturing or during an opposition if a card is remanufactured.<br>Afterwards,
            it is used to access the card ressource on other APIs.
        description: >-
          Unique identifier of the card.<br>This identifier is generated by the CMS during the subscription, during a
          remanufacturing or during an opposition if a card is remanufactured.<br>Afterwards, it is used to access the
          card ressource on other APIs.
      - name: X-Public-Key
        in: header
        description: >-
          The public key is provided by the bank in the request and used by the CMS to encrypt the data provided in the
          response<br>Encoded in base64
        required: true
        schema:
          type: string
          pattern: ^([0-9A-F][0-9A-F]){1,2048}$
          description: >-
            Dynamic RSA public key used to cypher the data<br>The public key is provided by the bank in the request and
            used by the CMS to encrypt the data provided in the response<br>Encoded in base64
      - name: acquiringChannel
        in: header
        description: "Communication channel used to initiate the request<br>This channel identifies the origin of the request such as a web banking application, a branch system, a back-office system, etc.<br>Value<br>---------------------------------------------------------------------<br>BKOF : Back office (back-office agents)<br>BTCH : Batch processing (reserved value for the processor’s batch processing of files<br>BRNH : Branch (customer advisor)<br>CCNT : Call Center<br>OBNK :Open banking (selfcare on mobiles or tablets)<br>UNKN : Unknown<br>USR1 : User defined 1 (usage defined by the bank)<br>USR2 : User defined 2 \_(usage defined by the bank)<br>USIN : User interface (reserved value for the processor’s UIs)<br>WBNK : Web banking (selfcare on a computer)"
        required: false
        schema:
          $ref: '#/components/schemas/Shared'
    responses:
      '200':
        description: Code provided
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetCardSecretCodeRes'
