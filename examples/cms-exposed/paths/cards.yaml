# Généré par tools/import.mjs — dé-factorisé depuis un OpenAPI existant.
/cards/{id}/action-activating:
  post:
    operationId: activateCard
    summary: Initiate individual card activation (CMS11_009)
    description: >-
      The body of the request is empty<br><br>By convention, on a POST, if the term 'action' placed before a conjugated
      verb ('ing' form) is present in the URI, it designates an action realised on an existing resource (ex. : locking,
      unlocking, canceling, activating, deactivating, ...) but not the creation of a new resource as the definition of
      the POST method would have it (this is an exception case).<br>Thus, instead of using the 201 'created' HTTP code
      (usually reserved to the creation of a new resource on a classic POST), the 204 'OK' HTTP code is used to remind
      that there is no resource creation but an action done on an existing resource.
    tags:
      - Cards
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          description: >-
            Card identifier<br>Unique identifier of the card.<br>This identifier is generated by the CMS during the
            subscription, during a remanufacturing or during an opposition if a card is remanufactured.<br>Afterwards,
            it is used to access the card ressource on other APIs.
        description: >-
          Unique identifier of the card.<br>This identifier is generated by the CMS during the subscription, during a
          remanufacturing or during an opposition if a card is remanufactured.<br>Afterwards, it is used to access the
          card ressource on other APIs.
      - name: acquiringChannel
        in: header
        description: "Communication channel used to initiate the request<br>This channel identifies the origin of the request such as a web banking application, a branch system, a back-office system, etc.<br>Value<br>---------------------------------------------------------------------<br>BKOF : Back office (back-office agents)<br>BTCH : Batch processing (reserved value for the processor’s batch processing of files<br>BRNH : Branch (customer advisor)<br>CCNT : Call Center<br>OBNK :Open banking (selfcare on mobiles or tablets)<br>UNKN : Unknown<br>USR1 : User defined 1 (usage defined by the bank)<br>USR2 : User defined 2 \_(usage defined by the bank)<br>USIN : User interface (reserved value for the processor’s UIs)<br>WBNK : Web banking (selfcare on a computer)"
        required: false
        schema:
          $ref: '#/components/schemas/Shared'
    responses:
      '204':
        description: Card activated
/cards/{id}/action-blocking:
  post:
    operationId: blockCard
    summary: Initiate individual card blocking (CMS11_008)
    description: >-
      By default, the blocking service of the CMS initiates the manufacturing of a new card when blocking the current
      card.<br>A remanufacturing indicator allows to explicitly define the expected behavior to remanufacture a new card
      or not. <br>For banks calculating the PAN on their system and which need to provide the PAN to the CMS, this
      remanufacturing indicator must be set to false and the bank must use the remanufacturing service to initiate the
      creation of a new card in order to be able to provide the new PAN to the CMS.<br><br>By convention, on a POST, if
      the term 'action' placed before a conjugated verb ('ing' form) is present in the URI, it designates an action
      realised on an existing resource (ex. : locking, unlocking, canceling, activating, deactivating, ...) but not the
      creation of a new resource as the definition of the POST method would have it (this is an exception case).
    tags:
      - Cards
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          description: >-
            Card identifier<br>Unique identifier of the card.<br>This identifier is generated by the CMS during the
            subscription, during a remanufacturing or during an opposition if a card is remanufactured.<br>Afterwards,
            it is used to access the card ressource on other APIs.
        description: >-
          Unique identifier of the card.<br>This identifier is generated by the CMS during the subscription, during a
          remanufacturing or during an opposition if a card is remanufactured.<br>Afterwards, it is used to access the
          card ressource on other APIs.
      - name: acquiringChannel
        in: header
        description: "Communication channel used to initiate the request<br>This channel identifies the origin of the request such as a web banking application, a branch system, a back-office system, etc.<br>Value<br>---------------------------------------------------------------------<br>BKOF : Back office (back-office agents)<br>BTCH : Batch processing (reserved value for the processor’s batch processing of files<br>BRNH : Branch (customer advisor)<br>CCNT : Call Center<br>OBNK :Open banking (selfcare on mobiles or tablets)<br>UNKN : Unknown<br>USR1 : User defined 1 (usage defined by the bank)<br>USR2 : User defined 2 \_(usage defined by the bank)<br>USIN : User interface (reserved value for the processor’s UIs)<br>WBNK : Web banking (selfcare on a computer)"
        required: false
        schema:
          $ref: '#/components/schemas/Shared'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CardBlockingReq'
    responses:
      '200':
        description: >-
          Card blocked (if remanufacturing was asked this code return indicates a problem occured and the card was not
          remanufactured)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CardBlockingRes'
      '201':
        description: Card blocked and remanufactured
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CardBlockingRemanufacturingRes'
