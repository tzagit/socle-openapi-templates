# Généré par tools/import.mjs — dé-factorisé depuis un OpenAPI existant.
/card-agreements:
  get:
    operationId: cardsContrats
    summary: Search for the data of all card agreements of a cardholder (CMS27_001)
    description: >-
      Search for the data of all card agreements of a cardholder<br>Common parameters used for card manufacturing and
      associated to the card agreement are provided in the card objet in the response. The card object doesn't represent
      real card.
    tags:
      - Card Agreements
    parameters:
      - name: cardholderId
        in: query
        required: true
        schema:
          type: string
          pattern: ^[0-9a-zA-Z\-]{1,36}$
          description: >-
            Cardholder Id<br>Technical identifier of the cardholder in the banking system.<br>This identifier is
            provided during the subscription by the bank.<br>Afterwards, it is used by the CMS to retrieve the
            cardholder data from the bank.
          x-dictionary-id: '250331121313'
          x-estreem-field-original-object: cardholder
          x-estreem-field-original-name: cardholderId
        description: >-
          Technical identifier of the cardholder in the banking system.<br>This identifier is provided during the
          subscription by the bank.<br>Afterwards, it is used by the CMS to retrieve the cardholder data from the bank.
    responses:
      '200':
        description: Research OK (avec liste vide si aucun contrat carte trouvé)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListofagreementsRes'
  post:
    operationId: createCardAgreement
    summary: Create a card agreement and dependencies (subscription) (CMS4_001)
    description: >-
      In Estreem's dictionnary, the term 'agreement' is used to represent the 'contract'.<br>Within the subscription
      service, the bank provides a cardholder identifier and may provide an owner identifier and/or a branch identifier.
      The cardholder, owner and branch data will be retrieved from the bank using these identifiers and through services
      exposed by the bank.<br>The subscription service covers the creation of both physical and digital cards. The
      product code and the type of card support allows to identify if a card is created under a physical or digital
      form.<br>After subscription, depending of the card product configuration, the cardStatus can be either 'validated'
      or 'activated'.
    tags:
      - Card Agreements
    parameters:
      - name: acquiringChannel
        in: header
        description: "Communication channel used to initiate the request<br>This channel identifies the origin of the request such as a web banking application, a branch system, a back-office system, etc.<br>Value<br>---------------------------------------------------------------------<br>BKOF : Back office (back-office agents)<br>BTCH : Batch processing (reserved value for the processor’s batch processing of files<br>BRNH : Branch (customer advisor)<br>CCNT : Call Center<br>OBNK :Open banking (selfcare on mobiles or tablets)<br>UNKN : Unknown<br>USR1 : User defined 1 (usage defined by the bank)<br>USR2 : User defined 2 \_(usage defined by the bank)<br>USIN : User interface (reserved value for the processor’s UIs)<br>WBNK : Web banking (selfcare on a computer)"
        required: false
        schema:
          $ref: '#/components/schemas/Shared'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CardAgreementReq'
    responses:
      '201':
        description: Card agreement created
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CardAgreementRes'
/card-agreements/{id}/cards:
  get:
    operationId: cardsData
    summary: Search for the data of all cards of a card agreement (CMS1_004)
    description: >-
      The card selection code allows to restrict the cards selected to get the data.<br>If the card selection code is
      absent, all cards are selected.<br>If the card selection code is present, the cards are selected based on their
      status with the following options : only activated card, only card waiting to be activated, cards wich are active
      and waiting to be activated, only blocked card, only locked card, the last card created and card waiting to be
      activated.<br><br>Elements shared by all cards of a card agreement (eg. options or usage limits) are provided in
      separated lists in the response.
    tags:
      - Cards
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          pattern: ^[0-9a-zA-Z\-]{1,36}$
          description: >-
            Card agreement Id<br>Technical identifier of the cardholder card agreement.<br>If not provided by the bank
            in the cardAgreement creation, the identifier is generated by the CMS and provided in the response to the
            cardAgreement creation (subscription).<br>Afterwards, it is used to access the cardAgreement ressource on
            other APIs.
          x-dictionary-id: '250331114300'
          x-estreem-field-original-object: cardAgreement
          x-estreem-field-original-name: cardAgreementId
        description: >-
          Technical identifier of the cardholder card agreement.<br>If not provided by the bank in the cardAgreement
          creation, the identifier is generated by the CMS and provided in the response to the cardAgreement creation
          (subscription).<br>Afterwards, it is used to access the cardAgreement ressource on other APIs.
      - name: cardSelectionCode
        in: query
        required: false
        schema:
          type: string
          enum:
            - AATA
            - ACTV
            - BLKD
            - LATA
            - LCKD
            - TOAC
          x-enumDescriptions:
            AATA: Activ_and_to_activ
            ACTV: Activated
            BLKD: Blocked
            LATA: Last_and_to_activ
            LCKD: Locked
            TOAC: To_activate
          description: >-
            Card filter selection code<br>Code to restrict the cards selected to get the details<br>If absent all cards
            are selected<br>If present, the cards are selected based on their status as per the following
            values<br>Value : Label<br>---------------------------------------------------------------------<br>ACTV  :
            Only activated card<br>TOAC  : Only card waiting to be activated<br>AATA  : Cards wich are active and
            waiting to be activated<br>BLKD  : Only blocked card<br>LCKD  : Only locked card<br>LATA  : The last card
            created and card waiting to be activated
          x-dictionary-id: '250617090116'
          x-estreem-field-original-object: cardContext
          x-estreem-field-original-name: cardSelectionCode
        description: >-
          Code to restrict the cards selected to get the details<br>If absent all cards are selected<br>If present, the
          cards are selected based on their status as per the following values<br>Value :
          Label<br>---------------------------------------------------------------------<br>ACTV  : Only activated
          card<br>TOAC  : Only card waiting to be activated<br>AATA  : Cards wich are active and waiting to be
          activated<br>BLKD  : Only blocked card<br>LCKD  : Only locked card<br>LATA  : The last card created and card
          waiting to be activated
    responses:
      '200':
        description: Research OK (avec liste vide si aucun contrat carte trouvé)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CardslistRes'
/card-agreements/{id}/action-surveillance-activating:
  post:
    operationId: activateSurveillance
    summary: Initiate individual card agreement surveillance activation (CMS11_001)
    description: >-
      By convention, on a POST, if the term 'action' placed before a conjugated verb ('ing' form) is present in the URI,
      it designates an action realised on an existing resource (ex. : locking, unlocking, canceling, activating,
      deactivating, ...) but not the creation of a new resource as the definition of the POST method would have it (this
      is an exception case).<br>Thus, instead of using the 201 'created' HTTP code (usually reserved to the creation of
      a new resource on a classic POST), the 204 'OK' HTTP code is used to remind that there is no resource creation but
      an action done on an existing resource.
    tags:
      - Card Agreements
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          pattern: ^[0-9a-zA-Z\-]{1,36}$
          description: >-
            Card agreement Id<br>Technical identifier of the cardholder card agreement.<br>If not provided by the bank
            in the cardAgreement creation, the identifier is generated by the CMS and provided in the response to the
            cardAgreement creation (subscription).<br>Afterwards, it is used to access the cardAgreement ressource on
            other APIs.
          x-dictionary-id: '250331114300'
          x-estreem-field-original-object: cardAgreement
          x-estreem-field-original-name: cardAgreementId
        description: >-
          Technical identifier of the cardholder card agreement.<br>If not provided by the bank in the cardAgreement
          creation, the identifier is generated by the CMS and provided in the response to the cardAgreement creation
          (subscription).<br>Afterwards, it is used to access the cardAgreement ressource on other APIs.
      - name: acquiringChannel
        in: header
        description: "Communication channel used to initiate the request<br>This channel identifies the origin of the request such as a web banking application, a branch system, a back-office system, etc.<br>Value<br>---------------------------------------------------------------------<br>BKOF : Back office (back-office agents)<br>BTCH : Batch processing (reserved value for the processor’s batch processing of files<br>BRNH : Branch (customer advisor)<br>CCNT : Call Center<br>OBNK :Open banking (selfcare on mobiles or tablets)<br>UNKN : Unknown<br>USR1 : User defined 1 (usage defined by the bank)<br>USR2 : User defined 2 \_(usage defined by the bank)<br>USIN : User interface (reserved value for the processor’s UIs)<br>WBNK : Web banking (selfcare on a computer)"
        required: false
        schema:
          $ref: '#/components/schemas/Shared'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CardAgreementSurveillanceActivatingReq'
    responses:
      '204':
        description: Surveillance activated
