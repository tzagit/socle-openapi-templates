    description: >-
      Creation or modification of one or multiple shipping condition<br><br>At least one shipping condition must be
      created or modified.<br>A permanent shipping condition must be modified using:<br>    - a shipping condition
      code<br>    - an entity identifier or a postal address identifier (one identifier is required)<br>A temporary
      shipping condition must be created or modified using:<br>    - a shipping condition code<br>    - a start
      date/time and an end date/time (both date/time are required for a temporary shipping condition)<br>    - an entity
      identifier or a postal address identifier (one identifier is required)<br>A complete postal address can be
      provided only for a temporary shipping condition (this complete postal addresse is optional).<br>A new start
      date/time or a new of end date/time provided in the request will update the temporary shipping condition.<br>It is
      not possible to update permanent and temporary conditions at the same time.
