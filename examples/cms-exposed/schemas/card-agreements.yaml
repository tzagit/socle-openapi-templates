# Généré par tools/import.mjs — dé-factorisé depuis un OpenAPI existant.
# Schémas métier du domaine, regroupés (voir paths/).
CardAgreementReq:
  title: CardAgreementReq
  type: object
  description: ''
  properties:
    cardholder:
      type: object
      description: ''
      properties:
        id:
          type: string
          pattern: ^[0-9a-zA-Z\-]{1,36}$
          description: >-
            Cardholder Id<br>Technical identifier of the cardholder in the banking system.<br>This identifier is
            provided during the subscription by the bank.<br>Afterwards, it is used by the CMS to retrieve the
            cardholder data from the bank.
          x-dictionary-id: '250331121313'
          x-estreem-field-original-object: cardholder
          x-estreem-field-original-name: cardholderId
      additionalProperties: false
      required:
        - id
    cardAgreement:
      type: object
      description: ''
      properties:
        id:
          type: string
          pattern: ^[0-9a-zA-Z\-]{1,36}$
          description: >-
            Card agreement Id<br>Technical identifier of the cardholder card agreement.<br>If not provided by the bank
            in the cardAgreement creation, the identifier is generated by the CMS and provided in the response to the
            cardAgreement creation (subscription).<br>Afterwards, it is used to access the cardAgreement ressource on
            other APIs.
          x-dictionary-id: '250331114300'
          x-estreem-field-original-object: cardAgreement
          x-estreem-field-original-name: cardAgreementId
        entityId:
          type: string
          minLength: 1
          maxLength: 36
          description: >-
            Card agreement entity Id<br>Identifier of the physical or logical entity linked to the card
            contract/agreement (entity that signed the contract with the cardholder; for example, a branch).<br>This
            identifier is provided to the CMS during the subscription by the bank.<br>Afterwards, it is used by the CMS
            to retrieve the entity data from the bank and by the IAS in messages sent to the bank
          x-dictionary-id: '250331114312'
          x-estreem-field-original-object: cardAgreement
          x-estreem-field-original-name: cardAgreementEntityId
        accountId:
          type: string
          pattern: ^[0-9a-zA-Z\-]{1,36}$
          description: >-
            Account Id linked to the card<br>Technical identifier of the banking account associated to the card
            contract/agreement<br>This identifier is provided during the subscription by the bank.<br>It will be sent by
            the CMS to the IAS so that the IAS can use this identifier during the authorisation process to contact the
            banking Host (for balance check) or for standin purposes.
          x-dictionary-id: '250331114313'
          x-estreem-field-original-object: cardAgreement
          x-estreem-field-original-name: cardAgreementAccountId
        owner:
          type: object
          description: ''
          properties:
            id:
              type: string
              pattern: ^[0-9a-zA-Z\-]{1,36}$
              description: >-
                Card agreement owner id<br>Technical identifier of the owner of the card agreement in the banking
                system.<br>This identifier can be provided during the subscription by the bank if the owner of the card
                agreement is different from the cardholder.<br>Afterwards, it is used by the CMS to retrieve the owner
                data from the bank.
              x-dictionary-id: '250617090000'
              x-estreem-field-original-object: cardAgreement
              x-estreem-field-original-name: ownerId
          additionalProperties: false
        additionalInformationZone:
          type: string
          minLength: 1
          maxLength: 200
          description: >-
            Card agreement additional information zone<br>This data allows to send discretionnary data from the bank to
            the card manufacturer or, in return, from the card manufacturer to the bank.<br>The CMS does not perform any
            action on this data.
          x-dictionary-id: '250410114304'
          x-estreem-field-original-object: cardAgreement
          x-estreem-field-original-name: additionalInformationZone
        chainingId:
          type: string
          pattern: ^[0-9a-zA-Z\-]{1,36}$
          description: >-
            Card agreement identifier of the parent card<br>Technical identifier of the card agreement from which data
            will be reused upon renewing the agreement (for example, retrieving the PIN code or personalized limits)
          x-dictionary-id: '250617090007'
          x-estreem-field-original-object: cardAgreement
          x-estreem-field-original-name: chainingCardAgreementId
        deferredCalendarCode:
          type: string
          minLength: 1
          maxLength: 50
          description: >-
            Deferred calendar code<br>Code defining the deferred calendar to be used in case of a deferred debit
            card<br>Example of
            values<br>---------------------------------------------------------------------<br>LAST_DAY_ON_MONTH<br>FIRST_DAY_ON_MONTH<br>MIDDLE_DAY_ON_MONTH<br>The
            values to be used are defined in the parameters associated to the product catalog.
          x-dictionary-id: '250410114303'
          x-estreem-field-original-object: cardAgreement
          x-estreem-field-original-name: deferredCalendarCode
        optionList:
          type: array
          items:
            type: object
            description: ''
            properties:
              code:
                type: string
                minLength: 1
                maxLength: 50
                description: >-
                  Card agreement option code<br>Code defining the option associated to the card agreement<br>The values
                  to be used are defined in the parameters associated to the product catalog.<br>Example of values and
                  label<br>---------------------------------------------------------------------<br>TRAVEL_OPTION :
                  Travel option (subscription for reduced or canceled fees when using card in foreign
                  countries)<br>CASH_LIMIT : Limit for cash that can be provided to a cardholder (used for premium
                  cards) the amount must be provided in the optionData<br>DELEGATED_WITHDRAWAL_LIMIT : Limit for
                  delegated withdrawal (used for premium cards) the amount must be provided in the optionData
                x-dictionary-id: '250617090008'
                x-estreem-field-original-object: cardAgreementParameters
                x-estreem-field-original-name: optionCode
              data:
                type: string
                minLength: 1
                maxLength: 35
                description: >-
                  Data for the option<br>The values depend on the option code and are defined in the parameters
                  associated to the product catalog.<br>For example, the value must be present if optionCode is
                  CASH_LIMIT or DELEGATED_WITHDRAWAL_LIMIT
                x-dictionary-id: '250617090009'
                x-estreem-field-original-object: cardAgreementParameters
                x-estreem-field-original-name: optionData
            additionalProperties: false
        shippingConditionList:
          type: array
          items:
            type: object
            description: ''
            properties:
              code:
                type: string
                minLength: 1
                maxLength: 50
                description: >-
                  Shipping condition code<br>Shipping condition code of the card contract/agreement<br>The values to be
                  used are defined in the parameters associated to the product catalog.
                x-dictionary-id: '250617090023'
                x-estreem-field-original-object: cardAgreementParameters
                x-estreem-field-original-name: shippingConditionCode
              entityId:
                type: string
                minLength: 1
                maxLength: 36
                description: >-
                  Shipping condition entity Id<br>Identifier of the physical entity to be used for the shipping
                  condition<br>For example, a branch to send the card
                x-dictionary-id: '250617090024'
                x-estreem-field-original-object: cardAgreementParameters
                x-estreem-field-original-name: shippingConditionEntityId
              postalAddressId:
                type: string
                pattern: ^[0-9a-zA-Z\-]{1,36}$
                description: >-
                  Shipping condition postal address identifier<br>The data of the postal address (this identifier and
                  its corresponding details) will be obtained upon retrieval of the cardholder data.
                x-dictionary-id: '250617090025'
                x-estreem-field-original-object: cardAgreementParameters
                x-estreem-field-original-name: shippingConditionPostalAddressId
            additionalProperties: false
        usageLimitList:
          type: array
          items:
            type: object
            description: ''
            properties:
              code:
                $ref: '#/components/schemas/Code'
              valueType:
                $ref: '#/components/schemas/ValueType'
              personalizedAmount:
                $ref: '#/components/schemas/PersonalizedAmount'
              personalizedNumber:
                type: string
                pattern: ^[0-9A-Za-z]{1,18}$
                description: >-
                  Personalized number of the usage limit<br>Number of the usage limit provided by the bank during the
                  subscription or modified after the subscription (this number overrides the default number of the
                  limit)<br>This number is significant if the usageLimitValueType is set as NUBR (RFU)<br>This number
                  can be temporary if a start and end date/time are defined or permanent if no date/time are defined.
                x-dictionary-id: '250617090035'
                x-estreem-field-original-object: cardAgreementParameters
                x-estreem-field-original-name: usageLimitPersonalizedNumber
            additionalProperties: false
      additionalProperties: false
      required:
        - entityId
        - accountId
    card:
      type: object
      description: ''
      properties:
        encryptedPrimaryAccountNumber:
          type: string
          pattern: ^[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]*\.[A-Za-z0-9_-]*\.[A-Za-z0-9_-]+$
          description: >-
            encrypted pan<br>The encryption is done using JSON Web Encryption standard.<br>Once decrypted it represents
            a Primary Account Number (PAN), which is a 16 to 19 numeric characters string.
          x-dictionary-id: '241112000087'
          x-estreem-field-original-object: card
          x-estreem-field-original-name: encryptedPrimaryAccountNumber
        sequenceNumber:
          type: string
          pattern: ^[0-9]{2,3}$
          description: Card Sequence Number<br>Equivalent to DE23 in ISO8583 based protocols
          x-dictionary-id: '241112000084'
          x-estreem-field-original-object: card
          x-estreem-field-original-name: cardSequenceNumber
        expiryDate:
          type: string
          pattern: ^([0-9]{4})-(1[0-2]|0[1-9])$
          description: 'Expiry date<br>Format (ISO8601) : YYYY-MM ; Example 2024-12<br>Equivalent to DE14 in ISO8583 based protocols'
          x-dictionary-id: '241112000088'
          x-estreem-field-original-object: card
          x-estreem-field-original-name: expiryDate
        alphaTestIndicator:
          type: boolean
          description: Alpha test indicator<br>Indicates if the card must be manufactured for alpha tests or not
          x-dictionary-id: '250617090109'
          x-estreem-field-original-object: card
          x-estreem-field-original-name: alphaTestIndicator
        cardholderPictureId:
          type: string
          minLength: 1
          maxLength: 100
          description: >-
            Distribution identifier of the card design picture for the cardholder - may be an URL<br>Identifier of the
            card design picture for the cardholder provided by the bank during the subscription (for example, it may be
            an URL)
          x-dictionary-id: '250410114310'
          x-estreem-field-original-object: card
          x-estreem-field-original-name: cardholderPictureId
        context:
          type: object
          description: ''
          properties:
            consentIndicator:
              type: boolean
              description: >-
                Consent Indicator<br>Indicator to register if the cardholder has given its consent to publish its card
                agreement and card data to the card networks.<br>By default no consent is registered and no data will be
                published to card networks<br>If set to true, data will be published to the card networks automatically
                upon renewal of the card.
              x-dictionary-id: '250617090047'
              x-estreem-field-original-object: cardContext
              x-estreem-field-original-name: consentIndicator
            contactlessActivationChoiceCode:
              type: boolean
              description: >-
                Contactless activation choice code<br>Code to activate or not the contacless function of the card
                depending on the cardholder choice at the subscription<br>Possible values are 'true' or 'false'
              x-dictionary-id: '250410114320'
              x-estreem-field-original-object: cardContext
              x-estreem-field-original-name: contactlessActivationChoiceCode
            secretCodeChoiceIndicator:
              type: boolean
              description: >-
                PIN choice feature indicator<br>Indicator to request a PIN choice process activation upon card
                manufacturing<br>By default no PIN choice process is activated (the PIN is reused from a previous card
                or generated by the CMS)<br>If set to true, a PIN choice process is initiated with the cardholder
              x-dictionary-id: '250410114319'
              x-estreem-field-original-object: cardContext
              x-estreem-field-original-name: secretCodeChoiceIndicator
            urgentManufacturingIndicator:
              type: boolean
              description: >-
                Urgent manufacturing indicator<br>Indicator to request an urgent manufacturing of the card<br>By default
                no urgent manufacturing is requested
              x-dictionary-id: '250410114318'
              x-estreem-field-original-object: cardContext
              x-estreem-field-original-name: urgentManufacturingIndicator
          additionalProperties: false
        designCode:
          type: string
          minLength: 1
          maxLength: 50
          description: >-
            Card design code defined by the distribution<br>Code to define the design selected by the cardholder during
            the subscription and to be used to print the card
          x-dictionary-id: '250410114309'
          x-estreem-field-original-object: card
          x-estreem-field-original-name: cardDesignCode
        designSubscriptionIndicator:
          type: boolean
          description: >-
            Card design choice subscription indicator<br>Indicates if the card design has been chosen by the cardholder
            during the subscription<br>By default no card design is chosen
          x-dictionary-id: '250331114314'
          x-estreem-field-original-object: card
          x-estreem-field-original-name: designSubscriptionIndicator
        embossedComplementaryData:
          type: string
          minLength: 1
          maxLength: 35
          description: Complementary embossed zone label<br>Complementary line for the embossed zone to be printed on the card
          x-dictionary-id: '250410114302'
          x-estreem-field-original-object: card
          x-estreem-field-original-name: embossedComplementaryData
        embossedZone:
          type: string
          minLength: 1
          maxLength: 35
          description: >-
            Card embossed zone label<br>Label to use for the embossed zone printed on the card in case the default
            format needs to be overridden
          x-dictionary-id: '250410114301'
          x-estreem-field-original-object: card
          x-estreem-field-original-name: embossedZone
        paymentAccountReference:
          type: string
          pattern: ^[0-9A-Za-z]{1,29}$
          description: Payment account reference<br>(PAR)<br>Equivalent to DE57.0056 in CBAE protocol (domestic french data)
          x-dictionary-id: '241112000091'
          x-estreem-field-original-object: card
          x-estreem-field-original-name: paymentAccountReference
        productCode:
          type: string
          minLength: 1
          maxLength: 50
          description: >-
            Product Code<br>Product code of the card contract/agreement<br>The values to be used are defined in the
            parameters associated to the product catalog.
          x-dictionary-id: '250331114310'
          x-estreem-field-original-object: card
          x-estreem-field-original-name: productCode
        supplementZone1:
          type: string
          minLength: 1
          maxLength: 500
          description: >-
            First supplementary information to be sent to the card manufacturer<br>First supplementary information to be
            sent to the card manufacturer.<br>This is used for printing the letter for the card
          x-dictionary-id: '250410114305'
          x-estreem-field-original-object: card
          x-estreem-field-original-name: supplementZone1
        supplementZone2:
          type: string
          minLength: 1
          maxLength: 500
          description: >-
            Second supplementary information to be sent to the card manufacturer<br>Second supplementary information to
            be sent to the card manufacturer.<br>This is used for printing the letter for the mailer
          x-dictionary-id: '250410114306'
          x-estreem-field-original-object: card
          x-estreem-field-original-name: supplementZone2
      additionalProperties: false
      required:
        - designSubscriptionIndicator
        - productCode
  additionalProperties: false
  required:
    - cardholder
    - cardAgreement
    - card
CardAgreementRes:
  title: CardAgreementRes
  type: object
  description: ''
  properties:
    cardAgreement:
      $ref: '#/components/schemas/CardAgreement'
    card:
      type: object
      description: ''
      properties:
        id:
          type: string
          format: uuid
          description: >-
            Card identifier<br>Unique identifier of the card.<br>This identifier is generated by the CMS during the
            subscription, during a remanufacturing or during an opposition if a card is remanufactured.<br>Afterwards,
            it is used to access the card ressource on other APIs.
          x-dictionary-id: '250331114311'
          x-estreem-field-original-object: card
          x-estreem-field-original-name: cardId
        primaryAccountNumberId:
          type: string
          format: uuid
          description: >-
            Primary Account Number ID<br>Identifier (also called PANid) associated to the PAN of the card.<br>The PANid
            is generated (in the form of an UUID v4) by Estreem during the processing of the subscription request sent
            to the CMS (either when the PAN is calculated by the CMS or when the PAN is provided by the bank).<br>The
            PANid is provided to the bank in the subscription response.<br>The PANid is used in further exchanges of the
            CMS and the IAS.
          x-dictionary-id: '250423112000'
          x-estreem-field-original-object: card
          x-estreem-field-original-name: primaryAccountNumberId
        encryptedPrimaryAccountNumber:
          type: string
          pattern: ^[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]*\.[A-Za-z0-9_-]*\.[A-Za-z0-9_-]+$
          description: >-
            encrypted pan<br>The encryption is done using JSON Web Encryption standard.<br>Once decrypted it represents
            a Primary Account Number (PAN), which is a 16 to 19 numeric characters string.
          x-dictionary-id: '241112000087'
          x-estreem-field-original-object: card
          x-estreem-field-original-name: encryptedPrimaryAccountNumber
        maskedPrimaryAccountNumber:
          type: string
          minLength: 1
          maxLength: 30
          description: Masked Primary Account Number<br>Displayable version of the PAN with masked caracters
          x-dictionary-id: '250410114317'
          x-estreem-field-original-object: card
          x-estreem-field-original-name: maskedPrimaryAccountNumber
        sequenceNumber:
          type: string
          pattern: ^[0-9]{2,3}$
          description: Card Sequence Number<br>Equivalent to DE23 in ISO8583 based protocols
          x-dictionary-id: '241112000084'
          x-estreem-field-original-object: card
          x-estreem-field-original-name: cardSequenceNumber
        expiryDate:
          type: string
          pattern: ^([0-9]{4})-(1[0-2]|0[1-9])$
          description: 'Expiry date<br>Format (ISO8601) : YYYY-MM ; Example 2024-12<br>Equivalent to DE14 in ISO8583 based protocols'
          x-dictionary-id: '241112000088'
          x-estreem-field-original-object: card
          x-estreem-field-original-name: expiryDate
        status:
          $ref: '#/components/schemas/CardStatusCodeset'
        paymentAccountReference:
          type: string
          pattern: ^[0-9A-Za-z]{1,29}$
          description: Payment account reference<br>(PAR)<br>Equivalent to DE57.0056 in CBAE protocol (domestic french data)
          x-dictionary-id: '241112000091'
          x-estreem-field-original-object: card
          x-estreem-field-original-name: paymentAccountReference
        supportType:
          $ref: '#/components/schemas/CardSupportTypeCodeset'
      additionalProperties: false
      required:
        - id
        - primaryAccountNumberId
        - maskedPrimaryAccountNumber
        - sequenceNumber
        - expiryDate
        - status
        - supportType
  additionalProperties: false
  required:
    - cardAgreement
    - card
