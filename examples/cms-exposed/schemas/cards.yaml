                x-estreem-field-original-object: cardAgreementParameters
                x-estreem-field-original-name: usageCurrentValueLimitAmount
                x-estreem-field-selector: amount,currency
              currentAmount:
                type: object
                properties:
                  amount:
                    type: string
                    pattern: ^\-?[0-9]{1,18}(\.?[0-9]{0,5})?$
                description: >-
