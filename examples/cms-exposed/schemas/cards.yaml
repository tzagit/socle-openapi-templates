                x-estreem-field-original-object: cardAgreementParameters
                x-estreem-field-original-name: usageCurrentValueLimitNumber
              currentNumber:
                type: string
                pattern: ^[0-9A-Za-z]{1,20}$
                description: >-
                  Number of the current usage value<br>Current number used on the limit<br>This number is significant if
