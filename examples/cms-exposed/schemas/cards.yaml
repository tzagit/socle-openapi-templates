                  <YYYY-MM-DDThh:mm:ssz> (ISO8601 datetime format)
                x-dictionary-id: '250617090013'
                x-estreem-field-original-object: cardAgreementParameters
                x-estreem-field-original-name: usageRestrictionStartDateTime
              endDateTime:
                type: string
                format: date-time
                description: >-
                  endDateTime<br>End date/time of the usage restriction if the usage restriction has to be activated for
                  a limited period of time<br>The date and time are specified in the following form
                  <YYYY-MM-DDThh:mm:ssz> (ISO8601 datetime format)
                x-dictionary-id: '250617090014'
                x-estreem-field-original-object: cardAgreementParameters
                x-estreem-field-original-name: usageRestrictionEndDateTime
            additionalProperties: false
