                x-estreem-field-original-object: cardAgreementParameters
                x-estreem-field-original-name: usageRestrictionData
              startDateTime:
                type: string
                format: date-time
                description: >-
                  startDateTime<br>Start date/time of the usage restriction if the usage restriction has to be activated
