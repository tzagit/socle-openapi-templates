                x-estreem-field-original-object: cardAgreementParameters
                x-estreem-field-original-name: shippingConditionPostalAddressId
              postalAddress:
                $ref: '#/components/schemas/PostalAddress'
              startDateTime:
                type: string
                format: date-time
                description: >-
                  Start date and time of the temporary shipping condition<br>When a temporary shipping condition is set
