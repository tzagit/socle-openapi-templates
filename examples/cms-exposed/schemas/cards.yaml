                x-enumDescriptions:
                  OTHR: Other
                  STRD: Standard
                  TEMP: Temporary
                description: >-
                  Card limit type<br>Code defining the type of the usage current value and the usage current value limit
                  <br>The usage current value limit type must be identical to the corresponding usage limit
