            Card agreement closing date and time<br>Date and time for the closure of the card agreement<br><br>On the
            closure request :<br>   - If the date and time are present, the card agreement will be closed on that
            specific date and time<br>   - Otherwise, the card agreement will be closed on the expiration of current
            active card (as a consequence stopping the automatic renewal process)<br><br>The date and time are specified
            in the following form <YYYY-MM-DDThh:mm:ssz> (ISO8601 datetime format)
          x-dictionary-id: '250617090026'
          x-estreem-field-original-object: cardAgreementParameters
          x-estreem-field-original-name: cardAgreementClosingDateTime
        optionList:
          type: array
