# Généré par tools/import.mjs — dé-factorisé depuis un OpenAPI existant.
# Schémas métier du domaine, regroupés (voir paths/).
CardStatusCodeset:
  type: string
  enum:
    - ACIP
    - ACTV
    - BLIP
    - BLKD
    - CREA
    - DCTD
    - DEIP
    - VALD
  x-enumDescriptions:
    ACIP: Activation in progress
    ACTV: Activated
    BLIP: Blocking in progress
    BLKD: Blocked
    CREA: Created/declared
    DCTD: Deactivated
    DEIP: Deactivation in progress
    VALD: Validated
  description: >-
    Card status<br>Status of the card indicating the capacity to use the card or not<br>After subscription or
    remanufacturing, depending of the card product configuration, the cardStatus can be either 'validated' or
    'activated'.<br>After card activation, the cardStatus is 'activated'.<br>After card blocking, the cardStatus is
    'blocked'.<br>After card agreement termination, the cardStatus is 'deactivated'.<br>After activation of a new card
    and if the old card is deactivated, the cardStatus of the old card is 'deactivated'.<br>Intermediate statuses
    'created/declared' or 'in progress' can be visible in UIs or can be obtained on research API services only in case
    of errors but they are not present in events<br>Value :
    Label<br>---------------------------------------------------------------------<br>CREA  : Created/declared<br>VALD :
    Validated<br>ACIP  : Activation in progress<br>ACTV : Activated<br>BLIP  : Blocking in progress<br>BLKD  :
    Blocked<br>DEIP  : Deactivation in progress<br>DCTD  : Deactivated
  x-dictionary-id: '250617090052'
  x-estreem-field-original-object: card
  x-estreem-field-original-name: cardStatus
CardSupportTypeCodeset:
  type: string
  enum:
    - DGTL
    - PHSL
  x-enumDescriptions:
    DGTL: Digital
    PHSL: Physical
  description: >-
    Card support type<br>Type of support for the card<br>The card can be physically manufactured (in this case, the card
    may be used digitally depending on the product configuration) or created as a digital card only<br>Value :
    Label<br>---------------------------------------------------------------------<br>PHSL  : Physical<br>DGTL  :
    Digital
  x-dictionary-id: '250617090051'
  x-estreem-field-original-object: card
  x-estreem-field-original-name: cardSupportType
GetCardDataRes:
  title: GetCardDataRes
  type: object
  description: ''
  properties:
    primaryAccountNumberId:
      type: string
      format: uuid
      description: >-
        Primary Account Number ID<br>Identifier (also called PANid) associated to the PAN of the card.<br>The PANid is
        generated (in the form of an UUID v4) by Estreem during the processing of the subscription request sent to the
        CMS (either when the PAN is calculated by the CMS or when the PAN is provided by the bank).<br>The PANid is
        provided to the bank in the subscription response.<br>The PANid is used in further exchanges of the CMS and the
        IAS.
      x-dictionary-id: '250423112000'
      x-estreem-field-original-object: card
      x-estreem-field-original-name: primaryAccountNumberId
    encryptedPrimaryAccountNumber:
      type: string
      pattern: ^[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]*\.[A-Za-z0-9_-]*\.[A-Za-z0-9_-]+$
      description: >-
        encrypted pan<br>The encryption is done using JSON Web Encryption standard.<br>Once decrypted it represents a
        Primary Account Number (PAN), which is a 16 to 19 numeric characters string.
      x-dictionary-id: '241112000087'
      x-estreem-field-original-object: card
      x-estreem-field-original-name: encryptedPrimaryAccountNumber
    expiryDate:
      type: string
      pattern: ^([0-9]{4})-(1[0-2]|0[1-9])$
      description: 'Expiry date<br>Format (ISO8601) : YYYY-MM ; Example 2024-12<br>Equivalent to DE14 in ISO8583 based protocols'
      x-dictionary-id: '241112000088'
      x-estreem-field-original-object: card
      x-estreem-field-original-name: expiryDate
  additionalProperties: false
  required:
    - primaryAccountNumberId
    - expiryDate
GetCardSecretCodeRes:
  title: GetCardSecretCodeRes
  type: object
  description: ''
  properties:
    encryptedEphemeralSecurePinBlockKey:
      type: string
      minLength: 1
      maxLength: 64
      description: Ephemeral Symetric Secure PinBlock Key encrypted by ephemeral Transport Key
      x-dictionary-id: '260127152101'
      x-estreem-field-original-object: security
      x-estreem-field-original-name: encryptedEphemeralSecurePinBlockKey
    encryptedEphemeralTransportKey:
      type: string
      minLength: 256
      maxLength: 800
      description: Ephemeral Symetric Transport Key encrypted by a public RSA key
      x-dictionary-id: '260127152100'
      x-estreem-field-original-object: security
      x-estreem-field-original-name: encryptedEphemeralTransportKey
    pinBlockFormat:
      type: string
      enum:
        - ISO0
        - ISO1
        - ISO2
        - ISO3
        - ISO4
      x-enumDescriptions:
        ISO0: PIN diversified with the card account number, conforming to the standard ISO 9564-2.
        ISO1: PIN completed with random padding characters, conforming to the standard ISO 9564-2.
        ISO2: PIN without diversification characters, conforming to the standard ISO 9564-2.
        ISO3: PIN diversified with the card account number and random characters, conforming to the standard ISO 9564-2.
        ISO4: PIN format used with AES encryption, conforming to the new ISO SC2 format.
      description: >-
        Format of pin block<br>Value :
        Label<br>---------------------------------------------------------------------<br>ISO0  : PIN diversified with
        the card account number, conforming to the standard ISO 9564-2.<br>ISO1  : PIN completed with random padding
        characters, conforming to the standard ISO 9564-2.<br>ISO2  : PIN without diversification characters, conforming
        to the standard ISO 9564-2.<br>ISO3  : PIN diversified with the card account number and random characters,
        conforming to the standard ISO 9564-2.<br>ISO4  : PIN format used with AES encryption, conforming to the new ISO
        SC2 format. <br>ISO5  : (NOT USED by JV) Alternative PIN format used with AES encryption, conforming to the new
        ISO SC2 format.<br>NPIN  : No pin
      x-dictionary-id: '241112000070'
      x-estreem-field-original-object: security
      x-estreem-field-original-name: pinBlockFormat
    encryptedPinBlock:
      type: string
      pattern: ^([0-9A-F][0-9A-F]){8,16}$
      description: Encrypted Data<br>The data are encrypted using the key provided in the request
      x-dictionary-id: '241112000205'
      x-estreem-field-original-object: transactionDetails
      x-estreem-field-original-name: encryptedPinBlock
  additionalProperties: false
  required:
    - encryptedEphemeralSecurePinBlockKey
    - encryptedEphemeralTransportKey
    - pinBlockFormat
    - encryptedPinBlock
GetCardSecurityCodeRes:
  title: GetCardSecurityCodeRes
  type: object
  description: ''
  properties:
    encryptedCardSecurityCode:
      type: string
      pattern: ^[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]*\.[A-Za-z0-9_-]*\.[A-Za-z0-9_-]+$
      description: >-
        Field used to transmit the encrypted card security code (CVx)<br>The encryption is done using JSON Web
        Encryption standard.<br>Once decrypted it represents the card security code (CVx), which is a 3 numeric
        characters string.
      x-dictionary-id: '250901001001'
      x-estreem-field-original-object: transactionDetails
      x-estreem-field-original-name: encryptedCardSecurityCode
  additionalProperties: false
  required:
    - encryptedCardSecurityCode
CardslistRes:
  title: CardslistRes
  type: object
  description: ''
  properties:
    cardAgreement:
      type: object
      description: ''
      properties:
        closingDateTime:
          type: string
          format: date-time
