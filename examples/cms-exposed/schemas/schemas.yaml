ListofagreementsRes:
  title: ListofagreementsRes
  type: object
  description: ''
  properties:
    cardholder:
      type: object
      description: ''
      properties:
        id:
          type: string
          pattern: ^[0-9a-zA-Z\-]{1,36}$
          description: >-
            Cardholder Id<br>Technical identifier of the cardholder in the banking system.<br>This identifier is
            provided during the subscription by the bank.<br>Afterwards, it is used by the CMS to retrieve the
            cardholder data from the bank.
        civility:
          type: string
          minLength: 1
          maxLength: 16
          description: >-
            cardholder title<br>Civility of the cardholder<br>The data is defined as a 16 characters string but at this
            stage the CMS service only uses the first 10 characters
        firstName:
          type: string
          minLength: 1
          maxLength: 70
          description: >-
            first name<br>The first name is defined as 70 characters strings but, at this stage, the CMS service only
            uses up to the first 40 characters.
        lastName:
          type: string
          minLength: 1
          maxLength: 70
          description: >-
            last name<br>The last name is defined as 70 characters strings but, at this stage, the CMS service only uses
            up to the first 40 characters.
      additionalProperties: false
    cardAgreementList:
      type: array
      items:
        type: object
        description: ''
        properties:
          id:
            type: string
            pattern: ^[0-9a-zA-Z\-]{1,36}$
            description: >-
              Card agreement Id<br>Technical identifier of the cardholder card agreement.<br>If not provided by the bank
              in the cardAgreement creation, the identifier is generated by the CMS and provided in the response to the
              cardAgreement creation (subscription).<br>Afterwards, it is used to access the cardAgreement ressource on
              other APIs.
          entityId:
            type: string
            minLength: 1
            maxLength: 36
            description: >-
              Card agreement entity Id<br>Identifier of the physical or logical entity linked to the card
              contract/agreement (entity that signed the contract with the cardholder; for example, a branch).<br>This
              identifier is provided to the CMS during the subscription by the bank.<br>Afterwards, it is used by the
              CMS to retrieve the entity data from the bank and by the IAS in messages sent to the bank
          entityName:
            type: string
            minLength: 1
            maxLength: 256
            description: >-
              Card agreement entity name<br>Name of the physical or logical entity linked to the card contract/agreement
              (entity that signed the contract with the cardholder; for example, a branch).
          accountId:
            type: string
            pattern: ^[0-9a-zA-Z\-]{1,36}$
            description: >-
              Account Id linked to the card<br>Technical identifier of the banking account associated to the card
              contract/agreement<br>This identifier is provided during the subscription by the bank.<br>It will be sent
              by the CMS to the IAS so that the IAS can use this identifier during the authorisation process to contact
              the banking Host (for balance check) or for standin purposes.
          owner:
            type: object
            description: ''
            properties:
              id:
                type: string
                pattern: ^[0-9a-zA-Z\-]{1,36}$
                description: >-
                  Card agreement owner id<br>Technical identifier of the owner of the card agreement in the banking
                  system.<br>This identifier can be provided during the subscription by the bank if the owner of the
                  card agreement is different from the cardholder.<br>Afterwards, it is used by the CMS to retrieve the
                  owner data from the bank.
              civility:
                type: string
                minLength: 1
                maxLength: 16
                description: >-
                  Civility of the owner<br>Civility of the owner of the card agreement if the owner is a person
                  (otherwise this field should be absent)<br>The data is defined as a 16 characters string but at this
                  stage the CMS service only uses the first 10 characters.
              firstName:
                type: string
                minLength: 1
                maxLength: 70
                description: >-
                  First name<br>First name of the owner of the card agreement if the owner is a person (otherwise this
                  field should be absent)<br>The first name is defined as 70 characters strings but, at this stage, the
                  CMS service only uses up to the first 40 characters.
              lastName:
                type: string
                minLength: 1
                maxLength: 70
                description: >-
                  Last name<br>Last name of the owner of the card agreement if the owner is a person (otherwise this
                  field should be absent)<br>The last name is defined as 70 characters strings but, at this stage, the
                  CMS service only uses up to the first 40 characters.
            additionalProperties: false
          status:
            type: string
            enum:
              - CLOS
              - OPEN
              - TOCL
              - VALD
            x-enumDescriptions:
              CLOS: Closed
              OPEN: Open
              TOCL: To_close
              VALD: Validated
            description: >-
              Status of Card Agreement<br>After subscription, the cardAgreementStatus is 'validated'.<br>After an
              immediate card agreement termination, the cardAgreementStatus is 'closed'.<br>After a card agreement
              termination set at a future date, the cardAgreementStatus is 'to close'.<br>Open is an intermediate status
              which can be visible in UIs or can be obtained on research API services only in case of errors but which
              is not present in events<br>Value :
              Label<br>---------------------------------------------------------------------<br>OPEN  : Open<br>VALD :
              Validated<br>TOCL  : To_close<br>CLOS  : Closed
          additionalInformationZone:
            type: string
            minLength: 1
            maxLength: 200
            description: >-
              Card agreement additional information zone<br>This data allows to send discretionnary data from the bank
              to the card manufacturer or, in return, from the card manufacturer to the bank.<br>The CMS does not
              perform any action on this data.
          deferredCalendarCode:
            type: string
            minLength: 1
            maxLength: 50
            description: >-
              Deferred calendar code<br>Code defining the deferred calendar to be used in case of a deferred debit
              card<br>Example of
              values<br>---------------------------------------------------------------------<br>LAST_DAY_ON_MONTH<br>FIRST_DAY_ON_MONTH<br>MIDDLE_DAY_ON_MONTH<br>The
              values to be used are defined in the parameters associated to the product catalog.
          parameters:
            type: object
            description: ''
            properties:
              creationDate:
                type: string
                format: date-time
                description: >-
                  Card agreement creation date<br>The date and time are specified in the following form
                  <YYYY-MM-DDThh:mm:ssz> (ISO8601 datetime format)
              closingDateTime:
                type: string
                format: date-time
                description: >-
                  Card agreement closing date and time<br>Date and time for the closure of the card agreement<br><br>On
                  the closure request :<br>   - If the date and time are present, the card agreement will be closed on
                  that specific date and time<br>   - Otherwise, the card agreement will be closed on the expiration of
                  current active card (as a consequence stopping the automatic renewal process)<br><br>The date and time
                  are specified in the following form <YYYY-MM-DDThh:mm:ssz> (ISO8601 datetime format)
              closingReasonCode:
                $ref: '#/components/schemas/ClosingReasonCode'
              productMaximumAge:
                type: string
                pattern: ^[0-9]{1,3}$
                description: >-
                  Card agreement product maximum age<br>Maximum allowed age of the cardholder for the use of the card
                  agreement<br>The card agreement will be disabled and no card can be manufactured is the cardholder age
                  is older than the maximum age.
              replacementCardIndicator:
                type: boolean
                description: >-
                  Replacement card indicator<br>Indicates if the card product supports the replacement card feature
                  (also called emergency card)<br>By default no replacement card is supported.<br>If set to true, the
                  replacement card feature is activated and a replacement card can be assigned to the card agreement
              surveillanceIndicator:
                type: boolean
                description: >-
                  Card agreement surveillance indicator<br>Indicates if the card agreement is under surveillance (with
                  limited use of the card) or not
              surveillanceStartDate:
                type: string
                format: date-time
                description: >-
                  Start date/time of the surveillance of the card agreement<br>The date and time are specified in the
                  following form <YYYY-MM-DDThh:mm:ssz> (ISO8601 datetime format)
              surveillanceEndDate:
                type: string
                format: date-time
                description: >-
                  End date/time of the surveillance of the card agreement<br>The date and time are specified in the
                  following form <YYYY-MM-DDThh:mm:ssz> (ISO8601 datetime format)
              surveillanceReasonCode:
                type: string
                minLength: 1
                maxLength: 50
                description: >-
                  Card agreement surveillance reason code<br>Reason code for the card agreement to be placed under
                  surveillance<br>Example : NO_PROVISION<br>Complementary values can be defined in future version
            additionalProperties: false
          card:
            type: object
            description: ''
            properties:
              cardholderPictureId:
                type: string
                minLength: 1
                maxLength: 100
                description: >-
                  Distribution identifier of the card design picture for the cardholder - may be an URL<br>Identifier of
                  the card design picture for the cardholder provided by the bank during the subscription (for example,
                  it may be an URL)
              context:
                type: object
                description: ''
                properties:
                  contactlessActivationChoiceCode:
                    type: boolean
                    description: >-
                      Contactless activation choice code<br>Code to activate or not the contacless function of the card
                      depending on the cardholder choice at the subscription<br>Possible values are 'true' or 'false'
                  consentIndicator:
                    type: boolean
                    description: >-
                      Consent Indicator<br>Indicator to register if the cardholder has given its consent to publish its
                      card agreement and card data to the card networks.
                  consentUpdateDateTime:
                    type: string
                    format: date-time
                    description: >-
                      Date and time of the update of the consent<br>Date and time when the consent indicator was
                      updated<br>The date and time are specified in the following form <YYYY-MM-DDThh:mm:ssz> (ISO8601
                      datetime format)
                additionalProperties: false
              debitType:
                type: string
                enum:
                  - DEFR
                  - DPIW
                  - IMMT
                x-enumDescriptions:
                  DEFR: Deferred
                  DPIW: Deferred Payment, Immediate Withdrawal
                  IMMT: Immediate
                description: >-
                  Type of debit<br>Value :
                  Label<br>---------------------------------------------------------------------<br>DEFR :
                  Deferred<br>DPIW : Deferred Payment, Immediate Withdrawal<br>IMMT : Immediate
              designCode:
                type: string
                minLength: 1
                maxLength: 50
                description: >-
                  Card design code defined by the distribution<br>Code to define the design selected by the cardholder
                  during the subscription and to be used to print the card
              embossedComplementaryData:
                type: string
                minLength: 1
                maxLength: 35
                description: >-
                  Complementary embossed zone label<br>Complementary line for the embossed zone to be printed on the
                  card
              embossedZone:
                type: string
                minLength: 1
                maxLength: 35
                description: >-
                  Card embossed zone label<br>Label to use for the embossed zone printed on the card in case the default
                  format needs to be overridden
              paymentAccountReference:
                type: string
                pattern: ^[0-9A-Za-z]{1,29}$
                description: Payment account reference<br>Payment account reference for schemes.
              productCode:
                type: string
                minLength: 1
                maxLength: 50
                description: >-
                  Product Code<br>Product code of the card contract/agreement<br>The values to be used are defined in
                  the parameters associated to the product catalog.
              productType:
                type: string
                enum:
                  - CRDT
                  - DEBT
                x-enumDescriptions:
                  CRDT: Credit
                  DEBT: Debit
                description: >-
                  Product type<br>Type of product indicating whether the card is a debit or a credit card<br>Value :
                  Label<br>---------------------------------------------------------------------<br>DEBT  :
                  Debit<br>CRDT  : Credit
              supplementZone1:
                type: string
                minLength: 1
                maxLength: 500
                description: >-
                  First supplementary information to be sent to the card manufacturer<br>First supplementary information
                  to be sent to the card manufacturer.<br>This is used for printing the letter for the card
              supplementZone2:
                type: string
                minLength: 1
                maxLength: 500
                description: >-
                  Second supplementary information to be sent to the card manufacturer<br>Second supplementary
                  information to be sent to the card manufacturer.<br>This is used for printing the letter for the
                  mailer
              supportType:
                $ref: '#/components/schemas/CardSupportTypeCodeset'
            additionalProperties: false
        additionalProperties: false
  additionalProperties: false
