CardRemanufacturingReq:
  title: CardRemanufacturingReq
  type: object
  description: ''
  properties:
    encryptedPrimaryAccountNumber:
      type: string
      pattern: ^[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]*\.[A-Za-z0-9_-]*\.[A-Za-z0-9_-]+$
      description: >-
        encrypted pan<br>The encryption is done using JSON Web Encryption standard.<br>Once decrypted it represents a
        Primary Account Number (PAN), which is a 16 to 19 numeric characters string.
    sequenceNumber:
      type: string
      pattern: ^[0-9]{2,3}$
      description: Card Sequence Number<br>Equivalent to DE23 in ISO8583 based protocols
    expiryDate:
      type: string
      pattern: ^([0-9]{4})-(1[0-2]|0[1-9])$
      description: 'Expiry date<br>Format (ISO8601) : YYYY-MM ; Example 2024-12<br>Equivalent to DE14 in ISO8583 based protocols'
    cardholderPictureId:
      type: string
      minLength: 1
      maxLength: 100
      description: >-
        Distribution identifier of the card design picture for the cardholder - may be an URL<br>Identifier of the card
        design picture for the cardholder provided by the bank during the subscription (for example, it may be an URL)
    context:
      type: object
      description: ''
      properties:
        newSecretCodeIndicator:
          type: boolean
          description: >-
            New secret code indicator<br>Indicator to request that a new PIN code is generated upon card
            manufacturing<br>By default no new PIN code is generated (the one of the previous card is reused)<br>If set
            to true, a new PIN code is generated and can be sent to the cardholder
        secretCodeChoiceIndicator:
          type: boolean
          description: >-
            PIN choice feature indicator<br>Indicator to request a PIN choice process activation upon card
            manufacturing<br>By default no PIN choice process is activated (the PIN is reused from a previous card or
            generated by the CMS)<br>If set to true, a PIN choice process is initiated with the cardholder
        urgentManufacturingIndicator:
          type: boolean
          description: >-
            Urgent manufacturing indicator<br>Indicator to request an urgent manufacturing of the card<br>By default no
            urgent manufacturing is requested
      additionalProperties: false
    designCode:
      type: string
      minLength: 1
      maxLength: 50
      description: >-
        Card design code defined by the distribution<br>Code to define the design selected by the cardholder during the
        subscription and to be used to print the card
    designSubscriptionIndicator:
      type: boolean
      description: >-
        Card design choice subscription indicator<br>Indicates if the card design has been chosen by the cardholder
        during the subscription<br>By default no card design is chosen
    embossedComplementaryData:
      type: string
      minLength: 1
      maxLength: 35
      description: Complementary embossed zone label<br>Complementary line for the embossed zone to be printed on the card
    embossedZone:
      type: string
      minLength: 1
      maxLength: 35
      description: >-
        Card embossed zone label<br>Label to use for the embossed zone printed on the card in case the default format
        needs to be overridden
    paymentAccountReference:
      type: string
      pattern: ^[0-9A-Za-z]{1,29}$
      description: Payment account reference<br>(PAR)<br>Equivalent to DE57.0056 in CBAE protocol (domestic french data)
    remanufacturingReasonCode:
      $ref: '#/components/schemas/RemanufacturingReasonCode'
    supplementZone1:
      type: string
      minLength: 1
      maxLength: 500
      description: >-
        First supplementary information to be sent to the card manufacturer<br>First supplementary information to be
        sent to the card manufacturer.<br>This is used for printing the letter for the card
    supplementZone2:
      type: string
      minLength: 1
      maxLength: 500
      description: >-
        Second supplementary information to be sent to the card manufacturer<br>Second supplementary information to be
        sent to the card manufacturer.<br>This is used for printing the letter for the mailer
    cardAgreement:
      type: object
      description: ''
      properties:
        additionalInformationZone:
          type: string
          minLength: 1
          maxLength: 200
          description: >-
            Card agreement additional information zone<br>This data allows to send discretionnary data from the bank to
            the card manufacturer or, in return, from the card manufacturer to the bank.<br>The CMS does not perform any
            action on this data.
        chainingId:
          type: string
          pattern: ^[0-9a-zA-Z\-]{1,36}$
          description: >-
            Card agreement identifier of the parent card<br>Technical identifier of the card agreement from which data
            will be reused upon renewing the agreement (for example, retrieving the PIN code or personalized limits)
      additionalProperties: false
  additionalProperties: false
CardRemanufacturingRes:
  title: CardRemanufacturingRes
  type: object
  description: ''
  properties:
    id:
      type: string
      format: uuid
      description: >-
        Card identifier<br>Unique identifier of the card.<br>This identifier is generated by the CMS during the
        subscription, during a remanufacturing or during an opposition if a card is remanufactured.<br>Afterwards, it is
        used to access the card ressource on other APIs.
    primaryAccountNumberId:
      type: string
      format: uuid
      description: >-
        Primary Account Number ID<br>Identifier (also called PANid) associated to the PAN of the card.<br>The PANid is
        generated (in the form of an UUID v4) by Estreem during the processing of the subscription request sent to the
        CMS (either when the PAN is calculated by the CMS or when the PAN is provided by the bank).<br>The PANid is
        provided to the bank in the subscription response.<br>The PANid is used in further exchanges of the CMS and the
        IAS.
    encryptedPrimaryAccountNumber:
      type: string
      pattern: ^[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]*\.[A-Za-z0-9_-]*\.[A-Za-z0-9_-]+$
      description: >-
        encrypted pan<br>The encryption is done using JSON Web Encryption standard.<br>Once decrypted it represents a
        Primary Account Number (PAN), which is a 16 to 19 numeric characters string.
    maskedPrimaryAccountNumber:
      type: string
      minLength: 1
      maxLength: 30
      description: Masked Primary Account Number<br>Displayable version of the PAN with masked caracters
    sequenceNumber:
      type: string
      pattern: ^[0-9]{2,3}$
      description: Card Sequence Number<br>Equivalent to DE23 in ISO8583 based protocols
    expiryDate:
      type: string
      pattern: ^([0-9]{4})-(1[0-2]|0[1-9])$
      description: 'Expiry date<br>Format (ISO8601) : YYYY-MM ; Example 2024-12<br>Equivalent to DE14 in ISO8583 based protocols'
    status:
      $ref: '#/components/schemas/CardStatusCodeset'
    paymentAccountReference:
      type: string
      pattern: ^[0-9A-Za-z]{1,29}$
      description: Payment account reference<br>(PAR)<br>Equivalent to DE57.0056 in CBAE protocol (domestic french data)
    supportType:
      $ref: '#/components/schemas/CardSupportTypeCodeset'
    cardAgreement:
      $ref: '#/components/schemas/CardAgreement'
  additionalProperties: false
  required:
    - id
    - primaryAccountNumberId
    - maskedPrimaryAccountNumber
    - sequenceNumber
    - expiryDate
    - status
    - supportType
    - cardAgreement
