CardBlockingReq:
  title: CardBlockingReq
  type: object
  description: ''
  properties:
    cardholderPictureId:
      type: string
      minLength: 1
      maxLength: 100
      description: >-
        Distribution identifier of the card design picture for the cardholder - may be an URL<br>Identifier of the card
        design picture for the cardholder provided by the bank during the subscription (for example, it may be an URL)
    context:
      type: object
      description: ''
      properties:
        blockingReasonCode:
          $ref: '#/components/schemas/BlockingReasonCode'
        blockingRegulatoryReasonCode:
          type: string
          enum:
            - ABUS
            - FRAU
            - LOST
            - NDLC
            - STLN
          x-enumDescriptions:
            ABUS: Abusive
            FRAU: Fraudulent
            LOST: Lost card
            NDLC: Not delivered card
            STLN: Stolen card
          description: >-
            BlockingRegulatoryReasonCodeset<br>French SICB regulatory blocking reason code<br>Value :
            Label<br>---------------------------------------------------------------------<br>ABUS : Abusive<br>FRAU :
            Fraudulent<br>LOST : Lost card<br>NDLC : Not delivered card<br>STLN : Stolen card
        compromisedSecretCodeIndicator:
          type: boolean
          description: >-
            Indicator of compromission of the secret code<br>Indicates if the secret code has been compromised (known by
            an illegitimate holder of the card).<br>Possible values are 'true' or 'false'
        remanufacturingIndicator:
          type: boolean
          description: >-
            Remanufacturing indicator<br>Indicator to request the creation of a new card when blocking the current
            card<br>By default, if this indicator is not provided in the blocking request, a remanufacturing is
            initiated by the CMS.<br>For banks calculating the PAN on their system and which need to provide the PAN to
            the CMS, this remanufacturing indicator must be set to false and the bank must use the remanufacturing
            service to initiate the creation of a new card in order to be able to provide the new PAN to the CMS.<br>If
            the remanufacturing indicator is set to true or not present in the request, the cardId, the PANId and the
            other attributes of the new created card are provided in the response.
        urgentManufacturingIndicator:
          type: boolean
          description: >-
            Urgent manufacturing indicator<br>Indicator to request an urgent manufacturing of the card<br>By default no
            urgent manufacturing is requested
      additionalProperties: false
      required:
        - blockingRegulatoryReasonCode
        - compromisedSecretCodeIndicator
    designCode:
      type: string
      minLength: 1
      maxLength: 50
      description: >-
        Card design code defined by the distribution<br>Code to define the design selected by the cardholder during the
        subscription and to be used to print the card
    designSubscriptionIndicator:
      type: boolean
      description: >-
        Card design choice subscription indicator<br>Indicates if the card design has been chosen by the cardholder
        during the subscription<br>By default no card design is chosen
    embossedComplementaryData:
      type: string
      minLength: 1
      maxLength: 35
      description: Complementary embossed zone label<br>Complementary line for the embossed zone to be printed on the card
    embossedZone:
      type: string
      minLength: 1
      maxLength: 35
      description: >-
        Card embossed zone label<br>Label to use for the embossed zone printed on the card in case the default format
        needs to be overridden
    lostOrStolenDateTime:
      type: string
      format: date-time
      description: >-
        Card lost or stolen date and time<br>Date and time when the card was lost or stolen (also called initial
        blocking date and time)<br>The date and time are specified in the following form <YYYY-MM-DDThh:mm:ssz> (ISO8601
        datetime format)
    supplementZone1:
      type: string
      minLength: 1
      maxLength: 500
      description: >-
        First supplementary information to be sent to the card manufacturer<br>First supplementary information to be
        sent to the card manufacturer.<br>This is used for printing the letter for the card
    supplementZone2:
      type: string
      minLength: 1
      maxLength: 500
      description: >-
        Second supplementary information to be sent to the card manufacturer<br>Second supplementary information to be
        sent to the card manufacturer.<br>This is used for printing the letter for the mailer
    cardAgreement:
      $ref: '#/components/schemas/CardAgreement2'
  additionalProperties: false
  required:
    - context
