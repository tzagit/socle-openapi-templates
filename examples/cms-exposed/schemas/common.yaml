    - AMNT
    - NUBR
  x-enumDescriptions:
    AMNT: Amount
    NUBR: Number
  description: >-
    Type of value of the usage limit<br>Type defining whether the usage limit is an amount or a number<br>In the current
    definition, only amounts are supported.<br>The definition of the "number" type is reserved for future use<br>Value :
    Label<br>---------------------------------------------------------------------<br>AMNT  : Amount<br>NUBR  : Number
    (RFU)
  x-dictionary-id: '250617090030'
  x-estreem-field-original-object: cardAgreementParameters
  x-estreem-field-original-name: usageLimitValueType
PersonalizedAmount:
  type: object
  properties:
    amount:
      type: string
      pattern: ^\-?[0-9]{1,18}(\.?[0-9]{0,5})?$
  description: >-
    Personalized amount of the usage limit<br>Amount of the usage limit provided by the bank during the subscription or
    modified after the subscription (this amount overrides the default amount of the limit)<br>This amount is
    significant if the usageLimitValueType is set as AMNT<br>This amount can be temporary if a start and end date/time
    are defined or permanent if no date/time are defined.<br>The amount is provided as a number of monetary units
    specified in a currency where the unit of currency is implied by the context and compliant with ISO 4217. The
    decimal separator is a dot.
  x-dictionary-id: '250617090034'
  x-estreem-field-original-object: cardAgreementParameters
  x-estreem-field-original-name: usageLimitPersonalizedAmount
  x-estreem-field-selector: amount
PostalAddress:
  type: object
  properties:
    department:
      type: string
      minLength: 1
      maxLength: 70
    room:
      type: string
      minLength: 1
      maxLength: 70
    floor:
      type: string
      minLength: 1
      maxLength: 70
    streetName:
      type: string
      minLength: 1
      maxLength: 70
    postBox:
      type: string
      minLength: 1
      maxLength: 16
    townNameLocation:
      type: string
      minLength: 1
      maxLength: 70
    postCode:
      type: string
      minLength: 1
      maxLength: 16
    townName:
      type: string
      minLength: 1
      maxLength: 70
    countryCode:
      type: string
      pattern: ^[0-9]{3}$
  description: >-
    Temporary shipping condition postal address<br>The data are used to format the address on a letter as follows :<br>-
    Line 1 is set using the civility/firstName/lastName/company or entity Name data which are provided separately <br>-
    Line 2 is set using either the department (professionnal address) or the room (personal address)<br>- Line 3 is set
    using the floor<br>- Line 4 is set using the streetName<br>- Line 5 is set by concatenating the postBox and the
    townNameLocation<br>- Line 6 is set by concatenating the postCode and the townName<br>- Line 7 is set using the
    countryCode (country name determined from the ISO3166 numeric-3 code)<br>townName and countryCode are
    required.<br>At least one of (department, room, floor, streetName or townNameLocation) is required.<br>The
    department, room, floor, streetName, townNameLocation and townName are defined as 70 characters strings but, at this
    stage, the CMS service only used up to the first 38 characters.
  x-dictionary-id: '250708120003'
  x-estreem-field-original-object: cardAgreementParameters
  x-estreem-field-original-name: shippingConditionPostalAddress
  x-estreem-field-selector: department,room,floor,streetName,postBox,townNameLocation,postCode,townName,countryCode
