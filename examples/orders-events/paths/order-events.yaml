# Chaque clé est un event. Payload BRUT dans le requestBody (aucune enveloppe) ;
# les métadonnées (X-Event-Id/Type/Version, etc.) sont injectées en headers au build.
order.created:
  post:
    operationId: onOrderCreated
    summary: Émis lorsqu'une commande est créée
    x-event: order.created
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Order' }
    responses:
      '2xx': ~   # ack attendu du partenaire

order.cancelled:
  post:
    operationId: onOrderCancelled
    summary: Émis lorsqu'une commande est annulée
    x-event: order.cancelled
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Order' }
    responses:
      '2xx': ~
