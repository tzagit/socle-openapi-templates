# Paramètres de pagination page-based, 0-based (§8.1). Injectés par la macro x-paginated.
components:
  parameters:
    PageParam:
      name: page
      in: query
      required: false
      description: Index de page (0-based).
      schema: { type: integer, minimum: 0, default: 0 }
      example: 0
    SizeParam:
      name: size
      in: query
      required: false
      description: Taille de page.
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      example: 20
