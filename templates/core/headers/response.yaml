# Headers de réponse communs (§6.3) : écho des headers de requête plus X-Processing-Route-Id,
# tous optionnels. Injectés sur chaque réponse par le build.
components:
  headers:
    EchoRequestId:
      description: Echoes the corresponding request header if provided in the request.
      required: false
      schema: { type: string, format: uuid }
      example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
    EchoCorrelationId:
      description: Echoes the corresponding request header if provided in the request.
      required: false
      schema: { type: string, format: uuid }
      example: 7d5c2b9e-2f3a-4c1d-8e6f-9a0b1c2d3e4f
    EchoInstitutionId:
      description: Echoes the corresponding request header if provided in the request.
      required: false
      schema: { type: string, minLength: 3, maxLength: 20 }
      example: BANK-FR-001
    EchoUserId:
      description: Echoes the corresponding request header if provided in the request.
      required: false
      schema: { type: string, maxLength: 128 }
      example: user-42
    EchoUserContextId:
      description: Echoes the corresponding request header if provided in the request.
      required: false
      schema: { type: string, maxLength: 4 }
      example: u42
    ProcessingRouteId:
      description: An identifier indicating the processing route selected by the infrastructure for this message.
      required: false
      schema: { type: string, maxLength: 36 }
      example: prod.eu-west-1.silo-1
