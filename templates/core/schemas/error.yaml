# Format d'erreur commun (§6.5). Tous les champs sont optionnels.
components:
  schemas:
    StandardError:
      type: object
      description: Standard error response used across all APIs
      properties:
        code:          { type: string, minLength: 1, maxLength: 20,  description: "Functional or technical error code" }
        text:          { type: string, minLength: 1, maxLength: 40,  description: "User-friendly error message" }
        developerText: { type: string, minLength: 1, maxLength: 70,  description: "Detailed technical message for debugging" }
        moreInfo:      { type: string, minLength: 1, maxLength: 256, description: "Additional information or documentation link" }
