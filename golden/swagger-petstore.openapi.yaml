openapi: 3.1.1
info:
  title: Swagger Petstore
  version: 1.0.0
  x-socle-version: 0.1.0
  x-socle-type: exposed
components:
  schemas:
    StandardError:
      type: object
      properties:
        code:
          type: string
          minLength: 1
          maxLength: 20
          description: Code d'erreur applicatif stable.
        text:
          type: string
          minLength: 1
          maxLength: 40
          description: Message d'erreur destiné au consommateur.
        developerText:
          type: string
          minLength: 1
          maxLength: 70
          description: Détail technique à destination des développeurs.
        moreInfo:
          type: string
          minLength: 1
          maxLength: 256
          description: Complément d'information / lien de documentation.
    Pet:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        tag:
          type: string
    Pets:
      type: array
      maxItems: 100
      items:
        $ref: '#/components/schemas/Pet'
  parameters:
    XRequestId:
      name: X-Request-Id
      in: header
      required: false
      description: >-
        A universally unique identifier (UUID) assigned to this individual request, used for tracing and debugging
        across distributed services.
      schema:
        type: string
        format: uuid
      example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
    XCorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      description: >-
        A universally unique identifier (UUID) that groups multiple related requests belonging to the same logical
        operation or business transaction, enabling cross-service correlation.
      schema:
        type: string
        format: uuid
      example: 7d5c2b9e-2f3a-4c1d-8e6f-9a0b1c2d3e4f
    XInstitutionId:
      name: X-Institution-Id
      in: header
      required: true
      description: A unique identifier representing the banking institution context (bank code) associated with the request.
      schema:
        type: string
        minLength: 3
        maxLength: 20
      example: BANK-FR-001
    XUserId:
      name: X-User-Id
      in: header
      required: false
      description: A unique identifier representing the authenticated user who initiated the action.
      schema:
        type: string
        maxLength: 128
      example: user-42
    XUserContextId:
      name: X-UserContext-Id
      in: header
      required: false
      description: >-
        A unique identifier representing the user group or organizational context under which the request is being
        performed.
      schema:
        type: string
        maxLength: 4
      example: u42
    IdempotencyKeyRequired:
      name: Idempotency-Key
      in: header
      required: true
      description: >-
        A client-generated unique key ensuring that retrying the same request multiple times produces the same result
        without duplicate side effects.
      schema:
        type: string
        format: uuid
      example: 9b2e4a17-6c3d-4f2a-b1e8-0d7c5a3f2b91
  headers:
    EchoRequestId:
      description: Echoes the corresponding request header if provided in the request.
      required: false
      schema:
        type: string
        format: uuid
      example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
    EchoCorrelationId:
      description: Echoes the corresponding request header if provided in the request.
      required: false
      schema:
        type: string
        format: uuid
      example: 7d5c2b9e-2f3a-4c1d-8e6f-9a0b1c2d3e4f
    EchoInstitutionId:
      description: Echoes the corresponding request header if provided in the request.
      required: false
      schema:
        type: string
        minLength: 3
        maxLength: 20
      example: BANK-FR-001
    EchoUserId:
      description: Echoes the corresponding request header if provided in the request.
      required: false
      schema:
        type: string
        maxLength: 128
      example: user-42
    EchoUserContextId:
      description: Echoes the corresponding request header if provided in the request.
      required: false
      schema:
        type: string
        maxLength: 4
      example: u42
    ProcessingRouteId:
      description: An identifier indicating the processing route selected by the infrastructure for this message.
      required: false
      schema:
        type: string
        maxLength: 36
      example: prod.eu-west-1.silo-1
  responses:
    Error400:
      description: >-
        Bad request (400). The request contains invalid parameters, malformed syntax, or missing required fields. Check
        the error details in the response body for specific validation issues.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/EchoRequestId'
        X-Correlation-Id:
          $ref: '#/components/headers/EchoCorrelationId'
        X-Institution-Id:
          $ref: '#/components/headers/EchoInstitutionId'
        X-User-Id:
          $ref: '#/components/headers/EchoUserId'
        X-UserContext-Id:
          $ref: '#/components/headers/EchoUserContextId'
        X-Processing-Route-Id:
          $ref: '#/components/headers/ProcessingRouteId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
    Error401:
      description: >-
        Unauthorized (401). Authentication is required but was not provided or the provided credentials are invalid.
        Ensure you have included a valid Bearer token in the Authorization header.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/EchoRequestId'
        X-Correlation-Id:
          $ref: '#/components/headers/EchoCorrelationId'
        X-Institution-Id:
          $ref: '#/components/headers/EchoInstitutionId'
        X-User-Id:
          $ref: '#/components/headers/EchoUserId'
        X-UserContext-Id:
          $ref: '#/components/headers/EchoUserContextId'
        X-Processing-Route-Id:
          $ref: '#/components/headers/ProcessingRouteId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
    Error403:
      description: >-
        Forbidden (403). The request is authenticated but lacks the necessary permissions to access the requested
        resource. Contact your administrator to request access.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/EchoRequestId'
        X-Correlation-Id:
          $ref: '#/components/headers/EchoCorrelationId'
        X-Institution-Id:
          $ref: '#/components/headers/EchoInstitutionId'
        X-User-Id:
          $ref: '#/components/headers/EchoUserId'
        X-UserContext-Id:
          $ref: '#/components/headers/EchoUserContextId'
        X-Processing-Route-Id:
          $ref: '#/components/headers/ProcessingRouteId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
    Error404:
      description: >-
        Not Found (404). The requested resource does not exist or has been deleted. Verify the resource ID and endpoint
        URL.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/EchoRequestId'
        X-Correlation-Id:
          $ref: '#/components/headers/EchoCorrelationId'
        X-Institution-Id:
          $ref: '#/components/headers/EchoInstitutionId'
        X-User-Id:
          $ref: '#/components/headers/EchoUserId'
        X-UserContext-Id:
          $ref: '#/components/headers/EchoUserContextId'
        X-Processing-Route-Id:
          $ref: '#/components/headers/ProcessingRouteId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
    Error405:
      description: >-
        Method Not Allowed (405). The HTTP method used is not supported for the requested resource. Check the API
        documentation for allowed methods on this endpoint.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/EchoRequestId'
        X-Correlation-Id:
          $ref: '#/components/headers/EchoCorrelationId'
        X-Institution-Id:
          $ref: '#/components/headers/EchoInstitutionId'
        X-User-Id:
          $ref: '#/components/headers/EchoUserId'
        X-UserContext-Id:
          $ref: '#/components/headers/EchoUserContextId'
        X-Processing-Route-Id:
          $ref: '#/components/headers/ProcessingRouteId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
    Error406:
      description: >-
        Not Acceptable (406). The requested resource is capable of generating only content not acceptable according to
        the Accept headers sent in the request. Adjust the Accept header to a supported media type.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/EchoRequestId'
        X-Correlation-Id:
          $ref: '#/components/headers/EchoCorrelationId'
        X-Institution-Id:
          $ref: '#/components/headers/EchoInstitutionId'
        X-User-Id:
          $ref: '#/components/headers/EchoUserId'
        X-UserContext-Id:
          $ref: '#/components/headers/EchoUserContextId'
        X-Processing-Route-Id:
          $ref: '#/components/headers/ProcessingRouteId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
    Error409:
      description: >-
        Conflict (409). The request conflicts with the current state of the resource (e.g., duplicate entry, resource
        already exists, or version mismatch). Review the error details for more information.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/EchoRequestId'
        X-Correlation-Id:
          $ref: '#/components/headers/EchoCorrelationId'
        X-Institution-Id:
          $ref: '#/components/headers/EchoInstitutionId'
        X-User-Id:
          $ref: '#/components/headers/EchoUserId'
        X-UserContext-Id:
          $ref: '#/components/headers/EchoUserContextId'
        X-Processing-Route-Id:
          $ref: '#/components/headers/ProcessingRouteId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
    Error422:
      description: >-
        Unprocessable Entity (422). The request is well-formed but contains semantic errors that prevent processing
        (e.g., invalid values, unsupported operations). Check the error details for specific issues.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/EchoRequestId'
        X-Correlation-Id:
          $ref: '#/components/headers/EchoCorrelationId'
        X-Institution-Id:
          $ref: '#/components/headers/EchoInstitutionId'
        X-User-Id:
          $ref: '#/components/headers/EchoUserId'
        X-UserContext-Id:
          $ref: '#/components/headers/EchoUserContextId'
        X-Processing-Route-Id:
          $ref: '#/components/headers/ProcessingRouteId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
    Error429:
      description: >-
        Too Many Requests (429). Rate limit has been exceeded. Wait before making additional requests. Check response
        headers for rate limit information.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/EchoRequestId'
        X-Correlation-Id:
          $ref: '#/components/headers/EchoCorrelationId'
        X-Institution-Id:
          $ref: '#/components/headers/EchoInstitutionId'
        X-User-Id:
          $ref: '#/components/headers/EchoUserId'
        X-UserContext-Id:
          $ref: '#/components/headers/EchoUserContextId'
        X-Processing-Route-Id:
          $ref: '#/components/headers/ProcessingRouteId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
    Error500:
      description: >-
        Internal Server Error (500). An unexpected error occurred on the server. Please retry the request. If the
        problem persists, contact support with the X-Request-Id from the response.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/EchoRequestId'
        X-Correlation-Id:
          $ref: '#/components/headers/EchoCorrelationId'
        X-Institution-Id:
          $ref: '#/components/headers/EchoInstitutionId'
        X-User-Id:
          $ref: '#/components/headers/EchoUserId'
        X-UserContext-Id:
          $ref: '#/components/headers/EchoUserContextId'
        X-Processing-Route-Id:
          $ref: '#/components/headers/ProcessingRouteId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
    Error502:
      description: >-
        Bad Gateway (502). An error occurred while the gateway received an invalid response from an upstream server.
        Please retry the request. If the problem persists, contact support.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/EchoRequestId'
        X-Correlation-Id:
          $ref: '#/components/headers/EchoCorrelationId'
        X-Institution-Id:
          $ref: '#/components/headers/EchoInstitutionId'
        X-User-Id:
          $ref: '#/components/headers/EchoUserId'
        X-UserContext-Id:
          $ref: '#/components/headers/EchoUserContextId'
        X-Processing-Route-Id:
          $ref: '#/components/headers/ProcessingRouteId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
    Error503:
      description: >-
        Service Unavailable (503). The service is temporarily unavailable, likely due to maintenance or high load.
        Please retry after a few moments.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/EchoRequestId'
        X-Correlation-Id:
          $ref: '#/components/headers/EchoCorrelationId'
        X-Institution-Id:
          $ref: '#/components/headers/EchoInstitutionId'
        X-User-Id:
          $ref: '#/components/headers/EchoUserId'
        X-UserContext-Id:
          $ref: '#/components/headers/EchoUserContextId'
        X-Processing-Route-Id:
          $ref: '#/components/headers/ProcessingRouteId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
    Error504:
      description: >-
        Gateway Timeout (504). The gateway did not receive a timely response from an upstream server. The request may or
        may not have been processed. Please retry with idempotency key to ensure safe retry.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/EchoRequestId'
        X-Correlation-Id:
          $ref: '#/components/headers/EchoCorrelationId'
        X-Institution-Id:
          $ref: '#/components/headers/EchoInstitutionId'
        X-User-Id:
          $ref: '#/components/headers/EchoUserId'
        X-UserContext-Id:
          $ref: '#/components/headers/EchoUserContextId'
        X-Processing-Route-Id:
          $ref: '#/components/headers/ProcessingRouteId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
  - bearerAuth: []
servers:
  - url: http://petstore.swagger.io/v1
paths:
  /pets:
    get:
      summary: List all pets
      operationId: listPets
      tags:
        - pets
      parameters:
        - name: limit
          in: query
          description: How many items to return at one time (max 100)
          required: false
          schema:
            type: integer
            maximum: 100
            format: int32
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/XInstitutionId'
        - $ref: '#/components/parameters/XUserId'
        - $ref: '#/components/parameters/XUserContextId'
      responses:
        '200':
          description: A paged array of pets
          headers:
            X-Request-Id:
              $ref: '#/components/headers/EchoRequestId'
            X-Correlation-Id:
              $ref: '#/components/headers/EchoCorrelationId'
            X-Institution-Id:
              $ref: '#/components/headers/EchoInstitutionId'
            X-User-Id:
              $ref: '#/components/headers/EchoUserId'
            X-UserContext-Id:
              $ref: '#/components/headers/EchoUserContextId'
            X-Processing-Route-Id:
              $ref: '#/components/headers/ProcessingRouteId'
            x-next:
              description: A link to the next page of responses
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pets'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '405':
          $ref: '#/components/responses/Error405'
        '406':
          $ref: '#/components/responses/Error406'
        '429':
          $ref: '#/components/responses/Error429'
        '500':
          $ref: '#/components/responses/Error500'
        '502':
          $ref: '#/components/responses/Error502'
        '503':
          $ref: '#/components/responses/Error503'
        '504':
          $ref: '#/components/responses/Error504'
    post:
      summary: Create a pet
      operationId: createPets
      tags:
        - pets
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Pet'
        required: true
      responses:
        '201':
          description: Null response
          headers:
            X-Request-Id:
              $ref: '#/components/headers/EchoRequestId'
            X-Correlation-Id:
              $ref: '#/components/headers/EchoCorrelationId'
            X-Institution-Id:
              $ref: '#/components/headers/EchoInstitutionId'
            X-User-Id:
              $ref: '#/components/headers/EchoUserId'
            X-UserContext-Id:
              $ref: '#/components/headers/EchoUserContextId'
            X-Processing-Route-Id:
              $ref: '#/components/headers/ProcessingRouteId'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '405':
          $ref: '#/components/responses/Error405'
        '406':
          $ref: '#/components/responses/Error406'
        '409':
          $ref: '#/components/responses/Error409'
        '422':
          $ref: '#/components/responses/Error422'
        '429':
          $ref: '#/components/responses/Error429'
        '500':
          $ref: '#/components/responses/Error500'
        '502':
          $ref: '#/components/responses/Error502'
        '503':
          $ref: '#/components/responses/Error503'
        '504':
          $ref: '#/components/responses/Error504'
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/XInstitutionId'
        - $ref: '#/components/parameters/XUserId'
        - $ref: '#/components/parameters/XUserContextId'
        - $ref: '#/components/parameters/IdempotencyKeyRequired'
  /pets/{petId}:
    get:
      summary: Info for a specific pet
      operationId: showPetById
      tags:
        - pets
      parameters:
        - name: petId
          in: path
          required: true
          description: The id of the pet to retrieve
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/XInstitutionId'
        - $ref: '#/components/parameters/XUserId'
        - $ref: '#/components/parameters/XUserContextId'
      responses:
        '200':
          description: Expected response to a valid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
          headers:
            X-Request-Id:
              $ref: '#/components/headers/EchoRequestId'
            X-Correlation-Id:
              $ref: '#/components/headers/EchoCorrelationId'
            X-Institution-Id:
              $ref: '#/components/headers/EchoInstitutionId'
            X-User-Id:
              $ref: '#/components/headers/EchoUserId'
            X-UserContext-Id:
              $ref: '#/components/headers/EchoUserContextId'
            X-Processing-Route-Id:
              $ref: '#/components/headers/ProcessingRouteId'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '405':
          $ref: '#/components/responses/Error405'
        '406':
          $ref: '#/components/responses/Error406'
        '429':
          $ref: '#/components/responses/Error429'
        '500':
          $ref: '#/components/responses/Error500'
        '502':
          $ref: '#/components/responses/Error502'
        '503':
          $ref: '#/components/responses/Error503'
        '504':
          $ref: '#/components/responses/Error504'
