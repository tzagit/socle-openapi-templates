      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BalanceCheckingReq'
      responses:
        '200':
          description: Balance checking OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceCheckingRes'
