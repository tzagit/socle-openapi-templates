                Response Code<br>Response code (also called message status) is provided as a 3 digit numeric
                code.<br>The possible values are:<br>Value :
                Label<br>---------------------------------------------------------------------<br>000 : OK : no hit in
                the operation; the operation can be accepted<br>001 : Hit(s) : at least one hit in the operation; the
                operation should be declined<br>007 : Non blocking : one or multiple non-blocking hits in the operation;
                the operation can be accepted<br>008 : Non checking : operation discarded by a rule; the operation can
                be accepted<br>100 : Error : technical error; the operation should be declined
          additionalProperties: false
