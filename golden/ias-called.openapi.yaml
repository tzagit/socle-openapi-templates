openapi: 3.1.1
info:
  title: APIs called by the Issuer Authorisation System
  version: 1.6.0
  description: The purpose of this API is for the Issuer Authorisation System to call the bank's host
  x-socle-version: 0.1.0
components:
  schemas:
    StandardError:
      type: object
      properties:
        code:
          type: string
          minLength: 1
          maxLength: 20
          description: Code d'erreur applicatif stable.
        text:
          type: string
          minLength: 1
          maxLength: 40
          description: Message d'erreur destiné au consommateur.
        developerText:
          type: string
          minLength: 1
          maxLength: 70
          description: Détail technique à destination des développeurs.
        moreInfo:
          type: string
          minLength: 1
          maxLength: 256
          description: Complément d'information / lien de documentation.
    BalanceCheckingReq:
      title: BalanceCheckingReq
      type: object
      description: ''
      properties:
        card:
          anyOf:
            - $ref: '#/components/schemas/Card'
            - type: 'null'
        acquirer:
          type:
            - object
            - 'null'
          description: ''
          properties:
            referenceIdentification:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 6
              description: Acquirer Reference Identification<br>Equivalent to DE32 part 1 in ISO8583 based protocols
            institutionId:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 5
              description: >-
                Bank Institution Identifier<br>Acquirer bank identifier (5 characters).<br>Equivalent to DE32 part 2 in
                ISO8583 based protocols
            postalAddress:
              anyOf:
                - $ref: '#/components/schemas/PostalAddress'
                - type: 'null'
            serviceSupportedPartialApprovalIndicator:
              type:
                - boolean
                - 'null'
              description: 'Acquirer Service supported : Partial Authorisation<br>Equivalent to DE059-0805-b1 in CBAE protocol'
          additionalProperties: false
        merchant:
          anyOf:
            - $ref: '#/components/schemas/Merchant'
            - type: 'null'
        terminal:
          anyOf:
            - $ref: '#/components/schemas/Terminal'
            - type: 'null'
        transaction:
          type: object
          description: ''
          properties:
            identification:
              $ref: '#/components/schemas/Identification'
            context:
              type: object
              description: ''
              properties:
                cardDataEntryMode:
                  anyOf:
                    - $ref: '#/components/schemas/CardDataEntryMode'
                    - type: 'null'
                debitCreditIndicator:
                  $ref: '#/components/schemas/DebitCreditIndicator'
                forwardingId:
                  type: string
                  pattern: ^[0-9]{1,11}$
                  description: >-
                    Transmitter ID or original Sender Id (for an advice)<br>Equivalent to DE33 in ISO8583 based
                    protocols
                operationReferenceId:
                  type: string
                  format: uuid
                  description: >-
                    Operation reference Internal to IAS<br>Unique identifier generated by the IAS to identify the
                    operation (request/response messages)<br>During an authorisation processing where the host is called
                    two times (to check the account and to advice the host), the operationReferenceId is the same on
                    both messages as it is an identifier of the transaction processed.
                panEntryMode:
                  $ref: '#/components/schemas/PanEntryMode'
                regulatoryAndTechnicalEnvironment:
                  type:
                    - string
                    - 'null'
                  pattern: ^[0-9A-Za-z]{2}$
                  description: Regulatory and technical environment<br>Equivalent to DE59.0200 in CBAE protocol
                transactionNature:
                  $ref: '#/components/schemas/TransactionNature'
              additionalProperties: false
              required:
                - debitCreditIndicator
                - forwardingId
                - operationReferenceId
                - panEntryMode
                - transactionNature
            saleReference:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 35
              description: Sale Reference Number<br>Equivalent to DE37 in ISO8583 based protocols
            totalAmount:
              $ref: '#/components/schemas/TotalAmount'
          additionalProperties: false
          required:
            - identification
            - context
            - totalAmount
      additionalProperties: false
      required:
        - transaction
    BalanceCheckingRes:
      title: BalanceCheckingRes
      type: object
      description: ''
      properties:
        response:
          type: object
          description: ''
          properties:
            authorisationCode:
              type: string
              pattern: ^[0-9A-Za-z]{1,6}$
              description: >-
                authorisation identification response<br>Authorisation response identification (also called autorisation
                number)<br>Equivalent to DE38 in ISO8583 based protocols<br>The authorisation identification response
                can be provided by the Host in its reponse. In this case it is also used by the IAS in its response to
                the authorisation request.<br>Or the authorisation identification response is calculated by the IAS.
            code:
              type: string
              pattern: ^[0-9A-Za-z]{1,6}$
              description: >-
                Response Code<br>Equivalent to DE39 in ISO8583 based protocols<br>The response code is provided as a 2
                digit numeric code.<br>In responses from a Host to messages sent by the IAS, the possible values
                are:<br>Value : Label<br>---------------------------------------------------------------------<br>00 :
                OK<br>05 : do not honour <br>4A : blocked account<br>10 : partial approval<br>51 : Insufficient
                fund<br>90 : System temporary shutdown<br>94 : Duplicate<br>96 : System malfunction<br><br>In
                authorisation advices, the response code corresponds to the final decision of the IAS (see ISO8583 based
                protocols specifications for possible values)
          additionalProperties: false
          required:
            - code
        transaction:
          type: object
          description: ''
          properties:
            partialAuthorisedAmount:
              type: object
              properties:
                amount:
                  type: string
                  pattern: ^\-?[0-9]{1,18}(\.?[0-9]{0,5})?$
                currency:
                  type: string
                  pattern: ^[0-9]{3}$
              description: >-
                Authorised amount (partial authorisation)<br>Amount and currency authorised either by the Host in its
                response or by the IAS in the notification (the authorised amount can be different from the requested
                amount in case of partial authorisation)<br>The curency is provided as a ISO 4217, Numeric-3
                code.<br>The amount is provided as a number of monetary units specified in a currency where the unit of
                currency is implied by the context and compliant with ISO 4217. The decimal separator is a dot.
          additionalProperties: false
      additionalProperties: false
      required:
        - response
    AdviceAuthReq:
      title: AdviceAuthReq
      type: object
      description: ''
      properties:
        card:
          type:
            - object
            - 'null'
          description: ''
          properties:
            primaryAccountNumberId:
              type:
                - string
                - 'null'
              format: uuid
              description: >-
                Primary Account Number ID<br>Identifier (also called PANid) associated to the PAN of the card.<br>The
                PANid is generated (in the form of an UUID v4) by Estreem during the processing of the subscription
                request sent to the CMS (either when the PAN is calculated by the CMS or when the PAN is provided by the
                bank).<br>The PANid is provided to the bank in the subscription response.<br>The PANid is used in
                further exchanges of the CMS and the IAS.
            encryptedPrimaryAccountNumber:
              type:
                - string
                - 'null'
              pattern: ^[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]*\.[A-Za-z0-9_-]*\.[A-Za-z0-9_-]+$
              description: >-
                encrypted pan<br>The encryption is done using JSON Web Encryption standard.<br>Once decrypted it
                represents a Primary Account Number (PAN), which is a 16 to 19 numeric characters string.
            sequenceNumber:
              type:
                - string
                - 'null'
              pattern: ^[0-9]{2,3}$
              description: Card Sequence Number<br>Equivalent to DE23 in ISO8583 based protocols
            expiryDate:
              type:
                - string
                - 'null'
              pattern: ^([0-9]{4})-(1[0-2]|0[1-9])$
              description: >-
                Expiry date<br>Format (ISO8601) : YYYY-MM ; Example 2024-12<br>Equivalent to DE14 in ISO8583 based
                protocols
            accountId:
              type:
                - string
                - 'null'
              pattern: ^[0-9a-zA-Z\-]{1,36}$
              description: >-
                Account Id linked to the card<br>Technical identifier of the banking account associated to the card
                contract/agreement<br>This identifier is provided to the CMS during the subscription by the bank.<br>It
                will be sent by the CMS to the IAS so that the IAS can use this identifier during the authorisation
                process to contact the banking Host (for balance check) or for standin purposes.
            accountNature:
              anyOf:
                - $ref: '#/components/schemas/AccountNature'
                - type: 'null'
            agreementEntityId:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 36
              description: >-
                Card agreement entity Id<br>Identifier of the physical or logical entity linked to the card contract
                (entity that signed the contract with the cardholder; for example, a branch).<br>This identifier is
                provided to the CMS during the subscription by the bank.<br>Afterward, it is used by the CMS to retrieve
                the entity data from the bank. (the API to retrieve these data are not supported in this version and the
                retrieval of these data is simulated by the CMS) and by the IAS in messages sent to the bank
            brand:
              type:
                - string
                - 'null'
              enum:
                - CBFR
                - MACD
                - VISA
              x-enumDescriptions:
                CBFR: CB
                MACD: Mastercard
                VISA: VISA
              description: >-
                Brand of the card (Scheme)<br>Equivalent to DE47.98 part 1 (network source) in CBAE protocol (domestic
                french data)<br>Value :
                Label<br>---------------------------------------------------------------------<br>CBFR  : CB<br>VISA  :
                VISA<br>MACD  : Mastercard
            paymentAccountReference:
              type:
                - string
                - 'null'
              pattern: ^[0-9A-Za-z]{1,29}$
              description: Payment account reference<br>(PAR)<br>Equivalent to DE57.0056 in CBAE protocol (domestic french data)
            productCode:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 50
              description: >-
                Product Code<br>Product code of the card contract/agreement<br>The values to be used during the
                subscription with the CMS are defined in the parameters associated to the product catalog.
            schemeProductCode:
              type:
                - string
                - 'null'
              pattern: ^[0-9]{1,9}$
              description: >-
                Card Product (Scheme)<br>Equivalent to DE47.98 part 2 (product code) in CBAE protocol (domestic french
                data)<br>The value depends on the brand of the card (cardBrand)
          additionalProperties: false
        paymentToken:
          type:
            - object
            - 'null'
          description: ''
          properties:
            value:
              type:
                - string
                - 'null'
              pattern: ^[0-9A-Za-z]{1,19}$
              description: Payment token value<br>Equivalent to DE105-1 in CBAE protocol
            expiryDate:
              type:
                - string
                - 'null'
              pattern: ^([0-9]{4})-(1[0-2]|0[1-9])$
              description: Token expiry date<br>Equivalent to DE105-2 in CBAE protocol
            location:
              type:
                - string
                - 'null'
              pattern: ^[0-9A-Za-z]{1,2}$
              description: Token location<br>Equivalent to DE105-7 in CBAE protocol
            requestorIdentification:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 35
              description: Identifier of a token provider requestor<br>Equivalent to DE105-03 in CBAE protocol
          additionalProperties: false
        acquirer:
          type:
            - object
            - 'null'
          description: ''
          properties:
            referenceIdentification:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 6
              description: Acquirer Reference Identification<br>Equivalent to DE32 part 1 in ISO8583 based protocols
            institutionId:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 5
              description: >-
                Bank Institution Identifier<br>Acquirer bank identifier (5 characters).<br>Equivalent to DE32 part 2 in
                ISO8583 based protocols
            postalAddress:
              anyOf:
                - $ref: '#/components/schemas/PostalAddress'
                - type: 'null'
            serviceSupportedPartialApprovalIndicator:
              type:
                - boolean
                - 'null'
              description: 'Acquirer Service supported : Partial Authorisation<br>Equivalent to DE059-0805-b1 in CBAE protocol'
            serviceSupportedPurchaseApprovalIndicator:
              type:
                - boolean
                - 'null'
              description: >-
                Acquirer Service supported : Partial Autorisation, partial with Cashback <br>Equivalent to DE059-0805-b2
                in CBAE protocol
            serviceSupportedReversalIndicator:
              type:
                - boolean
                - 'null'
              description: 'Acquirer Service supported : Reversal<br>Equivalent to DE059-0805-b3 in CBAE protocol'
            serviceSupportedSingleTapIndicator:
              type:
                - boolean
                - 'null'
              description: 'Acquirer Service supported : SingleTap<br>Equivalent to DE059-0805-b4 in CBAE protocol'
          additionalProperties: false
        merchant:
          anyOf:
            - $ref: '#/components/schemas/Merchant'
            - type: 'null'
        sponsoredMerchant:
          type:
            - object
            - 'null'
          description: ''
          properties:
            finalMerchantId:
              type:
                - string
                - 'null'
              minLength: 15
              maxLength: 15
              description: >-
                Identifier of final Merchant<br>Equivalent to DE57.0027 in CBAE protocol and to DE104.DS56.Tag02 in
                BASEI protocol
            independantSalesOrganisationId:
              type:
                - string
                - 'null'
              minLength: 15
              maxLength: 15
              description: id of independant sales organisation <br>Equivalent to DE57.0024 in CBAE protocol (domestic french data)
            marketPlaceId:
              type:
                - string
                - 'null'
              minLength: 15
              maxLength: 15
              description: >-
                Identification of Market Place<br>Equivalent to DE57.0026 in CBAE protocol and to DE104.DS56.Tag01 in
                BASEI protocol
            paymentFacilitatorId:
              type:
                - string
                - 'null'
              minLength: 15
              maxLength: 15
              description: >-
                Identifier of Payment Facilitator<br>Equivalent to DE57.0025 in CBAE protocol and to DE104.DS56.Tag01 in
                BASEI protocol
          additionalProperties: false
        terminal:
          type:
            - object
            - 'null'
          description: ''
          properties:
            id:
              type:
                - string
                - 'null'
              minLength: 8
              maxLength: 8
              description: Terminal identifier<br>Equivalent to DE41 in ISO8583 based protocols
            iTpta:
              type:
                - string
                - 'null'
              pattern: ^[0-9]{12}$
              description: >-
                Identifier of the point of acceptance terminal application<br>Point Of Interaction (POI) components
                identifier (ITP PA - ITP TA)<br>Equivalent to DE59.0215 in CBAE protocol (domestic french data)
            poiInformation:
              type:
                - string
                - 'null'
              enum:
                - CPOC
                - MPOC
                - MPOS
                - SPOC
              x-enumDescriptions:
                CPOC: >-
                  smartphone/tablet without dongle, when the card is read in contactless mode using the NFC device and
                  there is no PIN entry
                MPOC: >-
                  smartphone/tablet without dongle, when the card is read in contactless mode with PIN entry on the
                  device screen
                MPOS: smartphone/tablet with a PCI PTS dongle to read the card with PIN entry on the dongle
                SPOC: smartphone/tablet with a PCI PTS dongle to read the card with PIN entry on the device screen
              description: >-
                point of interaction information<br>Point Of Interaction (POI) information<br>Equivalent to DE47.31 in
                CBAE protocol (domestic french data)<br>Value : Label (ISO8583 based protocols
                value)<br>---------------------------------------------------------------------<br>MPOS  :
                Smartphone/tablet with a PCI PTS dongle to read the card with PIN entry on the dongle (1)<br>SPOC  :
                Smartphone/tablet with a PCI PTS dongle to read the card with PIN entry on the device screen
                (2)<br>CPOC  : Smartphone/tablet without dongle, when the card is read in contactless mode using the NFC
                device and there is no PIN entry (3)<br>MPOC  : Smartphone/tablet without dongle, when the card is read
                in contactless mode with PIN entry on the device screen (4)
            poiLogicalNumber:
              type:
                - string
                - 'null'
              pattern: ^[0-9A-Za-z]{3}$
              description: >-
                Logical number<br>Point Of Interaction (POI) logical number<br>Equivalent to DE59.0204 in CBAE protocol
                (domestic french data)
            acceptanceSysComponent:
              type:
                - object
                - 'null'
              description: ''
              properties:
                idInterbankAppSoftVersion:
                  type:
                    - string
                    - 'null'
                  minLength: 3
                  maxLength: 3
                  description: ' Acceptance System Components Identifier (ex ITP SA) - Interbank Application Software Version<br>Equivalent to DE59.0201.p4 in CBAE protocol (domestic french data)'
                idManufacturerCode:
                  type:
                    - string
                    - 'null'
                  minLength: 3
                  maxLength: 3
                  description: ' Acceptance System Components Identifier (ex ITP SA) - Manufacturer Code<br>Equivalent to DE59.0201.p1 in CBAE protocol (domestic french data)'
                idRefSpecVersion:
                  type:
                    - string
                    - 'null'
                  minLength: 3
                  maxLength: 3
                  description: ' Acceptance System Components Identifier (ex ITP SA) - Reference specification Version<br>Equivalent to DE59.0201.p2 in CBAE protocol (domestic french data)'
                idTerminalModelReference:
                  type:
                    - string
                    - 'null'
                  minLength: 3
                  maxLength: 3
                  description: ' Acceptance System Components Identifier (ex ITP SA) - Terminal Model Reference<br>Equivalent to DE59.0201.p3 in CBAE protocol (domestic french data)'
              additionalProperties: false
            cardReadingCapabilities:
              type:
                - string
                - 'null'
              enum:
                - CCCR
                - CCEC
                - CCMC
                - ICCR
                - KEYI
                - MAGS
                - MANU
                - NCEC
                - PBAS
                - REPV
                - UNKW
              x-enumDescriptions:
                CCCR: Contactless chip card reader
                CCEC: Contactless chip card reader - EMV chip context
                CCMC: Contactless chip card reader - magnetic stripe context
                ICCR: Integrated circuit card reader
                KEYI: Keypad input
                MAGS: Magstripe reader
                MANU: Manual, no terminal
                NCEC: No card entry Capability
                PBAS: Provided by a server
                REPV: Reserved for private use
                UNKW: Unknown
              description: >-
                Card Reading Capabilities<br>Card entry capability from the point of service data code<br>Equivalent to
                DE47.03 part 1 in CBAE protocol (domestic french data)<br>Value : Label (ISO8583 based protocols
                value)<br>---------------------------------------------------------------------<br>UNKW  : Unknown
                (0)<br>MANU  : Manual, no terminal (1)<br>MAGS  : Magstripe reader (2)<br>CCEC  : Contactless chip card
                reader - EMV chip context (3)<br>CCMC  : Contactless chip card reader - magnetic stripe context
                (4)<br>ICCR  : Integrated circuit card reader (5)<br>KEYI  : Keypad input (6)<br>CCCR  : Contactless
                chip card reader (8)<br>REPV  : Reserved for private use (9)<br>NCEC  : No card entry Capability
            countryCode:
              type:
                - string
                - 'null'
              pattern: ^[0-9]{3}$
              description: >-
                Acceptance System Country Code<br>Acceptance system country code (ISO 3166, Numeric-3
                code)<br>Equivalent to DE59.0205 in CBAE protocol (domestic french data)
            deviceType:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 2
              description: Device type<br>Equivalent to DE59.0710 in CBAE protocol
            visaAcceptanceCharacteristics:
              type:
                - string
                - 'null'
              pattern: ^[0-9]{1}$
              description: >-
                VISA terminal type.<br>Acceptance characteristics<br>Equivalent to DE59.0605 in CBAE protocol and to
                DE60.1 in BASEI protocol
          additionalProperties: false
        transaction:
          type: object
          description: ''
          properties:
            identification:
              type: object
              description: ''
              properties:
                endToEndTransId:
                  type: string
                  format: uuid
                  description: >-
                    End to End transaction Id<br>Unique identifier generated by the IAS to identify the
                    transaction.<br>On transactions received by the IAS :<br>- For authorisation and for authorisation
                    advice, this identifier is equivalent to the internal operation reference identifier
                    (operationReferenceId).<br>- For reversal transactions, this identifier is the identifier of the
                    original transaction.<br>During an authorisation processing where the host is called two times (to
                    check the account and to advice the host), the endToEndTransId is the same on both messages as it is
                    an identifier of the transaction processed.
                ecommerceTransactionId:
                  type:
                    - string
                    - 'null'
                  pattern: ^([0-9A-F][0-9A-F]){4,40}$
                  description: >-
                    Transaction identifier or cryptogram supplied by the acceptor<br>Unique reference number to identify
                    a secured electronic commerce transaction. This identifier is used in some electronic commerce
                    cryptogram calculation methods or is a cryptogram generated by the acceptance
                    solution.<br>Equivalent to DE59.0400 in CBAE protocol (domestic french data)
                localDateTime:
                  type: string
                  format: date-time
                  description: >-
                    Date Time in local region<br>Equivalent to DE12, DE13 and DE59.102 in ISO8583 based protocols<br>The
                    date and time are specified in the following form <YYYY-MM-DDThh:mm:ssz> (ISO8601 datetime format)
                reference:
                  type: string
                  minLength: 1
                  maxLength: 35
                  description: >-
                    Transaction Reference<br>Also called transaction audit number<br>Equivalent to DE11 in ISO8583 based
                    protocols
                transmissionGmtDateTime:
                  type: string
                  format: date-time
                  description: >-
                    Transmission date and time GMT<br>Equivalent to DE7 in ISO8583 based protocols<br>The date and time
                    are specified in the following form <YYYY-MM-DDThh:mm:ssz> (ISO8601 datetime format)
              additionalProperties: false
              required:
                - endToEndTransId
                - localDateTime
                - reference
                - transmissionGmtDateTime
            additionalElectronicCommerceDataElementsList:
              type:
                - array
                - 'null'
              items:
                type: object
                description: ''
                properties:
                  nomenclature:
                    type:
                      - string
                      - 'null'
                    enum:
                      - CBFR
                      - MCRD
                      - VISA
                    x-enumDescriptions:
                      CBFR: 3 (CB)
                      MCRD: 2 Mastercard
                      VISA: 1 Visa
                    description: >-
                      Nomenclature<br>Indicates the encoding of the 'additional data type'<br>Equivalent to DE59.0414
                      part 1 in CBAE protocol (domestic french data)<br>Value : Label (ISO8583 bases protocols
                      value)<br>----------------------------------------------------------------<br>CBFR  : CB
                      (3)<br>VISA  : VISA (1)<br>MCRD  : Mastercard (2)
                  typeOfAdditionalData:
                    type:
                      - string
                      - 'null'
                    enum:
                      - PAYL
                    x-enumDescriptions:
                      PAYL: Paylib
                    description: >-
                      Type of additional data<br>Equivalent to DE59.0414 part 2 in CBAE protocol (domestic french
                      data)<br>Value : Label (ISO8583 bases protocols
                      value)<br>----------------------------------------------------------------<br>PAYL  : Paylib  (02
                      for CB nomenclature)
                  authenticationMethod:
                    type:
                      - string
                      - 'null'
                    enum:
                      - NAUT
                      - OSHE
                      - OSSE
                      - OTPT
                      - REPA
                    x-enumDescriptions:
                      NAUT: No authentication
                      OSHE: OTP on secured hardware element (e.g. CAP, SIM)
                      OSSE: OTP on secured software element (e.g. SEA)
                      OTPT: OTP on telephone (e.g. SMS, SVI, token)
                      REPA: Repeatable password (e.g. date of birth, password, postal code)
                    description: >-
                      Additional Authentication Method<br>Additional authentication method used to authenticate the
                      electronic commerce transaction<br>Equivalent to DE59.0414 part 4 in CBAE protocol (domestic
                      french data)<br>Value : Label (ISO8583 bases protocols
                      value)<br>----------------------------------------------------------------<br>NAUT : No additional
                      authentication (00)<br>REPA : Repeatable password (e.g. date of birth, password, postal code)
                      (01)<br>OTPT : OTP via telephone (e.g. SMS, SVI, token) (02)<br>OSSE : OTP via secured software
                      element (e.g. SEA) (03)<br>OSHE : OTP via secured hardware element (e.g. CAP, SIM) (04)
                  authenticationReasonCode:
                    type:
                      - string
                      - 'null'
                    enum:
                      - IRME
                      - IUNA
                      - IURM
                      - NAAR
                      - RMEU
                      - RMRA
                    x-enumDescriptions:
                      IRME: 03 Initial use, Risk management engine unavailable
                      IUNA: 01 Initial use, No additional authentication requested
                      IURM: 02 Initial use, Risk management engine requests additional strong authentication
                      NAAR: 11 No additional authentication requested
                      RMEU: 13 Risk management engine unavailable
                      RMRA: 12 Risk management engine requests additional strong authentication
                    description: Additional Authentication Reason Code
                additionalProperties: false
            billingAmount:
              anyOf:
                - $ref: '#/components/schemas/BillingAmount'
                - type: 'null'
            cardholderTotalAmount:
              type:
                - object
                - 'null'
              properties:
                amount:
                  type:
                    - string
                    - 'null'
                  pattern: ^\-?[0-9]{1,18}(\.?[0-9]{0,5})?$
              description: >-
                Cardholder total amount<br>Total amount of the current transaction and of completed financial
                transactions that a terminal has performed for a cardholder<br>Equivalent to DE59.0207 in CBAE protocol
                (domestic french data)
            commercialOperation:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 255
              description: Commercial operation<br>Equivalent to DE62 in CBAE protocol,  private use
            context:
              type: object
              description: ''
