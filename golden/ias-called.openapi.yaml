    AdviceReversalReq:
      title: AdviceReversalReq
      type: object
      description: ''
      properties:
        card:
          anyOf:
            - $ref: '#/components/schemas/Card'
            - type: 'null'
        acquirer:
          type:
            - object
            - 'null'
          description: ''
          properties:
            referenceIdentification:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 6
              description: Acquirer Reference Identification<br>Equivalent to DE32 part 1 in ISO8583 based protocols
            institutionId:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 5
              description: >-
                Bank Institution Identifier<br>Acquirer bank identifier (5 characters).<br>Equivalent to DE32 part 2 in
                ISO8583 based protocols
            postalAddress:
              anyOf:
                - $ref: '#/components/schemas/PostalAddress'
                - type: 'null'
          additionalProperties: false
        merchant:
          anyOf:
            - $ref: '#/components/schemas/Merchant'
            - type: 'null'
        terminal:
          anyOf:
            - $ref: '#/components/schemas/Terminal'
            - type: 'null'
        transaction:
          type: object
          description: ''
          properties:
            identification:
              type: object
              description: ''
              properties:
                endToEndTransId:
                  type:
                    - string
                    - 'null'
                  format: uuid
                  description: >-
                    End to End transaction Id<br>Unique identifier generated by the IAS to identify the
                    transaction.<br>On transactions received by the IAS :<br>- For authorisation and for authorisation
                    advice, this identifier is equivalent to the internal operation reference identifier
                    (operationReferenceId).<br>- For reversal transactions, this identifier is the identifier of the
                    original transaction.<br>During an authorisation processing where the host is called two times (to
                    check the account and to advice the host), the endToEndTransId is the same on both messages as it is
                    an identifier of the transaction processed.
                localDateTime:
                  type: string
                  format: date-time
                  description: >-
                    Date Time in local region<br>Equivalent to DE12, DE13 and DE59.102 in ISO8583 based protocols<br>The
                    date and time are specified in the following form <YYYY-MM-DDThh:mm:ssz> (ISO8601 datetime format)
                reference:
                  type: string
                  minLength: 1
                  maxLength: 35
                  description: >-
                    Transaction Reference<br>Also called transaction audit number<br>Equivalent to DE11 in ISO8583 based
                    protocols
                transmissionGmtDateTime:
                  type: string
                  format: date-time
                  description: >-
                    Transmission date and time GMT<br>Equivalent to DE7 in ISO8583 based protocols<br>The date and time
                    are specified in the following form <YYYY-MM-DDThh:mm:ssz> (ISO8601 datetime format)
              additionalProperties: false
              required:
                - localDateTime
                - reference
                - transmissionGmtDateTime
            billingAmount:
              anyOf:
                - $ref: '#/components/schemas/BillingAmount'
                - type: 'null'
            context:
              type: object
              description: ''
              properties:
                cardDataEntryMode:
                  anyOf:
                    - $ref: '#/components/schemas/CardDataEntryMode'
                    - type: 'null'
                debitCreditIndicator:
                  $ref: '#/components/schemas/DebitCreditIndicator'
                forwardingId:
                  type: string
                  pattern: ^[0-9]{1,11}$
                  description: >-
                    Transmitter ID or original Sender Id (for an advice)<br>Equivalent to DE33 in ISO8583 based
                    protocols
                functionCode:
                  type:
                    - string
                    - 'null'
                  pattern: ^[0-9]{3}$
                  description: >-
                    Function code<br>Function code : specifies the purpose of a message within its message
                    class<br>Equivalent to DE59.0100 in CBAE protocol (domestic french data)
                internationalAuthorisationNetwork:
                  type:
                    - string
                    - 'null'
                  pattern: ^([0-9A-F][0-9A-F]){1}$
                  description: >-
                    International authorisation network identifier<br>International authorisation network
                    identifier<br>Equivalent to DE59.0803 in CBAE protocol (domestic french data)<br>Value :
                    Label<br>---------------------------------------------------------------------<br>1     :
                    Visa<br>2     : Mastercard
                messageReasonCode:
                  type:
                    - string
                    - 'null'
                  pattern: ^[0-9]{4}$
                  description: >-
                    Message reason code<br>Message reason code<br>Equivalent to DE59.0101 in CBAE protocol (domestic
                    french data)
                operationReferenceId:
                  type: string
                  format: uuid
                  description: >-
                    Operation reference Internal to IAS<br>Unique identifier generated by the IAS to identify the
                    operation (request/response messages)<br>During an authorisation processing where the host is called
                    two times (to check the account and to advice the host), the operationReferenceId is the same on
                    both messages as it is an identifier of the transaction processed.
                panEntryMode:
                  $ref: '#/components/schemas/PanEntryMode'
                regulatoryAndTechnicalEnvironment:
                  type:
                    - string
                    - 'null'
                  pattern: ^[0-9A-Za-z]{2}$
                  description: >-
                    Regulatory and technical environment<br>Regulatory and Technical Environment<br>Equivalent to
                    DE59.0200 in CBAE protocol
                transactionNature:
                  $ref: '#/components/schemas/TransactionNature'
              additionalProperties: false
              required:
                - debitCreditIndicator
                - forwardingId
                - operationReferenceId
                - panEntryMode
                - transactionNature
            originalUniqueIdNetwork:
              anyOf:
                - $ref: '#/components/schemas/OriginalUniqueIdNetwork'
                - type: 'null'
            originalUniqueIdValue:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 49
              description: >-
                Original unique transaction identifier Value<br>Value of the original unique identifier of the Customer
                Initiated Transaction used as reference for linking.<br>Equivalent to DE47.99 part 2 in CBAE protocol
                (domestic french data)
            replacementAmount:
              type:
                - object
                - 'null'
              properties:
                amount:
                  type:
                    - string
                    - 'null'
                  pattern: ^\-?[0-9]{1,18}(\.?[0-9]{0,5})?$
                currency:
                  type:
                    - string
                    - 'null'
                  pattern: ^[0-9]{3}$
              description: >-
                Replacement amount<br>Amount and currency of the replacement amount in a reversal<br>Used to indicate
                the amount actually granted to the cardholder in a reversal transaction. If this field is missing, the
                entire transaction was cancelled.<br>The curency is provided as a ISO 4217, Numeric-3 code.<br>The
                amount is provided as a number of monetary units specified in a currency where the unit of currency is
                implied by the context and compliant with ISO 4217. The decimal separator is a dot.
            replacementBillingAmount:
              type:
                - object
                - 'null'
              properties:
                amount:
                  type:
                    - string
                    - 'null'
                  pattern: ^\-?[0-9]{1,18}(\.?[0-9]{0,5})?$
                currency:
                  type:
                    - string
                    - 'null'
                  pattern: ^[0-9]{3}$
              description: >-
                New amount, cardholder billing<br>Amount and currency of the cardholder billing replacement amount in a
                reversal<br>The curency is provided as a ISO 4217, Numeric-3 code.<br>The amount is provided as a number
                of monetary units specified in a currency where the unit of currency is implied by the context and
                compliant with ISO 4217. The decimal separator is a dot.
            reversalReason:
              type: string
              pattern: ^[0-9A-Za-z]{1,5}$
              description: >-
                Reason of reversal transported<br>The reversal reason code is provided as a 2 digit numeric
                code.<br>This data is received by IAS (equivalent to DE39) and advised to a Host with the following
                possible values :<br>Value :
                Label<br>---------------------------------------------------------------------<br>17 : Customer
                cancellation<br>20 : Invalid response<br>32 : Transaction partially completed<br>59 : Fraud<br>68 :
                Response not received<br>99 : Error on initiator domain
            saleReference:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 35
              description: >-
                Sale Reference Number<br>Sale/Retrieval reference number<br>Equivalent to DE37 in ISO8583 based
                protocols
            totalAmount:
              $ref: '#/components/schemas/TotalAmount'
            additionalResponseData:
              anyOf:
                - $ref: '#/components/schemas/AdditionalResponseData'
                - type: 'null'
          additionalProperties: false
          required:
            - identification
            - context
            - reversalReason
            - totalAmount
        originalTransaction:
          type: object
          description: ''
          properties:
            authorisationCode:
              type:
                - string
                - 'null'
              pattern: ^[0-9A-Za-z]{1,6}$
              description: >-
                authorisation code from original transaction stored<br>Authorisation identification code (also called
                autorisation number) from the original transaction<br>Equivalent to DE38 (from the original transaction)
                in ISO8583 based protocols
            localDateTime:
              type: string
              format: date-time
              description: >-
                local transaction date time in original message<br>Equivalent to DE12, DE13 and DE59.102 (from the
                original transaction) in ISO8583 based protocols<br>The date and time are specified in the following
                form <YYYY-MM-DDThh:mm:ssz> (ISO8601 datetime format)
            reference:
              type: string
              minLength: 1
              maxLength: 35
              description: >-
                reference of initial transaction<br>Transaction reference/audit number of the original
                transaction<br>Equivalent to DE90 part 2 in ISO8583 based protocols
            responseCode:
              type:
                - string
                - 'null'
              pattern: ^[0-9A-Za-z]{1,6}$
              description: >-
                Response Code from Original Transaction<br>Response code from the original transaction<br>In
                authorisation advices, this corresponds to DE39 received in the advice.<br>In reversals, this
                corresponds to DE39 from the original transaction stored in IAS (if the reversal has been matched with
                the original transaction)<br>The response code is provided as a 2 digit numeric code.
            transmissionGmtDateTime:
              type: string
              format: date-time
              description: >-
                initial transmission gmt date time<br>Transmission date and time of the original
                transaction<br>Equivalent to DE90 part 3 in ISO8583 based protocols<br>The date and time are specified
                in the following form <YYYY-MM-DDThh:mm:ssz> (ISO8601 datetime format)
          additionalProperties: false
          required:
            - localDateTime
            - reference
            - transmissionGmtDateTime
      additionalProperties: false
      required:
        - transaction
        - originalTransaction
