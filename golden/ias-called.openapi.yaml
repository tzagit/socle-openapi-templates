        - response
    CardDataEntryMode:
      type: string
      enum:
        - BRCD
        - CCEC
        - CCMD
        - COFT
        - EDGR
        - EDRP
        - ICCR
        - MAAR
        - MAGS
        - MANE
        - MFLB
        - NOTS
        - OCRD
        - PVBS
      x-enumDescriptions:
        BRCD: Bar code
        CCEC: Contactless chip transaction using EMV chip data
        CCMD: Contactless chip transaction using magstripe data
        COFT: Card-on-File
        EDGR: EMV downgraded
        EDRP: Digital Secure Remote Payment using EMV
        ICCR: Integrated circuit card reader
        MAAR: Magstripe, after attempt to read chip
        MAGS: Magstripe
        MANE: Manual entry
        MFLB: Manual fallback from an EMV capable terminal
        NOTS: Not specified
        OCRD: OCR
        PVBS: Provided by a server
      description: >-
        Card entry mode<br>Card data entry technology used at Point-Of-Service. <br>It is determined by the IAS from
        transaction data such as the POS entry mode, EMV cryptogram presence, wallet information, etc.<br>It is
        providing more accurate information than the card data entry mode (panEntryMode).<br>Value :
        Label<br>---------------------------------------------------------------------<br>NOTS  : Not specified<br>MAGS 
        : Magstripe<br>CCEC  : Contactless chip transaction using EMV chip data<br>CCMD  : Contactless chip transaction
        using magstripe data<br>ICCR  : Integrated circuit card reader <br>MANE  : Manual entry<br>MAAR  : Magstripe,
        after attempt to read chip<br>PVBS  : Provided by a server<br>COFT  : Card-on-File<br>BRCD  : Bar code<br>EDRP 
        : Digital Secure Remote Payment using EMV<br>EDGR  : EMV downgraded<br>MFLB  : Manual fallback from an EMV
        capable terminal<br>OCRD  : OCR
    DebitCreditIndicator:
      type: string
      enum:
        - CRDT
        - DEBT
      x-enumDescriptions:
        CRDT: Credit
        DEBT: Debit
      description: >-
        Debit or Credit Indicator<br>Value :
        Label<br>---------------------------------------------------------------------<br>CRDT  : Credit<br>DEBT  :
        Debit
    PanEntryMode:
      type: string
      enum:
        - BARC
        - CHFG
        - CHFM
        - CHON
        - CUCD
        - CUMD
        - DSRP
        - FILE
        - MAGO
        - MAGS
        - MANU
        - NOTS
        - OPTI
        - SERV
      x-enumDescriptions:
        BARC: Barcode
        CHFG: Chip mode with fallback to magstripe mode
        CHFM: Chip mode with fallback to manual mode (incoming only)
        CHON: Chip only
        CUCD: Contactless using chip data
        CUMD: Contactless using magstripe data
        DSRP: PAN/Token entry via ECOM containing DSRP cryptogram
        FILE: Card-on-file
        MAGO: Magstripe only (incoming only)
        MAGS: Magstripe only
        MANU: Manual
        NOTS: Not specified (incoming only)
        OPTI: Optical code (incoming only)
        SERV: Provided by a server (wallet)
      description: >-
        Pan Entry Mode (CBAE)<br>Card data entry mode used at the point of service<br>Equivalent to DE22 part 1 in
        ISO8583 based protocols<br>Value : Label (ISO8583 based protocols
        value)<br>---------------------------------------------------------------------<br>NOTS  : Not specified (00)
        <br>MANU  : Manual (01)<br>MAGS  : Magstripe only (02)<br>OPTI  : Optical code (04)<br>BARC  : Barcode
        (03)<br>CHON  : Chip only (05)<br>CUCD  : Contactless using chip data (07)<br>FILE  : Card-on-file (10)<br>CHFM 
        : Chip mode with fallback to manual mode (79)<br>CHFG  : Chip mode with fallback to magstripe mode (90)<br>SERV 
        : Provided by a server (wallet) (82)<br>MAGO  : Magstripe only (61)<br>CUMD  : Contactless using magstripe data
        (91)<br>DSRP  : PAN/Token entry via ECOM containing DSRP cryptogram (09)
    TransactionNature:
      type: string
      enum:
        - ATMW
        - AVFI
        - CRED
        - FTCR
        - FTDE
        - MACA
        - PCSB
        - PUGS
        - QCAR
        - QUCA
      x-enumDescriptions:
        ATMW: 'ATM withdrawal  -  cf CBAE 1.5 Value : 01'
        AVFI: 'Available funds inquiry  - cf CBAE 1.5 Value : 30'
        CRED: 'Credit - CBAE 1.5 Value : 20'
        FTCR: 'Funds transfer, credit - cf CBAE 1.5 Value : 42'
        FTDE: 'Funds transfer, debit  - cf CBAE 1.5 Value : 41'
        MACA: 'Manual cash - CBAE 1.5 Value : 17'
        PCSB: Purchase with cashback
        PUGS: 'Purchase of goods or  services : Cf CBAE 1.5 Value : 00'
        QCAR: 'Quasi-cash refund - cf CBAE 1.5 Value : 28'
        QUCA: 'Quasi-cash - cf CBAE 1.5 Value : 11'
      description: >-
        Nature of transaction<br>Equivalent to DE3 in ISO8583 based protocols<br>Value : Label (ISO8583 based protocols
        value)<br>---------------------------------------------------------------------<br>PUGS  : Purchase of goods or
        services (00)<br>ATMW  : ATM withdrawal (01)<br>PCSB  : Purchase with cash-back (09)<br>QUCA  : Quasi-cash
        (11)<br>MACA  : Manual cash or cash-advance (17)<br>CRED  : Credit (20)<br>QCAR  : Quasi-cash refund
        (28)<br>AVFI : Available funds inquiry (30)<br>FTDE  : Funds transfer, debit (41)<br>FTCR  : Funds transfer,
        credit (42)
    AccountUsage:
      type: string
      enum:
        - CHAC
        - CRAC
        - DEAC
        - DECL
        - DEDA
        - INAC
        - INLA
        - LOAC
        - PRAC
        - PWNF
        - RELA
        - SAAC
        - UNAC
      x-enumDescriptions:
        CHAC: 'CBAE 1.5 Value : 36  Charge account'
        CRAC: 'CBAE 1.5 Value : 30  Credit account'
        DEAC: 'CBAE 1.5 Value : 20  Debit account'
        DECL: 'CBAE 1.5 Value : 33  Deferred clearing'
        DEDA: 'CBAE 1.5 Value : 35  Deferred debit account'
        INAC: "50 MCD\_: Investment Account"
        INLA: "90 MCD\_: Loan Account"
        LOAC: "91 MCD\_: Installment Loan Account"
        PRAC: 'CBAE 1.5 Value : 60  Prepaid account'
        PWNF: 'CBAE 1.5 Value : 00  Payment or Transaction with no special features'
        RELA: "92 MCD\_: Real Estate Loan Account"
        SAAC: 'CBAE 1.5 Value : 10  Saving account'
        UNAC: "40 VISA & MCD\_: “Universal” Account"
      description: Total Amount
    UniqueTransactionIdNetwork:
      type: string
      enum:
        - CBFR
        - MACD
        - VISA
      x-enumDescriptions:
        CBFR: CB
        MACD: MasterCard
        VISA: VISA
      description: >-
        Transaction Id network<br>Entity responsible for encoding the unique transaction identifier<br>Equivalent to
        DE47.95 part 1 (nomenclature) in CBAE protocol (domestic french data)<br>Value :
        Label<br>---------------------------------------------------------------------<br>CBFR  : CB<br>VISA  :
        VISA<br>MACD  : Mastercard
    AccountNature:
      type: string
      enum:
        - CHAC
        - CRAC
        - DEAC
        - DECL
        - DEDA
        - INAC
        - INLA
        - LOAC
        - PRAC
        - PWNF
        - RELA
        - SAAC
        - UNAC
      x-enumDescriptions:
        CHAC: 'CBAE 1.5 Value : 36  Charge account'
        CRAC: 'CBAE 1.5 Value : 30  Credit account'
        DEAC: 'CBAE 1.5 Value : 20  Debit account'
        DECL: 'CBAE 1.5 Value : 33  Deferred clearing'
        DEDA: 'CBAE 1.5 Value : 35  Deferred debit account'
        INAC: "50 MCD\_: Investment Account"
        INLA: "90 MCD\_: Loan Account"
        LOAC: "91 MCD\_: Installment Loan Account"
        PRAC: 'CBAE 1.5 Value : 60  Prepaid account'
        PWNF: 'CBAE 1.5 Value : 00  Payment or Transaction with no special features'
        RELA: "92 MCD\_: Real Estate Loan Account"
        SAAC: 'CBAE 1.5 Value : 10  Saving account'
        UNAC: "40 VISA & MCD\_: “Universal” Account"
      description: >-
        Nature of the account linked to the card<br>This nature is provided to the CMS during the subscription by the
        bank.<br>Note : in the current version of the CMS the nature of the account is not defined in the subscription
        API of the CMS and a default account nature (PWNF-00) will be used.<br><br>It will be sent by the CMS to the IAS
        so that the IAS can use this nature during the authorisation process to contact the banking Host (for balance
        check) or for standin purposes.<br><br>In most cases, PWNF-00 (default), DEAC-20 (debit) or CRAC-30 (credit)
        will be used for debit and credit accounts but for completeness the following values are available.<br>Value :
        Label (ISO8583 based protocols
        value)<br>---------------------------------------------------------------------<br>CRAC : CBAE 1.5 Value : 30 
        Credit account <br>CHAC : CBAE 1.5 Value : 36  Charge account <br>DEAC : CBAE 1.5 Value : 20  Debit account
        <br>DECL : CBAE 1.5 Value : 33  Deferred clearing <br>DEDA : CBAE 1.5 Value : 35  Deferred debit account
        <br>PRAC : CBAE 1.5 Value : 60  Prepaid account <br>PWNF : CBAE 1.5 Value : 00  Payment or Transaction with no
        special features <br>SAAC : CBAE 1.5 Value : 10  Saving account <br>INAC : 50 MCD : Investment Account<br>INLA :
        90 MCD : Loan Account<br>LOAC : 91 MCD : Installment Loan Account<br>RELA : 92 MCD : Real Estate Loan
        Account<br>UNAC : 40 VISA & MCD : 'Universal' Account
    PostalAddress:
      type: object
      properties:
        countryCode:
          type:
            - string
            - 'null'
          pattern: ^[0-9]{3}$
      description: >-
        Acquiring institution postal address<br>Acquirer country code (ISO 3166, Numeric-3 code)<br>Equivalent to DE19
        in ISO8583 based protocols<br>The country code is set in the attribute countryCode of the structure
    PosOfficialPostalAddress:
      type: object
      properties:
        streetName:
          type:
            - string
            - 'null'
          minLength: 1
          maxLength: 70
        postCode:
          type:
            - string
            - 'null'
          minLength: 1
          maxLength: 16
        townName:
          type:
            - string
            - 'null'
          minLength: 1
          maxLength: 70
        countrySubdivisionMajorCode:
          type:
            - string
            - 'null'
          pattern: ^[A-Z]{2,3}$
        countryCode:
          type:
            - string
            - 'null'
          pattern: ^[0-9]{3}$
      description: >-
        Official, main administrative Postal Address<br>Card acceptor city, postal code, country, state and street
        address<br>Equivalent to the city, postal code, country and street address extracted from DE43 and to the state
        from DE59.806 in ISO8583 based protocols<br>The country is provided as a ISO 3166, Numeric-3 code
    Identification:
      type: object
      description: ''
      properties:
        endToEndTransId:
          type: string
          format: uuid
          description: >-
            End to End transaction Id<br>Unique identifier generated by the IAS to identify the transaction.<br>On
            transactions received by the IAS :<br>- For authorisation and for authorisation advice, this identifier is
            equivalent to the internal operation reference identifier (operationReferenceId).<br>- For reversal
            transactions, this identifier is the identifier of the original transaction.<br>During an authorisation
            processing where the host is called two times (to check the account and to advice the host), the
            endToEndTransId is the same on both messages as it is an identifier of the transaction processed.
        localDateTime:
          type: string
          format: date-time
          description: >-
            Date Time in local region<br>Equivalent to DE12, DE13 and DE59.102 in ISO8583 based protocols<br>The date
            and time are specified in the following form <YYYY-MM-DDThh:mm:ssz> (ISO8601 datetime format)
        reference:
          type: string
          minLength: 1
          maxLength: 35
          description: >-
            Transaction Reference<br>Also called transaction audit number<br>Equivalent to DE11 in ISO8583 based
            protocols
        transmissionGmtDateTime:
          type: string
          format: date-time
          description: >-
            Transmission date and time GMT<br>Equivalent to DE7 in ISO8583 based protocols<br>The date and time are
            specified in the following form <YYYY-MM-DDThh:mm:ssz> (ISO8601 datetime format)
      additionalProperties: false
      required:
        - endToEndTransId
        - localDateTime
        - reference
        - transmissionGmtDateTime
    TotalAmount:
      type: object
      description: >-
        Amount, currency of the transaction are mandatory and account usage of the account is optional

        In the checkBalance :
         - If DE6 present, equivalent to DE6 and DE51 in ISO8583 based protocols (cardholder billing amount and currency)
         - Otherwise, equivalent to DE4 and DE49 in ISO8583 based protocols (transaction amount and currency)
        In other messages :
         - Equivalent to DE4 and DE49 in ISO8583 based protocols
        The curency is provided as a ISO 4217, Numeric-3 code.

        The amount is provided as a number of monetary units specified in a currency where the unit of currency is
        implied by the context and compliant with ISO 4217. The decimal separator is a dot.


        For totalAmount.accountUsage : Type of usage indicator to identify whether the debit is immediate or deferred

        Value : Label

        ---------------------------------------------------------------------

        DEAC  : Debit account (Immediate)

        DEDA  : Deferred debit account
      properties:
        amount:
          type: string
          pattern: ^\-?[0-9]{1,18}(\.?[0-9]{0,5})?$
          description: Total Amount
        currency:
          type: string
          pattern: ^[0-9]{3}$
          description: Total Amount
        accountUsage:
          anyOf:
            - $ref: '#/components/schemas/AccountUsage'
            - type: 'null'
      additionalProperties: false
      required:
        - amount
        - currency
    BillingAmount:
      type: object
      properties:
        amount:
          type:
            - string
            - 'null'
          pattern: ^\-?[0-9]{1,18}(\.?[0-9]{0,5})?$
        currency:
          type:
            - string
            - 'null'
          pattern: ^[0-9]{3}$
        exchangeRate:
          type:
            - string
            - 'null'
          pattern: ^[0-9]{1,25}(\.?[0-9]{0,13})?$
      description: >-
        Billing amount<br>Amount, currency and exchange rate of the cardholder billing <br>Equivalent to DE6, DE51 and
        DE10 in ISO8583 based protocols<br>This data element is used only in messages where both amounts (transaction
        and cardholder amounts) are supported. As a consequence, it is not used in checkBalance message where
        totalAmount is used to exchange one single amount.<br>The curency is provided as a ISO 4217, Numeric-3
        code.<br>The amount is provided as a number of monetary units specified in a currency where the unit of currency
        is implied by the context and compliant with ISO 4217. The decimal separator is a dot.<br>The exchange rate is
        expressed as a decimal
    OriginalUniqueIdNetwork:
      type: string
      enum:
        - CBFR
        - MACD
        - VISA
      x-enumDescriptions:
        CBFR: CB
        MACD: MasterCard
        VISA: VISA
      description: >-
        Original unique transaction identifier Network<br>Entity responsible for encoding the original unique identifier
        <br>Equivalent to DE47.99 part 1 (nomenclature) in CBAE protocol (domestic french data)<br><br>Value :
        Label<br>------------------------------------------------------------------------<br>CBFR  : CB<br>VISA  :
        VISA<br>MACD  : Mastercard
    AdditionalResponseData:
      type: object
      description: ''
      properties:
        uniqueTransactionIdNetwork:
          anyOf:
            - $ref: '#/components/schemas/UniqueTransactionIdNetwork'
            - type: 'null'
        uniqueTransactionIdValue:
          type:
            - string
            - 'null'
          minLength: 1
          maxLength: 49
          description: >-
            Unique transaction Id value<br>Value of the unique transaction identifier generated by the entity
            responsible (uniqueTransactionNetworkSource)<br>Equivalent to DE47.95 part 2 (unique transaction identifier)
            in CBAE protocol and to DE62.2 in BASEI protocol
      additionalProperties: false
    Card:
      type: object
      description: ''
      properties:
        primaryAccountNumberId:
          type:
            - string
            - 'null'
          format: uuid
          description: >-
            Primary Account Number ID<br>Identifier (also called PANid) associated to the PAN of the card.<br>The PANid
            is generated (in the form of an UUID v4) by Estreem during the processing of the subscription request sent
            to the CMS (either when the PAN is calculated by the CMS or when the PAN is provided by the bank).<br>The
            PANid is provided to the bank in the subscription response.<br>The PANid is used in further exchanges of the
            CMS and the IAS.
        encryptedPrimaryAccountNumber:
          type:
            - string
            - 'null'
          pattern: ^[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]*\.[A-Za-z0-9_-]*\.[A-Za-z0-9_-]+$
          description: >-
            encrypted pan<br>The encryption is done using JSON Web Encryption standard.<br>Once decrypted it represents
            a Primary Account Number (PAN), which is a 16 to 19 numeric characters string.
        sequenceNumber:
          type:
            - string
            - 'null'
          pattern: ^[0-9]{2,3}$
          description: Card Sequence Number<br>Equivalent to DE23 in ISO8583 based protocols
        expiryDate:
          type:
            - string
            - 'null'
          pattern: ^([0-9]{4})-(1[0-2]|0[1-9])$
          description: 'Expiry date<br>Format (ISO8601) : YYYY-MM ; Example 2024-12<br>Equivalent to DE14 in ISO8583 based protocols'
        productCode:
          type:
            - string
            - 'null'
          minLength: 1
          maxLength: 50
          description: >-
            Product Code<br>Product code of the card contract/agreement<br>The values to be used during the subscription
            with the CMS are defined in the parameters associated to the product catalog.
        accountId:
          type:
            - string
            - 'null'
          pattern: ^[0-9a-zA-Z\-]{1,36}$
          description: >-
            Account Id linked to the card<br>Technical identifier of the banking account associated to the card
            contract/agreement<br>This identifier is provided to the CMS during the subscription by the bank.<br>It will
            be sent by the CMS to the IAS so that the IAS can use this identifier during the authorisation process to
            contact the banking Host (for balance check) or for standin purposes.
        accountNature:
          anyOf:
            - $ref: '#/components/schemas/AccountNature'
            - type: 'null'
        agreementEntityId:
          type:
            - string
            - 'null'
          minLength: 1
          maxLength: 36
          description: >-
            Card agreement entity Id<br>Identifier of the physical or logical entity linked to the card contract (entity
            that signed the contract with the cardholder; for example, a branch).<br>This identifier is provided to the
            CMS during the subscription by the bank.<br>Afterward, it is used by the CMS to retrieve the entity data
            from the bank. (the API to retrieve these data are not supported in this version and the retrieval of these
            data is simulated by the CMS) and by the IAS in messages sent to the bank
      additionalProperties: false
    Merchant:
      type: object
      description: ''
      properties:
        posAgreementId:
          type:
            - string
            - 'null'
          pattern: ^[0-9A-Za-z]{1,40}$
          description: >-
            Point Of Sale agreement's Identifier (bank code + SIRET for France or TVA for Europe …)<br>Equivalent to
            DE42 in ISO8583 based protocols
        contractNumber:
          type:
            - string
            - 'null'
          minLength: 1
          maxLength: 15
          description: >-
            Execution Contract Number<br>Acceptor contract number<br>Equivalent to DE59.0202 in CBAE protocol (domestic
            french data)
        processingName:
          type:
            - string
            - 'null'
          minLength: 1
          maxLength: 70
          description: >-
            Merchant Name used by all acquisition services.<br>Card acceptor name<br>Equivalent to the acceptor name
            extracted from DE43 in ISO8583 based protocols
        categoryCode:
          type:
            - string
            - 'null'
          pattern: ^[0-9]{4}$
          description: Merchant Category Code<br>(MCC)<br>Equivalent to DE18 in ISO8583 based protocols
        posOfficialPostalAddress:
          anyOf:
            - $ref: '#/components/schemas/PosOfficialPostalAddress'
            - type: 'null'
        posRegistrationNumber:
          type:
            - string
            - 'null'
          pattern: ^[0-9A-Za-z]{1,35}$
          description: >-
            Point Of Sale Registration Number<br>Company registration number (SIRET)<br>Equivalent to DE47.96 in CBAE
            protocol (domestic french data)
      additionalProperties: false
    Terminal:
      type: object
      description: ''
      properties:
        id:
          type:
            - string
            - 'null'
          minLength: 8
          maxLength: 8
          description: Terminal identifier<br>Equivalent to DE41 in ISO8583 based protocols
      additionalProperties: false
  parameters:
    XRequestId:
      name: X-Request-Id
      in: header
      required: false
      description: >-
        A universally unique identifier (UUID) assigned to this individual request, used for tracing and debugging
        across distributed services.
      schema:
        type: string
        format: uuid
      example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
    XCorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      description: >-
        A universally unique identifier (UUID) that groups multiple related requests belonging to the same logical
        operation or business transaction, enabling cross-service correlation.
      schema:
        type: string
        format: uuid
      example: 7d5c2b9e-2f3a-4c1d-8e6f-9a0b1c2d3e4f
    XInstitutionId:
      name: X-Institution-Id
      in: header
      required: true
      description: A unique identifier representing the banking institution context (bank code) associated with the request.
      schema:
        type: string
        minLength: 3
        maxLength: 20
      example: BANK-FR-001
    XUserId:
      name: X-User-Id
      in: header
      required: false
      description: A unique identifier representing the authenticated user who initiated the action.
      schema:
        type: string
        maxLength: 128
      example: user-42
    XUserContextId:
      name: X-UserContext-Id
      in: header
      required: false
      description: >-
        A unique identifier representing the user group or organizational context under which the request is being
        performed.
      schema:
        type: string
        maxLength: 4
      example: u42
    IdempotencyKeyRequired:
      name: Idempotency-Key
      in: header
      required: true
      description: >-
        A client-generated unique key ensuring that retrying the same request multiple times produces the same result
        without duplicate side effects.
      schema:
        type: string
        format: uuid
      example: 9b2e4a17-6c3d-4f2a-b1e8-0d7c5a3f2b91
    XProcessingRouteId:
      name: X-Processing-Route-Id
      in: header
      required: false
      description: An identifier indicating the processing route selected by the infrastructure for this message.
      schema:
        type: string
        maxLength: 36
      example: prod.eu-west-1.silo-1
  headers:
    EchoRequestId:
      description: Echoes the corresponding request header if provided in the request.
      required: false
      schema:
        type: string
        format: uuid
      example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
    EchoCorrelationId:
      description: Echoes the corresponding request header if provided in the request.
      required: false
      schema:
        type: string
        format: uuid
      example: 7d5c2b9e-2f3a-4c1d-8e6f-9a0b1c2d3e4f
    EchoInstitutionId:
      description: Echoes the corresponding request header if provided in the request.
      required: false
      schema:
        type: string
        minLength: 3
        maxLength: 20
      example: BANK-FR-001
    EchoUserId:
      description: Echoes the corresponding request header if provided in the request.
      required: false
      schema:
        type: string
        maxLength: 128
      example: user-42
    EchoUserContextId:
      description: Echoes the corresponding request header if provided in the request.
      required: false
      schema:
        type: string
        maxLength: 4
      example: u42
    ProcessingRouteId:
      description: An identifier indicating the processing route selected by the infrastructure for this message.
      required: false
      schema:
        type: string
        maxLength: 36
      example: prod.eu-west-1.silo-1
  responses:
    Error400:
      description: >-
        Bad request (400). The request contains invalid parameters, malformed syntax, or missing required fields. Check
        the error details in the response body for specific validation issues.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/EchoRequestId'
        X-Correlation-Id:
          $ref: '#/components/headers/EchoCorrelationId'
        X-Institution-Id:
          $ref: '#/components/headers/EchoInstitutionId'
        X-User-Id:
          $ref: '#/components/headers/EchoUserId'
        X-UserContext-Id:
          $ref: '#/components/headers/EchoUserContextId'
        X-Processing-Route-Id:
          $ref: '#/components/headers/ProcessingRouteId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
    Error401:
      description: >-
        Unauthorized (401). Authentication is required but was not provided or the provided credentials are invalid.
        Ensure you have included a valid Bearer token in the Authorization header.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/EchoRequestId'
        X-Correlation-Id:
          $ref: '#/components/headers/EchoCorrelationId'
        X-Institution-Id:
          $ref: '#/components/headers/EchoInstitutionId'
        X-User-Id:
          $ref: '#/components/headers/EchoUserId'
        X-UserContext-Id:
          $ref: '#/components/headers/EchoUserContextId'
        X-Processing-Route-Id:
          $ref: '#/components/headers/ProcessingRouteId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
    Error403:
      description: >-
        Forbidden (403). The request is authenticated but lacks the necessary permissions to access the requested
        resource. Contact your administrator to request access.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/EchoRequestId'
        X-Correlation-Id:
          $ref: '#/components/headers/EchoCorrelationId'
        X-Institution-Id:
          $ref: '#/components/headers/EchoInstitutionId'
        X-User-Id:
          $ref: '#/components/headers/EchoUserId'
        X-UserContext-Id:
          $ref: '#/components/headers/EchoUserContextId'
        X-Processing-Route-Id:
          $ref: '#/components/headers/ProcessingRouteId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
    Error405:
      description: >-
        Method Not Allowed (405). The HTTP method used is not supported for the requested resource. Check the API
        documentation for allowed methods on this endpoint.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/EchoRequestId'
        X-Correlation-Id:
          $ref: '#/components/headers/EchoCorrelationId'
        X-Institution-Id:
          $ref: '#/components/headers/EchoInstitutionId'
        X-User-Id:
          $ref: '#/components/headers/EchoUserId'
        X-UserContext-Id:
          $ref: '#/components/headers/EchoUserContextId'
