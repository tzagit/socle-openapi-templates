        Request for banking account balance verification sent to the Host system by the IAS.<br><br>The path must not
        have any parameters. The parameters to identify the account are in the body of the request.<br>Depending of the
        Host system processing, these parameters may be, for example, :<br>   - cardAgreementAccountId with
        cardAgreementAccountNature<br>   - (encryptedPrimaryAccountNumber or tokenPrimaryAccountNumber) with
        (cardSequenceNumber or productCode)
      tags:
