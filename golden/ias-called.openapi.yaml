              required: false
              description: Idempotency Key, to avoid duplicate processing of the same message.
              schema:
                type: string
                format: uuid
                description: Idempotency Key, to avoid duplicate processing of the same message.
        '400':
          $ref: '#/components/responses/Error400'
        '401':
