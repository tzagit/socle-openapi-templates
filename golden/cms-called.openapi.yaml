openapi: 3.1.1
info:
  title: APIs called by the Card Management System
  version: 1.4.0
  description: >-
    The purpose of this API is for the Card Management System to call the bank to retrieve cardholder data and card
    agreement owner data
  contact:
    name: ESTREEM API support team
    url: https://estreem.eu
    email: support@estreem.eu
  x-dictionary-version: _DICO_ESTREEM_v21.8.xlsx
  x-socle-version: 0.1.0
  x-socle-type: called
components:
  schemas:
    StandardError:
      type: object
      properties:
        code:
          type: string
          minLength: 1
          maxLength: 20
          description: Code d'erreur applicatif stable.
        text:
          type: string
          minLength: 1
          maxLength: 40
          description: Message d'erreur destiné au consommateur.
        developerText:
          type: string
          minLength: 1
          maxLength: 70
          description: Détail technique à destination des développeurs.
        moreInfo:
          type: string
          minLength: 1
          maxLength: 256
          description: Complément d'information / lien de documentation.
    CardholderRes:
      description: ''
      type: object
      properties:
        id:
          description: >-
            Cardholder Id<br>Technical identifier of the cardholder in the banking system.<br>This identifier is
            provided during the subscription by the bank.<br>Afterwards, it is used by the CMS to retrieve the
            cardholder data from the bank.
          type: string
          pattern: ^[0-9a-zA-Z\-]{1,36}$
        civility:
          description: >-
            cardholder title<br>Civility of the cardholder<br>The data is defined as a 16 characters string but at this
            stage the CMS service only uses the first 10 characters
          type: string
          maxLength: 16
          minLength: 1
        firstName:
          description: >-
            first name<br>The first name is defined as 70 characters strings but, at this stage, the CMS service only
            uses up to the first 40 characters.
          type: string
          maxLength: 70
          minLength: 1
        lastName:
          description: >-
            last name<br>The last name is defined as 70 characters strings but, at this stage, the CMS service only uses
            up to the first 40 characters.
          type: string
          maxLength: 70
          minLength: 1
        dateOfBirth:
          description: Date of birth of cardholder
          type: string
          format: date
        birthPlace:
          description: Cardholder birth place
          type: string
          maxLength: 50
          minLength: 1
        birthCountryCode:
          description: Cardholder birth country code<br>Birth country code of the cardholder (ISO 3166, Numeric-3 code)
          type: string
          pattern: ^[0-9]{3}$
        countryCode:
          description: country code of cardholder<br>Cardholder residence country code (ISO 3166, Numeric-3 code)
          type: string
          pattern: ^[0-9]{3}$
        gender:
          description: Cardholder Gender
          type: string
          maxLength: 10
          minLength: 1
        localLanguageCode:
          description: >-
            local language code <br>Language to be used for communication with the cardholder<br>This language is sent
            by the CMS to the card manufacturer for the manufacturer to edit letters in the cardholder's language<br>The
            language code is defined in accordance with ISO 639-1 and ISO 639-2.
          type: string
          example: fra
          pattern: ^[a-z]{2,3}$
        cellPhone:
          description: >-
            Cardholder cellphone number<br>Cardholder personal cellular phone number<br>Format : International phone
            number E164 standard
          type: string
          example: '+14151231234'
          pattern: ^\+(\d{1,3})[-\s]?(\d{1,3})[-\s]?(\d{6,10})$
        phoneNumber:
          description: >-
            phone number<br>Cardholder personal landline phone number<br>Format : International phone number E164
            standard
          type: string
          example: '+14151231234'
          pattern: ^\+(\d{1,3})[-\s]?(\d{1,3})[-\s]?(\d{6,10})$
        proPhone:
          description: >-
            Cardholder pro phone number<br>Cardholder professional phone number<br>Format : International phone number
            E164 standard
          type: string
          example: '+14151231234'
          pattern: ^\+(\d{1,3})[-\s]?(\d{1,3})[-\s]?(\d{6,10})$
        email:
          description: email address
          type: string
          format: email
        postalAddress:
          description: >-
            Postal Address<br>Principal postal address of a cardholder used by default when non explicit shipping
            conditions are provided by the bank<br>postalAddressID is the postalAddress identifier which may be provided
            by the bank in the subscription and which will correspond to the identifier provided upon retrieval of the
            cardholder details.<br>The data are used to format the address on a letter as follows :<br>- Line 1 is set
            using the civility/firstName/lastName data which are provided separately<br>- Line 2 is set using the
            room<br>- Line 3 is set using the floor<br>- Line 4 is set using the streetName<br>- Line 5 is set by
            concatenating the postBox and the townNameLocation<br>- Line 6 is set by concatenating the postCode and the
            townName<br>- Line 7 is set using the countryCode (country name determined from the ISO3166 numeric-3
            code)<br>postalAddressID, townName and countryCode are required.<br>At least one of (room, floor, streetName
            or townNameLocation) is required.<br>The room, floor, streetName, townNameLocation and townName are defined
            as 70 characters  strings but, at this stage, the CMS service only uses up to the first 38 characters.
          type: object
          properties:
            postalAddressID:
              type: string
              maxLength: 36
              minLength: 1
            room:
              type: string
              maxLength: 70
              minLength: 1
            floor:
              type: string
              maxLength: 70
              minLength: 1
            streetName:
              type: string
              maxLength: 70
              minLength: 1
            postBox:
              type: string
              maxLength: 16
              minLength: 1
            townNameLocation:
              type: string
              maxLength: 70
              minLength: 1
            postCode:
              type: string
              maxLength: 16
              minLength: 1
            townName:
              type: string
              maxLength: 70
              minLength: 1
            countryCode:
              type: string
              pattern: ^[0-9]{3}$
        riskLevel:
          description: >-
            Represent the level of risk linked to the card <br>Represents the level of risk used for card manufacturing
            : it correponds to a profile sent to the card manufacturer in order to set limits on the chip<br>The data is
            retrieved together with the cardholder data.<br>The values to be used are defined in the parameters
            associated to the product catalog.
          type: string
          pattern: ^[0-9A-Za-z]{1,10}$
        secondaryPostalAddress:
          description: >-
            Cardholder secondary postal address<br>postalAddressID is the postalAddress identifier which may be provided
            by the bank in the subscription and which will correspond to the identifier provided upon retrieval of the
            cardholder details.<br>The data are used to format the address on a letter as follows :<br>- Line 1 is set
            using the civility/firstName/lastName data which are provided separately <br>- Line 2 is set using the
            room<br>- Line 3 is set using the floor<br>- Line 4 is set using the streetName<br>- Line 5 is set by
            concatenating the postBox and the townNameLocation<br>- Line 6 is set by concatenating the postCode and the
            townName<br>- Line 7 is set using the countryCode (country name determined from the ISO3166 numeric-3
            code)<br>postalAddressID, townName and countryCode are required.<br>At least one of (room, floor, streetName
            or townNameLocation) is required.<br>The room, floor, streetName, townNameLocation and townName are defined
            as 70 characters strings but, at this stage, the CMS service only uses up to the first 38 characters.
          type: object
          properties:
            postalAddressID:
              type: string
              maxLength: 36
              minLength: 1
            room:
              type: string
              maxLength: 70
              minLength: 1
            floor:
              type: string
              maxLength: 70
              minLength: 1
            streetName:
              type: string
              maxLength: 70
              minLength: 1
            postBox:
              type: string
              maxLength: 16
              minLength: 1
            townNameLocation:
              type: string
              maxLength: 70
              minLength: 1
            postCode:
              type: string
              maxLength: 16
              minLength: 1
            townName:
              type: string
              maxLength: 70
              minLength: 1
            countryCode:
              type: string
              pattern: ^[0-9]{3}$
      additionalProperties: false
      required:
        - id
        - firstName
        - lastName
        - countryCode
        - localLanguageCode
        - postalAddress
      title: CardholderRes
    CardAgreementEntityRes:
      description: ''
      type: object
      properties:
        name:
          description: >-
            Card agreement entity name<br>Name of the physical or logical entity linked to the card contract/agreement
            (entity that signed the contract with the cardholder; for example, a branch).
          type: string
          maxLength: 256
          minLength: 1
        postalAddress:
          description: >-
            Postal address of the card agreement entity (or branch) <br>Postal address of the physical or logical entity
            linked to the card contract/agreement (entity that signed the contract with the cardholder; for example, a
            branch).<br>postalAddressID is the postalAddress identifier which may be provided by the bank in the
            subscription and which will correspond to the identifier provided upon retrieval of the cardholder
            details.<br>The data are used to format the address on a letter as follows :<br>- Line 1 is set entity name
            which is provided separately <br>- Line 2 is set using the department (professionnal address) or the room
            (personal address)<br>- Line 3 is set using the floor<br>- Line 4 is set using the streetName<br>- Line 5 is
            set by concatenating the postBox and the townNameLocation<br>- Line 6 is set by concatenating the postCode
            and the townName<br>- Line 7 is set using the countryCode (country name determined from the ISO3166
            numeric-3 code)<br>postalAddressID, townName and countryCode are required.<br>At least one of (department,
            room, floor, streetName or townNameLocation) is required.<br>The department, room, floor, streetName,
            townNameLocation and townName are defined as 70 characters strings but, at this stage, the CMS service only
            uses up to the first 38 characters.
          type: object
          properties:
            postalAddressID:
              type: string
              maxLength: 36
              minLength: 1
            department:
              type: string
              maxLength: 70
              minLength: 1
            room:
              type: string
              maxLength: 70
              minLength: 1
            floor:
              type: string
              maxLength: 70
              minLength: 1
            streetName:
              type: string
              maxLength: 70
              minLength: 1
            postBox:
              type: string
              maxLength: 16
              minLength: 1
            townNameLocation:
              type: string
              maxLength: 70
              minLength: 1
            postCode:
              type: string
              maxLength: 16
              minLength: 1
            townName:
              type: string
              maxLength: 70
              minLength: 1
            countryCode:
              type: string
              pattern: ^[0-9]{3}$
      additionalProperties: false
      required:
        - name
        - postalAddress
      title: CardAgreementEntityRes
    OwnerOfCardAgreementRes:
      description: ''
      type: object
      properties:
        id:
          description: >-
            Card agreement owner id<br>Technical identifier of the owner of the card agreement in the banking
            system.<br>This identifier can be provided during the subscription by the bank if the owner of the card
            agreement is different from the cardholder.<br>Afterwards, it is used by the CMS to retrieve the owner data
            from the bank.
          type: string
          pattern: ^[0-9a-zA-Z\-]{1,36}$
        civility:
          description: >-
            Civility of the owner<br>Civility of the owner of the card agreement if the owner is a person (otherwise
            this field should be absent)<br>The data is defined as a 16 characters string but at this stage the CMS
            service only uses the first 10 characters.
          type: string
          maxLength: 16
          minLength: 1
        firstName:
          description: >-
            First name<br>First name of the owner of the card agreement if the owner is a person (otherwise this field
            should be absent)<br>The first name is defined as 70 characters strings but, at this stage, the CMS service
            only uses up to the first 40 characters.
          type: string
          maxLength: 70
          minLength: 1
        lastName:
          description: >-
            Last name<br>Last name of the owner of the card agreement if the owner is a person (otherwise this field
            should be absent)<br>The last name is defined as 70 characters strings but, at this stage, the CMS service
            only uses up to the first 40 characters.
          type: string
          maxLength: 70
          minLength: 1
        companyName:
          description: >-
            Company Name<br>Company name of the owner of the card agreement if the owner is a company (otherwise this
            field should be absent)
          type: string
          maxLength: 50
          minLength: 1
        postalAddress:
          description: >-
            Postal Address<br>postalAddressID is the postalAddress identifier which may be provided by the bank in the
            subscription and which will correspond to the identifier provided upon retrieval of the cardholder
            details.<br>The data are used to format the address on a letter as follows :<br>- Line 1 is set using the
            civility/firstName/lastName/companyName data which are provided separately<br>- Line 2 is set using either
            the department (professionnal address) or the room (personal address)<br>- Line 3 is set using the
            floor<br>- Line 4 is set using the streetName<br>- Line 5 is set by concatenating the postBox and the
            townNameLocation<br>- Line 6 is set by concatenating the postCode and the townName<br>- Line 7 is set using
            the countryCode (country name determined from the ISO3166 numeric-3 code)<br>postalAddressID, townName and
            countryCode are required.<br>At least one of (department, room, floor, streetName or townNameLocation) is
            required.<br>The department, room, floor, streetName, townNameLocation and townName are defined as 70
            characters strings but, at this stage, the CMS service only uses up to the first 38 characters.
          type: object
          properties:
            postalAddressID:
              type: string
              maxLength: 36
              minLength: 1
            department:
              type: string
              maxLength: 70
              minLength: 1
            room:
              type: string
              maxLength: 70
              minLength: 1
            floor:
              type: string
              maxLength: 70
              minLength: 1
            streetName:
              type: string
              maxLength: 70
              minLength: 1
            postBox:
              type: string
              maxLength: 16
              minLength: 1
            townNameLocation:
              type: string
              maxLength: 70
              minLength: 1
            postCode:
              type: string
              maxLength: 16
              minLength: 1
            townName:
              type: string
              maxLength: 70
              minLength: 1
            countryCode:
              type: string
              pattern: ^[0-9]{3}$
      additionalProperties: false
      required:
        - id
        - postalAddress
      title: OwnerOfCardAgreementRes
  parameters:
    XRequestId:
      name: X-Request-Id
      in: header
      required: false
      description: >-
        A universally unique identifier (UUID) assigned to this individual request, used for tracing and debugging
        across distributed services.
      schema:
        type: string
        format: uuid
      example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
    XCorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      description: >-
        A universally unique identifier (UUID) that groups multiple related requests belonging to the same logical
        operation or business transaction, enabling cross-service correlation.
      schema:
        type: string
        format: uuid
      example: 7d5c2b9e-2f3a-4c1d-8e6f-9a0b1c2d3e4f
    XInstitutionId:
      name: X-Institution-Id
      in: header
      required: true
      description: A unique identifier representing the banking institution context (bank code) associated with the request.
      schema:
        type: string
        minLength: 3
        maxLength: 20
      example: '30004'
    XUserId:
      name: X-User-Id
      in: header
      required: false
      description: A unique identifier representing the authenticated user who initiated the action.
      schema:
        type: string
        maxLength: 128
      example: user-42
    XUserContextId:
      name: X-UserContext-Id
      in: header
      required: false
      description: >-
        A unique identifier representing the user group or organizational context under which the request is being
        performed.
      schema:
        type: string
        maxLength: 4
      example: u42
    XProcessingRouteId:
      name: X-Processing-Route-Id
      in: header
      required: false
      description: An identifier indicating the processing route selected by the infrastructure for this message.
      schema:
        type: string
        maxLength: 36
      example: prod.eu-west-1.silo-1
  headers:
    EchoRequestId:
      description: Echoes the corresponding request header if provided in the request.
      required: false
      schema:
        type: string
        format: uuid
      example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
    EchoCorrelationId:
      description: Echoes the corresponding request header if provided in the request.
      required: false
      schema:
        type: string
        format: uuid
      example: 7d5c2b9e-2f3a-4c1d-8e6f-9a0b1c2d3e4f
    EchoInstitutionId:
      description: Echoes the corresponding request header if provided in the request.
      required: false
      schema:
        type: string
        minLength: 3
        maxLength: 20
      example: '30004'
    EchoUserId:
      description: Echoes the corresponding request header if provided in the request.
      required: false
      schema:
        type: string
        maxLength: 128
      example: user-42
    EchoUserContextId:
      description: Echoes the corresponding request header if provided in the request.
      required: false
      schema:
        type: string
        maxLength: 4
      example: u42
    ProcessingRouteId:
      description: An identifier indicating the processing route selected by the infrastructure for this message.
      required: false
      schema:
        type: string
        maxLength: 36
      example: prod.eu-west-1.silo-1
  responses:
    Error400:
      description: >-
        Bad request (400). The request contains invalid parameters, malformed syntax, or missing required fields. Check
        the error details in the response body for specific validation issues.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/EchoRequestId'
        X-Correlation-Id:
          $ref: '#/components/headers/EchoCorrelationId'
        X-Institution-Id:
          $ref: '#/components/headers/EchoInstitutionId'
        X-User-Id:
          $ref: '#/components/headers/EchoUserId'
        X-UserContext-Id:
          $ref: '#/components/headers/EchoUserContextId'
        X-Processing-Route-Id:
          $ref: '#/components/headers/ProcessingRouteId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
    Error401:
      description: >-
        Unauthorized (401). Authentication is required but was not provided or the provided credentials are invalid.
        Ensure you have included a valid Bearer token in the Authorization header.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/EchoRequestId'
        X-Correlation-Id:
          $ref: '#/components/headers/EchoCorrelationId'
        X-Institution-Id:
          $ref: '#/components/headers/EchoInstitutionId'
        X-User-Id:
          $ref: '#/components/headers/EchoUserId'
        X-UserContext-Id:
          $ref: '#/components/headers/EchoUserContextId'
        X-Processing-Route-Id:
          $ref: '#/components/headers/ProcessingRouteId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
    Error403:
      description: >-
        Forbidden (403). The request is authenticated but lacks the necessary permissions to access the requested
        resource. Contact your administrator to request access.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/EchoRequestId'
        X-Correlation-Id:
          $ref: '#/components/headers/EchoCorrelationId'
        X-Institution-Id:
          $ref: '#/components/headers/EchoInstitutionId'
        X-User-Id:
          $ref: '#/components/headers/EchoUserId'
        X-UserContext-Id:
          $ref: '#/components/headers/EchoUserContextId'
        X-Processing-Route-Id:
          $ref: '#/components/headers/ProcessingRouteId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
    Error404:
      description: >-
        Not Found (404). The requested resource does not exist or has been deleted. Verify the resource ID and endpoint
        URL.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/EchoRequestId'
        X-Correlation-Id:
          $ref: '#/components/headers/EchoCorrelationId'
        X-Institution-Id:
          $ref: '#/components/headers/EchoInstitutionId'
        X-User-Id:
          $ref: '#/components/headers/EchoUserId'
        X-UserContext-Id:
          $ref: '#/components/headers/EchoUserContextId'
        X-Processing-Route-Id:
          $ref: '#/components/headers/ProcessingRouteId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
    Error405:
      description: >-
        Method Not Allowed (405). The HTTP method used is not supported for the requested resource. Check the API
        documentation for allowed methods on this endpoint.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/EchoRequestId'
        X-Correlation-Id:
          $ref: '#/components/headers/EchoCorrelationId'
        X-Institution-Id:
          $ref: '#/components/headers/EchoInstitutionId'
        X-User-Id:
          $ref: '#/components/headers/EchoUserId'
        X-UserContext-Id:
          $ref: '#/components/headers/EchoUserContextId'
        X-Processing-Route-Id:
          $ref: '#/components/headers/ProcessingRouteId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
    Error406:
      description: >-
        Not Acceptable (406). The requested resource is capable of generating only content not acceptable according to
        the Accept headers sent in the request. Adjust the Accept header to a supported media type.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/EchoRequestId'
        X-Correlation-Id:
          $ref: '#/components/headers/EchoCorrelationId'
        X-Institution-Id:
          $ref: '#/components/headers/EchoInstitutionId'
        X-User-Id:
          $ref: '#/components/headers/EchoUserId'
        X-UserContext-Id:
          $ref: '#/components/headers/EchoUserContextId'
        X-Processing-Route-Id:
          $ref: '#/components/headers/ProcessingRouteId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
    Error429:
      description: >-
        Too Many Requests (429). Rate limit has been exceeded. Wait before making additional requests. Check response
        headers for rate limit information.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/EchoRequestId'
        X-Correlation-Id:
          $ref: '#/components/headers/EchoCorrelationId'
        X-Institution-Id:
          $ref: '#/components/headers/EchoInstitutionId'
        X-User-Id:
          $ref: '#/components/headers/EchoUserId'
        X-UserContext-Id:
          $ref: '#/components/headers/EchoUserContextId'
        X-Processing-Route-Id:
          $ref: '#/components/headers/ProcessingRouteId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
    Error500:
      description: >-
        Internal Server Error (500). An unexpected error occurred on the server. Please retry the request. If the
        problem persists, contact support with the X-Request-Id from the response.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/EchoRequestId'
        X-Correlation-Id:
          $ref: '#/components/headers/EchoCorrelationId'
        X-Institution-Id:
          $ref: '#/components/headers/EchoInstitutionId'
        X-User-Id:
          $ref: '#/components/headers/EchoUserId'
        X-UserContext-Id:
          $ref: '#/components/headers/EchoUserContextId'
        X-Processing-Route-Id:
          $ref: '#/components/headers/ProcessingRouteId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
    Error502:
      description: >-
        Bad Gateway (502). An error occurred while the gateway received an invalid response from an upstream server.
        Please retry the request. If the problem persists, contact support.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/EchoRequestId'
        X-Correlation-Id:
          $ref: '#/components/headers/EchoCorrelationId'
        X-Institution-Id:
          $ref: '#/components/headers/EchoInstitutionId'
        X-User-Id:
          $ref: '#/components/headers/EchoUserId'
        X-UserContext-Id:
          $ref: '#/components/headers/EchoUserContextId'
        X-Processing-Route-Id:
          $ref: '#/components/headers/ProcessingRouteId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
    Error503:
      description: >-
        Service Unavailable (503). The service is temporarily unavailable, likely due to maintenance or high load.
        Please retry after a few moments.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/EchoRequestId'
        X-Correlation-Id:
          $ref: '#/components/headers/EchoCorrelationId'
        X-Institution-Id:
          $ref: '#/components/headers/EchoInstitutionId'
        X-User-Id:
          $ref: '#/components/headers/EchoUserId'
        X-UserContext-Id:
          $ref: '#/components/headers/EchoUserContextId'
        X-Processing-Route-Id:
          $ref: '#/components/headers/ProcessingRouteId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
    Error504:
      description: >-
        Gateway Timeout (504). The gateway did not receive a timely response from an upstream server. The request may or
        may not have been processed. Please retry with idempotency key to ensure safe retry.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/EchoRequestId'
        X-Correlation-Id:
          $ref: '#/components/headers/EchoCorrelationId'
        X-Institution-Id:
          $ref: '#/components/headers/EchoInstitutionId'
