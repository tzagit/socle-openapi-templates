        - $ref: '#/components/parameters/XInstitutionId'
        - $ref: '#/components/parameters/XUserId'
        - $ref: '#/components/parameters/XUserContextId'
      responses:
        '200':
          description: Research OK (avec liste vide si aucun contrat carte trouvé)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListofagreementsRes'
          headers:
            X-Request-Id:
              $ref: '#/components/headers/EchoRequestId'
            X-Correlation-Id:
              $ref: '#/components/headers/EchoCorrelationId'
            X-Institution-Id:
              $ref: '#/components/headers/EchoInstitutionId'
            X-User-Id:
              $ref: '#/components/headers/EchoUserId'
            X-UserContext-Id:
              $ref: '#/components/headers/EchoUserContextId'
            X-Processing-Route-Id:
              $ref: '#/components/headers/ProcessingRouteId'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '405':
          $ref: '#/components/responses/Error405'
        '406':
          $ref: '#/components/responses/Error406'
        '429':
          $ref: '#/components/responses/Error429'
        '500':
          $ref: '#/components/responses/Error500'
        '502':
          $ref: '#/components/responses/Error502'
        '503':
          $ref: '#/components/responses/Error503'
        '504':
          $ref: '#/components/responses/Error504'
    post:
      operationId: createCardAgreement
      summary: Create a card agreement and dependencies (subscription) (CMS4_001)
      description: >-
        In Estreem's dictionnary, the term 'agreement' is used to represent the 'contract'.<br>Within the subscription
        service, the bank provides a cardholder identifier and may provide an owner identifier and/or a branch
        identifier. The cardholder, owner and branch data will be retrieved from the bank using these identifiers and
        through services exposed by the bank.<br>The subscription service covers the creation of both physical and
        digital cards. The product code and the type of card support allows to identify if a card is created under a
        physical or digital form.<br>After subscription, depending of the card product configuration, the cardStatus can
        be either 'validated' or 'activated'.
      tags:
        - Card Agreements
      parameters:
        - name: acquiringChannel
          in: header
          description: "Communication channel used to initiate the request<br>This channel identifies the origin of the request such as a web banking application, a branch system, a back-office system, etc.<br>Value<br>---------------------------------------------------------------------<br>BKOF : Back office (back-office agents)<br>BTCH : Batch processing (reserved value for the processor’s batch processing of files<br>BRNH : Branch (customer advisor)<br>CCNT : Call Center<br>OBNK :Open banking (selfcare on mobiles or tablets)<br>UNKN : Unknown<br>USR1 : User defined 1 (usage defined by the bank)<br>USR2 : User defined 2 \_(usage defined by the bank)<br>USIN : User interface (reserved value for the processor’s UIs)<br>WBNK : Web banking (selfcare on a computer)"
          required: false
          schema:
            $ref: '#/components/schemas/Shared'
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/XInstitutionId'
        - $ref: '#/components/parameters/XUserId'
        - $ref: '#/components/parameters/XUserContextId'
        - $ref: '#/components/parameters/IdempotencyKeyRequired'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CardAgreementReq'
      responses:
        '201':
          description: Card agreement created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardAgreementRes'
          headers:
            X-Request-Id:
              $ref: '#/components/headers/EchoRequestId'
            X-Correlation-Id:
              $ref: '#/components/headers/EchoCorrelationId'
            X-Institution-Id:
              $ref: '#/components/headers/EchoInstitutionId'
            X-User-Id:
