              endDateTime:
                type:
                  - string
                  - 'null'
                format: date-time
                description: >-
                  End date and time of the temporary shipping condition<br>When a temporary shipping condition is set an
                  end date and time is defined<br>The date and time are specified in the following form
                  <YYYY-MM-DDThh:mm:ssz> (ISO8601 datetime format)
            additionalProperties: false
            required:
              - code
      additionalProperties: false
      required:
        - shippingConditionList
