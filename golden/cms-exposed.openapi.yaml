    post:
      operationId: blockCard
      summary: Initiate individual card blocking (CMS11_008)
      description: >-
        By default, the blocking service of the CMS initiates the manufacturing of a new card when blocking the current
        card.<br>A remanufacturing indicator allows to explicitly define the expected behavior to remanufacture a new
        card or not. <br>For banks calculating the PAN on their system and which need to provide the PAN to the CMS,
        this remanufacturing indicator must be set to false and the bank must use the remanufacturing service to
        initiate the creation of a new card in order to be able to provide the new PAN to the CMS.<br><br>By convention,
        on a POST, if the term 'action' placed before a conjugated verb ('ing' form) is present in the URI, it
        designates an action realised on an existing resource (ex. : locking, unlocking, canceling, activating,
        deactivating, ...) but not the creation of a new resource as the definition of the POST method would have it
        (this is an exception case).
