      summary: Initiate individual activation of the cardholder consent (CMS11_011)
      description: >-
        The cardholder has given its consent to publish its card agreement and card data to the card networks.<br>These
        data will be published to the card networks automatically upon renewal of the card.<br><br>The body of the
        request is empty<br><br>By convention, on a POST, if the term 'action' placed before a conjugated verb ('ing'
        form) is present in the URI, it designates an action realised on an existing resource (ex. : locking, unlocking,
        canceling, activating, deactivating, ...) but not the creation of a new resource as the definition of the POST
        method would have it (this is an exception case).<br>Thus, instead of using the 201 'created' HTTP code (usually
        reserved to the creation of a new resource on a classic POST), the 204 'OK' HTTP code is used to remind that
        there is no resource creation but an action done on an existing resource.
