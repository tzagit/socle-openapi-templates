        - Card Holders
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: ^[0-9a-zA-Z\-]{1,36}$
            description: >-
              Cardholder Id<br>Technical identifier of the cardholder in the banking system.<br>This identifier is
              provided during the subscription by the bank.<br>Afterwards, it is used by the CMS to retrieve the
              cardholder data from the bank.
