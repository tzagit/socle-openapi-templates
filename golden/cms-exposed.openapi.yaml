      summary: Initiate individual card agreement surveillance activation (CMS11_001)
      description: >-
        By convention, on a POST, if the term 'action' placed before a conjugated verb ('ing' form) is present in the
        URI, it designates an action realised on an existing resource (ex. : locking, unlocking, canceling, activating,
        deactivating, ...) but not the creation of a new resource as the definition of the POST method would have it
        (this is an exception case).<br>Thus, instead of using the 201 'created' HTTP code (usually reserved to the
        creation of a new resource on a classic POST), the 204 'OK' HTTP code is used to remind that there is no
        resource creation but an action done on an existing resource.
      tags:
        - Card Agreements
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
