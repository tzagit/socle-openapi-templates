    Code:
      type: string
      enum:
        - PDOM
        - PINT
        - PTOT
        - WGRD
        - WGRI
        - WNGD
        - WNGI
        - WTOT
      x-enumDescriptions:
        PDOM: Purchase DOMestic
        PINT: Purchase INTernational
        PTOT: Purchase TOTal
        WGRD: Withdrawal GRoup Domestic
        WGRI: Withdrawal GRoup International
        WNGD: Withdrawal Not Group Domestic
        WNGI: Withdrawal Not Group International
        WTOT: Withdrawal TOTal
      description: >-
        Usage limit code<br>Code defining the context of use of the usage limit<br>Value :
        Label<br>---------------------------------------------------------------------<br>PDOM : Paiement domestique
        (Purchase DOMestic)<br>PINT : Paiement international (Purchase INTernational)​<br>PTOT : Paiement total
        (Purchase TOTal)<br>WGRD : Retrait domestique groupe (Withdrawal GRoup Domestic)<br>WNGD : Retrait domestique
        hors groupe et cash manuel domestique (Withdrawal Not Group Domestic)​<br>WGRI : Retrait international groupe
        (Withdrawal GRoup International)​<br>WNGI : Retrait international hors groupe et cash manuel international
        (Withdrawal Not Group International)<br>WTOT : Retrait total (Withdrawal TOTal)​
    ValueType:
      type: string
      enum:
        - AMNT
        - NUBR
      x-enumDescriptions:
        AMNT: Amount
        NUBR: Number
      description: >-
        Type of value of the usage limit<br>Type defining whether the usage limit is an amount or a number<br>In the
        current definition, only amounts are supported.<br>The definition of the "number" type is reserved for future
        use<br>Value : Label<br>---------------------------------------------------------------------<br>AMNT  :
        Amount<br>NUBR  : Number (RFU)
    PersonalizedAmount:
      type: object
      properties:
        amount:
          type: string
          pattern: ^\-?[0-9]{1,18}(\.?[0-9]{0,5})?$
      description: >-
        Personalized amount of the usage limit<br>Amount of the usage limit provided by the bank during the subscription
        or modified after the subscription (this amount overrides the default amount of the limit)<br>This amount is
        significant if the usageLimitValueType is set as AMNT<br>This amount can be temporary if a start and end
        date/time are defined or permanent if no date/time are defined.<br>The amount is provided as a number of
        monetary units specified in a currency where the unit of currency is implied by the context and compliant with
        ISO 4217. The decimal separator is a dot.
    PostalAddress:
      type: object
      properties:
        department:
          type: string
          minLength: 1
          maxLength: 70
        room:
          type: string
          minLength: 1
          maxLength: 70
        floor:
          type: string
          minLength: 1
          maxLength: 70
        streetName:
          type: string
          minLength: 1
          maxLength: 70
        postBox:
          type: string
          minLength: 1
          maxLength: 16
        townNameLocation:
          type: string
          minLength: 1
          maxLength: 70
        postCode:
          type: string
          minLength: 1
          maxLength: 16
        townName:
          type: string
          minLength: 1
          maxLength: 70
        countryCode:
          type: string
          pattern: ^[0-9]{3}$
      description: >-
        Temporary shipping condition postal address<br>The data are used to format the address on a letter as follows
        :<br>- Line 1 is set using the civility/firstName/lastName/company or entity Name data which are provided
        separately <br>- Line 2 is set using either the department (professionnal address) or the room (personal
        address)<br>- Line 3 is set using the floor<br>- Line 4 is set using the streetName<br>- Line 5 is set by
        concatenating the postBox and the townNameLocation<br>- Line 6 is set by concatenating the postCode and the
        townName<br>- Line 7 is set using the countryCode (country name determined from the ISO3166 numeric-3
        code)<br>townName and countryCode are required.<br>At least one of (department, room, floor, streetName or
        townNameLocation) is required.<br>The department, room, floor, streetName, townNameLocation and townName are
        defined as 70 characters strings but, at this stage, the CMS service only used up to the first 38 characters.
