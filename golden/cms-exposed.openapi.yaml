  /card-agreements/{id}/usage-limits:
    put:
      operationId: putUsageLimits
      summary: Initiate usage limit(s) creation or modification for a card agreement  (CMS11_003)
      description: >-
        1. For each usage limit :<br>The type of value for the usage limit (usageLimitValueType) is mandatory and
        defines whether the usage limit is an amount or a number.<br>The definition of the 'number' type is reserved for
        future use.<br>If the type is 'amount' then the personalized amount must be provided. The currency of the amount
        is defined in the bank configuration of the CMS.<br>If no start date/time and no end date/time are provided in
        the request, the action is a modification of a permanent usage limit.<br>If only one date/time (the start
        date/time or the end date/time) is provided, an error is generated.<br>Both start date/time and end date/time
        must be provided in the request to make an action on a temporary usage limit :<br> - if no temporary usage limit
        is defined for the usage limit code, a temporary usage limit is created<br> - if a temporary usage limit is
        already defined for the usage limit code, the temporary usage limit is modified.<br><br>2. Only one category
        (permanent limits or temporary limits) can be set for one call to this service :<br> - If all limits are
        correctly created or modified, the 204 'OK' HTTP code is used in all cases whether the usage limits are created
        or modified.<br>  - If one limit cannot be created or modified, a 400 error is returned and no limit is created
        or modified<br>  - If permanent limits and temporary limits are set in the request, a 400 error with code
        SB_DC_MAP0000151 is returned and no limit is created or modified
      tags:
        - Card Agreements
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: ^[0-9a-zA-Z\-]{1,36}$
            description: >-
              Card agreement Id<br>Technical identifier of the cardholder card agreement.<br>If not provided by the bank
              in the cardAgreement creation, the identifier is generated by the CMS and provided in the response to the
              cardAgreement creation (subscription).<br>Afterwards, it is used to access the cardAgreement ressource on
              other APIs.
          description: >-
