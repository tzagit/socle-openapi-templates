    post:
      operationId: provideCardholderDataInformation
      summary: Information of updates to cardholder data (CMS5_003)
      description: >-
        Request to provide the indication that data of a cardholder have been updated in the banking system.<br>The
        cardhodler data are provided in the request.<br>The service is intended for banks which expose a service to
        retrieve cardholder data by the CMS so that the banks can provide new data between retrievals initiated by the
        CMS.<br>This service should be used when the bank is using the CMS services to send data to other parties
        related to card management (for example, operations management, concierge services) so that the CMS can forward
        these updates to these parties.<br>If the bank doesn't need the CMS to send data to other parties, this service
        is not required to be used as the CMS will retrieve data from the bank when needed.<br>Note : The data are not
        stored by the CMS.
