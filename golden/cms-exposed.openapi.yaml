openapi: 3.1.1
info:
  title: APIs exposed by the Card Management System
  version: 2.10.0
  description: >-
    The purpose of the Card Management System APIs is to manage the card agreements (also called card contracts) and the
    cards
  contact:
    name: ESTREEM API support team
    url: https://estreem.eu
    email: support@estreem.eu
  x-dictionary-version: _DICO_ESTREEM_v21.15.xlsx
  x-socle-version: 0.1.0
  x-socle-type: exposed
components:
  schemas:
    StandardError:
      type: object
      description: Standard error response used across all APIs
      properties:
        code:
          type: string
          minLength: 1
          maxLength: 20
          description: Functional or technical error code
        text:
          type: string
          minLength: 1
          maxLength: 40
          description: User-friendly error message
        developerText:
          type: string
          minLength: 1
          maxLength: 70
          description: Detailed technical message for debugging
        moreInfo:
          type: string
          minLength: 1
          maxLength: 256
          description: Additional information or documentation link
    CardAgreementOwnerDataReq:
      title: CardAgreementOwnerDataReq
      type: object
      description: ''
      properties:
        civility:
          type:
            - string
            - 'null'
          minLength: 1
          maxLength: 16
          description: >-
            Civility of the owner<br>Civility of the owner of the card agreement if the owner is a person (otherwise
            this field should be absent)<br>The data is defined as a 16 characters string but at this stage the CMS
            service only uses the first 10 characters.
        firstName:
          type:
            - string
            - 'null'
          minLength: 1
          maxLength: 70
          description: >-
            First name<br>First name of the owner of the card agreement if the owner is a person (otherwise this field
            should be absent)<br>The first name is defined as 70 characters strings but, at this stage, the CMS service
            only uses up to the first 40 characters.
        lastName:
          type:
            - string
            - 'null'
          minLength: 1
          maxLength: 70
          description: >-
            Last name<br>Last name of the owner of the card agreement if the owner is a person (otherwise this field
            should be absent)<br>The last name is defined as 70 characters strings but, at this stage, the CMS service
            only uses up to the first 40 characters.
        companyName:
          type:
            - string
            - 'null'
          minLength: 1
          maxLength: 50
          description: >-
            Company Name<br>Company name of the owner of the card agreement if the owner is a company (otherwise this
            field should be absent)
        postalAddress:
          type: object
          properties:
            postalAddressID:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 36
            department:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 70
            room:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 70
            floor:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 70
            streetName:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 70
            postBox:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 16
            townNameLocation:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 70
            postCode:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 16
            townName:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 70
            countryCode:
              type:
                - string
                - 'null'
              pattern: ^[0-9]{3}$
          description: >-
            Postal Address<br>postalAddressID is the postalAddress identifier which may be provided by the bank in the
            subscription and which will correspond to the identifier provided upon retrieval of the cardholder
            details.<br>The data are used to format the address on a letter as follows :<br>- Line 1 is set using the
            civility/firstName/lastName/companyName data which are provided separately<br>- Line 2 is set using either
            the department (professionnal address) or the room (personal address)<br>- Line 3 is set using the
            floor<br>- Line 4 is set using the streetName<br>- Line 5 is set by concatenating the postBox and the
            townNameLocation<br>- Line 6 is set by concatenating the postCode and the townName<br>- Line 7 is set using
            the countryCode (country name determined from the ISO3166 numeric-3 code)<br>postalAddressID, townName and
            countryCode are required.<br>At least one of (department, room, floor, streetName or townNameLocation) is
            required.<br>The department, room, floor, streetName, townNameLocation and townName are defined as 70
            characters strings but, at this stage, the CMS service only uses up to the first 38 characters.
      additionalProperties: false
      required:
        - postalAddress
    CardAgreementReq:
      title: CardAgreementReq
      type: object
      description: ''
      properties:
        cardholder:
          type: object
          description: ''
          properties:
            id:
              type: string
              pattern: ^[0-9a-zA-Z\-]{1,36}$
              description: >-
                Cardholder Id<br>Technical identifier of the cardholder in the banking system.<br>This identifier is
                provided during the subscription by the bank.<br>Afterwards, it is used by the CMS to retrieve the
                cardholder data from the bank.
          additionalProperties: false
          required:
            - id
        cardAgreement:
          type: object
          description: ''
          properties:
            id:
              type:
                - string
                - 'null'
              pattern: ^[0-9a-zA-Z\-]{1,36}$
              description: >-
                Card agreement Id<br>Technical identifier of the cardholder card agreement.<br>If not provided by the
                bank in the cardAgreement creation, the identifier is generated by the CMS and provided in the response
                to the cardAgreement creation (subscription).<br>Afterwards, it is used to access the cardAgreement
                ressource on other APIs.
            entityId:
              type: string
              minLength: 1
              maxLength: 36
              description: >-
                Card agreement entity Id<br>Identifier of the physical or logical entity linked to the card
                contract/agreement (entity that signed the contract with the cardholder; for example, a branch).<br>This
                identifier is provided to the CMS during the subscription by the bank.<br>Afterwards, it is used by the
                CMS to retrieve the entity data from the bank and by the IAS in messages sent to the bank
            accountId:
              type: string
              pattern: ^[0-9a-zA-Z\-]{1,36}$
              description: >-
                Account Id linked to the card<br>Technical identifier of the banking account associated to the card
                contract/agreement<br>This identifier is provided during the subscription by the bank.<br>It will be
                sent by the CMS to the IAS so that the IAS can use this identifier during the authorisation process to
                contact the banking Host (for balance check) or for standin purposes.
            owner:
              type:
                - object
                - 'null'
              description: ''
              properties:
                id:
                  type:
                    - string
                    - 'null'
                  pattern: ^[0-9a-zA-Z\-]{1,36}$
                  description: >-
                    Card agreement owner id<br>Technical identifier of the owner of the card agreement in the banking
                    system.<br>This identifier can be provided during the subscription by the bank if the owner of the
                    card agreement is different from the cardholder.<br>Afterwards, it is used by the CMS to retrieve
                    the owner data from the bank.
              additionalProperties: false
            additionalInformationZone:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 200
              description: >-
                Card agreement additional information zone<br>This data allows to send discretionnary data from the bank
                to the card manufacturer or, in return, from the card manufacturer to the bank.<br>The CMS does not
                perform any action on this data.
            chainingId:
              type:
                - string
                - 'null'
              pattern: ^[0-9a-zA-Z\-]{1,36}$
              description: >-
                Card agreement identifier of the parent card<br>Technical identifier of the card agreement from which
                data will be reused upon renewing the agreement (for example, retrieving the PIN code or personalized
                limits)
            deferredCalendarCode:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 50
              description: >-
                Deferred calendar code<br>Code defining the deferred calendar to be used in case of a deferred debit
                card<br>Example of
                values<br>---------------------------------------------------------------------<br>LAST_DAY_ON_MONTH<br>FIRST_DAY_ON_MONTH<br>MIDDLE_DAY_ON_MONTH<br>The
                values to be used are defined in the parameters associated to the product catalog.
            optionList:
              type:
                - array
                - 'null'
              items:
                type: object
                description: ''
                properties:
                  code:
                    type:
                      - string
                      - 'null'
                    minLength: 1
                    maxLength: 50
                    description: >-
                      Card agreement option code<br>Code defining the option associated to the card agreement<br>The
                      values to be used are defined in the parameters associated to the product catalog.<br>Example of
                      values and
                      label<br>---------------------------------------------------------------------<br>TRAVEL_OPTION :
                      Travel option (subscription for reduced or canceled fees when using card in foreign
                      countries)<br>CASH_LIMIT : Limit for cash that can be provided to a cardholder (used for premium
                      cards) the amount must be provided in the optionData<br>DELEGATED_WITHDRAWAL_LIMIT : Limit for
                      delegated withdrawal (used for premium cards) the amount must be provided in the optionData
                  data:
                    type:
                      - string
                      - 'null'
                    minLength: 1
                    maxLength: 35
                    description: >-
                      Data for the option<br>The values depend on the option code and are defined in the parameters
                      associated to the product catalog.<br>For example, the value must be present if optionCode is
                      CASH_LIMIT or DELEGATED_WITHDRAWAL_LIMIT
                additionalProperties: false
            shippingConditionList:
              type:
                - array
                - 'null'
              items:
                type: object
                description: ''
                properties:
                  code:
                    type:
                      - string
                      - 'null'
                    minLength: 1
                    maxLength: 50
                    description: >-
                      Shipping condition code<br>Shipping condition code of the card contract/agreement<br>The values to
                      be used are defined in the parameters associated to the product catalog.
                  entityId:
                    type:
                      - string
                      - 'null'
                    minLength: 1
                    maxLength: 36
                    description: >-
                      Shipping condition entity Id<br>Identifier of the physical entity to be used for the shipping
                      condition<br>For example, a branch to send the card
                  postalAddressId:
                    type:
                      - string
                      - 'null'
                    pattern: ^[0-9a-zA-Z\-]{1,36}$
                    description: >-
                      Shipping condition postal address identifier<br>The data of the postal address (this identifier
                      and its corresponding details) will be obtained upon retrieval of the cardholder data.
                additionalProperties: false
            usageLimitList:
              type:
                - array
                - 'null'
              items:
                type: object
                description: ''
                properties:
                  code:
                    anyOf:
                      - $ref: '#/components/schemas/Code'
                      - type: 'null'
                  valueType:
                    anyOf:
                      - $ref: '#/components/schemas/ValueType'
                      - type: 'null'
                  personalizedAmount:
                    anyOf:
                      - $ref: '#/components/schemas/PersonalizedAmount'
                      - type: 'null'
                  personalizedNumber:
                    type:
                      - string
                      - 'null'
                    pattern: ^[0-9A-Za-z]{1,18}$
                    description: >-
                      Personalized number of the usage limit<br>Number of the usage limit provided by the bank during
                      the subscription or modified after the subscription (this number overrides the default number of
                      the limit)<br>This number is significant if the usageLimitValueType is set as NUBR (RFU)<br>This
                      number can be temporary if a start and end date/time are defined or permanent if no date/time are
                      defined.
                additionalProperties: false
          additionalProperties: false
          required:
            - entityId
            - accountId
        card:
          type: object
          description: ''
          properties:
            encryptedPrimaryAccountNumber:
              type:
                - string
                - 'null'
              pattern: ^[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]*\.[A-Za-z0-9_-]*\.[A-Za-z0-9_-]+$
              description: >-
                encrypted pan<br>The encryption is done using JSON Web Encryption standard.<br>Once decrypted it
                represents a Primary Account Number (PAN), which is a 16 to 19 numeric characters string.
            sequenceNumber:
              type:
                - string
                - 'null'
              pattern: ^[0-9]{2,3}$
              description: Card Sequence Number<br>Equivalent to DE23 in ISO8583 based protocols
            expiryDate:
              type:
                - string
                - 'null'
              pattern: ^([0-9]{4})-(1[0-2]|0[1-9])$
              description: >-
                Expiry date<br>Format (ISO8601) : YYYY-MM ; Example 2024-12<br>Equivalent to DE14 in ISO8583 based
                protocols
            alphaTestIndicator:
              type:
                - boolean
                - 'null'
              description: Alpha test indicator<br>Indicates if the card must be manufactured for alpha tests or not
            cardholderPictureId:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 100
              description: >-
                Distribution identifier of the card design picture for the cardholder - may be an URL<br>Identifier of
                the card design picture for the cardholder provided by the bank during the subscription (for example, it
                may be an URL)
            context:
              type:
                - object
                - 'null'
              description: ''
              properties:
                consentIndicator:
                  type:
                    - boolean
                    - 'null'
                  description: >-
                    Consent Indicator<br>Indicator to register if the cardholder has given its consent to publish its
                    card agreement and card data to the card networks.<br>By default no consent is registered and no
                    data will be published to card networks<br>If set to true, data will be published to the card
                    networks automatically upon renewal of the card.
                contactlessActivationChoiceCode:
                  type:
                    - boolean
                    - 'null'
                  description: >-
                    Contactless activation choice code<br>Code to activate or not the contacless function of the card
                    depending on the cardholder choice at the subscription<br>Possible values are 'true' or 'false'
                secretCodeChoiceIndicator:
                  type:
                    - boolean
                    - 'null'
                  description: >-
                    PIN choice feature indicator<br>Indicator to request a PIN choice process activation upon card
                    manufacturing<br>By default no PIN choice process is activated (the PIN is reused from a previous
                    card or generated by the CMS)<br>If set to true, a PIN choice process is initiated with the
                    cardholder
                urgentManufacturingIndicator:
                  type:
                    - boolean
                    - 'null'
                  description: >-
                    Urgent manufacturing indicator<br>Indicator to request an urgent manufacturing of the card<br>By
                    default no urgent manufacturing is requested
              additionalProperties: false
            designCode:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 50
              description: >-
                Card design code defined by the distribution<br>Code to define the design selected by the cardholder
                during the subscription and to be used to print the card
            designSubscriptionIndicator:
              type: boolean
              description: >-
                Card design choice subscription indicator<br>Indicates if the card design has been chosen by the
                cardholder during the subscription<br>By default no card design is chosen
            embossedComplementaryData:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 35
              description: Complementary embossed zone label<br>Complementary line for the embossed zone to be printed on the card
            embossedZone:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 35
              description: >-
                Card embossed zone label<br>Label to use for the embossed zone printed on the card in case the default
                format needs to be overridden
            paymentAccountReference:
              type:
                - string
                - 'null'
              pattern: ^[0-9A-Za-z]{1,29}$
              description: Payment account reference<br>(PAR)<br>Equivalent to DE57.0056 in CBAE protocol (domestic french data)
            productCode:
              type: string
              minLength: 1
              maxLength: 50
              description: >-
                Product Code<br>Product code of the card contract/agreement<br>The values to be used are defined in the
                parameters associated to the product catalog.
            supplementZone1:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 500
              description: >-
                First supplementary information to be sent to the card manufacturer<br>First supplementary information
                to be sent to the card manufacturer.<br>This is used for printing the letter for the card
            supplementZone2:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 500
              description: >-
                Second supplementary information to be sent to the card manufacturer<br>Second supplementary information
                to be sent to the card manufacturer.<br>This is used for printing the letter for the mailer
          additionalProperties: false
          required:
            - designSubscriptionIndicator
            - productCode
      additionalProperties: false
      required:
        - cardholder
        - cardAgreement
        - card
    CardAgreementRes:
      title: CardAgreementRes
      type: object
      description: ''
      properties:
        cardAgreement:
          $ref: '#/components/schemas/CardAgreement'
        card:
          type: object
          description: ''
          properties:
            id:
              type: string
              format: uuid
              description: >-
                Card identifier<br>Unique identifier of the card.<br>This identifier is generated by the CMS during the
                subscription, during a remanufacturing or during an opposition if a card is
                remanufactured.<br>Afterwards, it is used to access the card ressource on other APIs.
            primaryAccountNumberId:
              type: string
              format: uuid
              description: >-
                Primary Account Number ID<br>Identifier (also called PANid) associated to the PAN of the card.<br>The
                PANid is generated (in the form of an UUID v4) by Estreem during the processing of the subscription
                request sent to the CMS (either when the PAN is calculated by the CMS or when the PAN is provided by the
                bank).<br>The PANid is provided to the bank in the subscription response.<br>The PANid is used in
                further exchanges of the CMS and the IAS.
            encryptedPrimaryAccountNumber:
              type: string
              pattern: ^[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]*\.[A-Za-z0-9_-]*\.[A-Za-z0-9_-]+$
              description: >-
                encrypted pan<br>The encryption is done using JSON Web Encryption standard.<br>Once decrypted it
                represents a Primary Account Number (PAN), which is a 16 to 19 numeric characters string.
            maskedPrimaryAccountNumber:
              type: string
              minLength: 1
              maxLength: 30
              description: Masked Primary Account Number<br>Displayable version of the PAN with masked caracters
            sequenceNumber:
              type: string
              pattern: ^[0-9]{2,3}$
              description: Card Sequence Number<br>Equivalent to DE23 in ISO8583 based protocols
            expiryDate:
              type: string
              pattern: ^([0-9]{4})-(1[0-2]|0[1-9])$
              description: >-
                Expiry date<br>Format (ISO8601) : YYYY-MM ; Example 2024-12<br>Equivalent to DE14 in ISO8583 based
                protocols
            status:
              $ref: '#/components/schemas/CardStatusCodeset'
            paymentAccountReference:
              type: string
              pattern: ^[0-9A-Za-z]{1,29}$
              description: Payment account reference<br>(PAR)<br>Equivalent to DE57.0056 in CBAE protocol (domestic french data)
            supportType:
              $ref: '#/components/schemas/CardSupportTypeCodeset'
          additionalProperties: false
          required:
            - id
            - primaryAccountNumberId
            - maskedPrimaryAccountNumber
            - sequenceNumber
            - expiryDate
            - status
            - supportType
      additionalProperties: false
      required:
        - cardAgreement
        - card
    CardAgreementSurveillanceActivatingReq:
      title: CardAgreementSurveillanceActivatingReq
      type: object
      description: ''
      properties:
        surveillanceReasonCode:
          type:
            - string
            - 'null'
          minLength: 1
          maxLength: 50
          description: >-
            Card agreement surveillance reason code<br>Reason code for the card agreement to be placed under
            surveillance<br>Example : NO_PROVISION<br>Complementary values can be defined in future version
      additionalProperties: false
    CardAgreementUsageLimitManagementReq:
      title: CardAgreementUsageLimitManagementReq
      type: object
      description: ''
      properties:
        usageLimitList:
          type: array
          items:
            type: object
            description: ''
            properties:
              code:
                $ref: '#/components/schemas/Code'
              valueType:
                $ref: '#/components/schemas/ValueType'
              personalizedAmount:
                anyOf:
                  - $ref: '#/components/schemas/PersonalizedAmount'
                  - type: 'null'
              personalizedNumber:
                type:
                  - string
                  - 'null'
                pattern: ^[0-9A-Za-z]{1,18}$
                description: >-
                  Personalized number of the usage limit<br>Number of the usage limit provided by the bank during the
                  subscription or modified after the subscription (this number overrides the default number of the
                  limit)<br>This number is significant if the usageLimitValueType is set as NUBR (RFU)<br>This number
                  can be temporary if a start and end date/time are defined or permanent if no date/time are defined.
              startDateTime:
                type:
                  - string
                  - 'null'
                format: date-time
                description: >-
                  Starting date and time of the temporary limit/usage<br>The date and time are specified in the
                  following form <YYYY-MM-DDThh:mm:ssz> (ISO8601 datetime format)
              endDateTime:
                type:
                  - string
                  - 'null'
                format: date-time
                description: >-
                  Ending date and time of the temporary limit/usage<br>The date and time are specified in the following
                  form <YYYY-MM-DDThh:mm:ssz> (ISO8601 datetime format)
            additionalProperties: false
            required:
              - code
              - valueType
      additionalProperties: false
      required:
        - usageLimitList
    CardAgreementRestrictionsManagementStartReq:
      title: CardAgreementRestrictionsManagementStartReq
      type: object
      description: ''
      properties:
        usageRestrictionData:
          type:
            - string
            - 'null'
          minLength: 1
          maxLength: 256
          description: >-
            Card usage restriction data<br>Data to be used for the usage restriction<br>The values depend on the usage
            restriction code.<br>The value must be used if usageRestrictionCode is GEOB to represent the zone/region on
            which the geoblocking is
            applied<br>Value<br>---------------------------------------------------------------------<br>ZONE_A<br>ZONE_B<br>ZONE_C<br>ZONE_D<br>ZONE_E<br>ZONE_F<br>ZONE_G
      additionalProperties: false
    CardAgreementRestrictionsManagementStopReq:
      title: CardAgreementRestrictionsManagementStopReq
      type: object
      description: ''
      properties:
        usageRestrictionData:
          type:
            - string
            - 'null'
          minLength: 1
          maxLength: 256
          description: >-
            Card usage restriction data<br>Data to be used for the usage restriction<br>The values depend on the usage
            restriction code.<br>The value must be used if usageRestrictionCode is GEOB to represent the zone/region on
            which the geoblocking is
            applied<br>Value<br>---------------------------------------------------------------------<br>ZONE_A<br>ZONE_B<br>ZONE_C<br>ZONE_D<br>ZONE_E<br>ZONE_F<br>ZONE_G
      additionalProperties: false
    CardAgreementOptionsManagementUpdateReq:
      title: CardAgreementOptionsManagementUpdateReq
      type: object
      description: ''
      properties:
        optionData:
          type:
            - string
            - 'null'
          minLength: 1
          maxLength: 35
          description: >-
            Data for the option<br>The values depend on the option code and are defined in the parameters associated to
            the product catalog.<br>For example, the value must be present if optionCode is CASH_LIMIT or
            DELEGATED_WITHDRAWAL_LIMIT
      additionalProperties: false
    CardAgreementEmbossingDesignUpdateReq:
      title: CardAgreementEmbossingDesignUpdateReq
      type: object
      description: ''
      properties:
        cardholderPictureId:
          type:
            - string
            - 'null'
          minLength: 1
          maxLength: 100
          description: >-
            Distribution identifier of the card design picture for the cardholder - may be an URL<br>Identifier of the
            card design picture for the cardholder provided by the bank during the subscription (for example, it may be
            an URL)
        designCode:
          type:
            - string
            - 'null'
          minLength: 1
          maxLength: 50
          description: >-
            Card design code defined by the distribution<br>Code to define the design selected by the cardholder during
            the subscription and to be used to print the card
        designSubscriptionIndicator:
          type:
            - boolean
            - 'null'
          description: >-
            Card design choice subscription indicator<br>Indicates if the card design has been chosen by the cardholder
            during the subscription<br>By default no card design is chosen
        embossedComplementaryData:
          type:
            - string
            - 'null'
          minLength: 1
          maxLength: 35
          description: Complementary embossed zone label<br>Complementary line for the embossed zone to be printed on the card
        embossedZone:
          type:
            - string
            - 'null'
          minLength: 1
          maxLength: 35
          description: >-
            Card embossed zone label<br>Label to use for the embossed zone printed on the card in case the default
            format needs to be overridden
      additionalProperties: false
    CardAgreementAdditionalManufacturingUpdateReq:
      title: CardAgreementAdditionalManufacturingUpdateReq
      type: object
      description: ''
      properties:
        additionalInformationZone:
          type:
            - string
            - 'null'
          minLength: 1
          maxLength: 200
          description: >-
            Card agreement additional information zone<br>This data allows to send discretionnary data from the bank to
            the card manufacturer or, in return, from the card manufacturer to the bank.<br>The CMS does not perform any
            action on this data.
        card:
          type:
            - object
            - 'null'
          description: ''
          properties:
            supplementZone1:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 500
              description: >-
                First supplementary information to be sent to the card manufacturer<br>First supplementary information
                to be sent to the card manufacturer.<br>This is used for printing the letter for the card
            supplementZone2:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 500
              description: >-
                Second supplementary information to be sent to the card manufacturer<br>Second supplementary information
                to be sent to the card manufacturer.<br>This is used for printing the letter for the mailer
          additionalProperties: false
      additionalProperties: false
    ListofagreementsRes:
      title: ListofagreementsRes
      type: object
      description: ''
      properties:
        cardholder:
          type: object
          description: ''
          properties:
            id:
              type: string
              pattern: ^[0-9a-zA-Z\-]{1,36}$
              description: >-
                Cardholder Id<br>Technical identifier of the cardholder in the banking system.<br>This identifier is
                provided during the subscription by the bank.<br>Afterwards, it is used by the CMS to retrieve the
                cardholder data from the bank.
            civility:
              type: string
              minLength: 1
              maxLength: 16
              description: >-
                cardholder title<br>Civility of the cardholder<br>The data is defined as a 16 characters string but at
                this stage the CMS service only uses the first 10 characters
            firstName:
              type: string
              minLength: 1
              maxLength: 70
              description: >-
                first name<br>The first name is defined as 70 characters strings but, at this stage, the CMS service
                only uses up to the first 40 characters.
            lastName:
              type: string
              minLength: 1
              maxLength: 70
              description: >-
                last name<br>The last name is defined as 70 characters strings but, at this stage, the CMS service only
                uses up to the first 40 characters.
          additionalProperties: false
        cardAgreementList:
          type: array
          items:
            type: object
            description: ''
            properties:
              id:
                type: string
                pattern: ^[0-9a-zA-Z\-]{1,36}$
                description: >-
                  Card agreement Id<br>Technical identifier of the cardholder card agreement.<br>If not provided by the
                  bank in the cardAgreement creation, the identifier is generated by the CMS and provided in the
                  response to the cardAgreement creation (subscription).<br>Afterwards, it is used to access the
                  cardAgreement ressource on other APIs.
              entityId:
                type: string
                minLength: 1
                maxLength: 36
                description: >-
                  Card agreement entity Id<br>Identifier of the physical or logical entity linked to the card
                  contract/agreement (entity that signed the contract with the cardholder; for example, a
                  branch).<br>This identifier is provided to the CMS during the subscription by the bank.<br>Afterwards,
                  it is used by the CMS to retrieve the entity data from the bank and by the IAS in messages sent to the
                  bank
              entityName:
                type: string
                minLength: 1
                maxLength: 256
                description: >-
                  Card agreement entity name<br>Name of the physical or logical entity linked to the card
                  contract/agreement (entity that signed the contract with the cardholder; for example, a branch).
              accountId:
                type: string
                pattern: ^[0-9a-zA-Z\-]{1,36}$
                description: >-
                  Account Id linked to the card<br>Technical identifier of the banking account associated to the card
                  contract/agreement<br>This identifier is provided during the subscription by the bank.<br>It will be
                  sent by the CMS to the IAS so that the IAS can use this identifier during the authorisation process to
                  contact the banking Host (for balance check) or for standin purposes.
              owner:
                type: object
                description: ''
                properties:
                  id:
                    type: string
                    pattern: ^[0-9a-zA-Z\-]{1,36}$
                    description: >-
                      Card agreement owner id<br>Technical identifier of the owner of the card agreement in the banking
                      system.<br>This identifier can be provided during the subscription by the bank if the owner of the
                      card agreement is different from the cardholder.<br>Afterwards, it is used by the CMS to retrieve
                      the owner data from the bank.
                  civility:
                    type: string
                    minLength: 1
                    maxLength: 16
                    description: >-
                      Civility of the owner<br>Civility of the owner of the card agreement if the owner is a person
                      (otherwise this field should be absent)<br>The data is defined as a 16 characters string but at
                      this stage the CMS service only uses the first 10 characters.
                  firstName:
                    type: string
                    minLength: 1
                    maxLength: 70
                    description: >-
                      First name<br>First name of the owner of the card agreement if the owner is a person (otherwise
                      this field should be absent)<br>The first name is defined as 70 characters strings but, at this
                      stage, the CMS service only uses up to the first 40 characters.
                  lastName:
                    type: string
                    minLength: 1
                    maxLength: 70
                    description: >-
                      Last name<br>Last name of the owner of the card agreement if the owner is a person (otherwise this
                      field should be absent)<br>The last name is defined as 70 characters strings but, at this stage,
                      the CMS service only uses up to the first 40 characters.
                additionalProperties: false
              status:
                type: string
                enum:
                  - CLOS
                  - OPEN
                  - TOCL
                  - VALD
                x-enumDescriptions:
                  CLOS: Closed
                  OPEN: Open
                  TOCL: To_close
                  VALD: Validated
                description: >-
                  Status of Card Agreement<br>After subscription, the cardAgreementStatus is 'validated'.<br>After an
                  immediate card agreement termination, the cardAgreementStatus is 'closed'.<br>After a card agreement
                  termination set at a future date, the cardAgreementStatus is 'to close'.<br>Open is an intermediate
                  status which can be visible in UIs or can be obtained on research API services only in case of errors
                  but which is not present in events<br>Value :
                  Label<br>---------------------------------------------------------------------<br>OPEN  : Open<br>VALD
                  : Validated<br>TOCL  : To_close<br>CLOS  : Closed
              additionalInformationZone:
                type: string
                minLength: 1
                maxLength: 200
                description: >-
                  Card agreement additional information zone<br>This data allows to send discretionnary data from the
                  bank to the card manufacturer or, in return, from the card manufacturer to the bank.<br>The CMS does
                  not perform any action on this data.
              deferredCalendarCode:
                type: string
                minLength: 1
                maxLength: 50
                description: >-
                  Deferred calendar code<br>Code defining the deferred calendar to be used in case of a deferred debit
                  card<br>Example of
                  values<br>---------------------------------------------------------------------<br>LAST_DAY_ON_MONTH<br>FIRST_DAY_ON_MONTH<br>MIDDLE_DAY_ON_MONTH<br>The
                  values to be used are defined in the parameters associated to the product catalog.
              parameters:
                type: object
                description: ''
                properties:
                  creationDate:
                    type: string
                    format: date-time
                    description: >-
                      Card agreement creation date<br>The date and time are specified in the following form
                      <YYYY-MM-DDThh:mm:ssz> (ISO8601 datetime format)
                  closingDateTime:
                    type: string
                    format: date-time
                    description: >-
                      Card agreement closing date and time<br>Date and time for the closure of the card
                      agreement<br><br>On the closure request :<br>   - If the date and time are present, the card
                      agreement will be closed on that specific date and time<br>   - Otherwise, the card agreement will
                      be closed on the expiration of current active card (as a consequence stopping the automatic
                      renewal process)<br><br>The date and time are specified in the following form
                      <YYYY-MM-DDThh:mm:ssz> (ISO8601 datetime format)
                  closingReasonCode:
                    $ref: '#/components/schemas/ClosingReasonCode'
                  productMaximumAge:
                    type: string
                    pattern: ^[0-9]{1,3}$
                    description: >-
                      Card agreement product maximum age<br>Maximum allowed age of the cardholder for the use of the
                      card agreement<br>The card agreement will be disabled and no card can be manufactured is the
                      cardholder age is older than the maximum age.
                  replacementCardIndicator:
                    type: boolean
                    description: >-
                      Replacement card indicator<br>Indicates if the card product supports the replacement card feature
                      (also called emergency card)<br>By default no replacement card is supported.<br>If set to true,
                      the replacement card feature is activated and a replacement card can be assigned to the card
                      agreement
                  surveillanceIndicator:
                    type: boolean
                    description: >-
                      Card agreement surveillance indicator<br>Indicates if the card agreement is under surveillance
                      (with limited use of the card) or not
                  surveillanceStartDate:
                    type: string
                    format: date-time
                    description: >-
                      Start date/time of the surveillance of the card agreement<br>The date and time are specified in
                      the following form <YYYY-MM-DDThh:mm:ssz> (ISO8601 datetime format)
                  surveillanceEndDate:
                    type: string
                    format: date-time
                    description: >-
                      End date/time of the surveillance of the card agreement<br>The date and time are specified in the
                      following form <YYYY-MM-DDThh:mm:ssz> (ISO8601 datetime format)
                  surveillanceReasonCode:
                    type: string
                    minLength: 1
                    maxLength: 50
                    description: >-
                      Card agreement surveillance reason code<br>Reason code for the card agreement to be placed under
                      surveillance<br>Example : NO_PROVISION<br>Complementary values can be defined in future version
                additionalProperties: false
              card:
                type: object
                description: ''
                properties:
                  cardholderPictureId:
                    type: string
                    minLength: 1
                    maxLength: 100
                    description: >-
                      Distribution identifier of the card design picture for the cardholder - may be an
                      URL<br>Identifier of the card design picture for the cardholder provided by the bank during the
                      subscription (for example, it may be an URL)
                  context:
                    type: object
                    description: ''
                    properties:
                      contactlessActivationChoiceCode:
                        type: boolean
                        description: >-
                          Contactless activation choice code<br>Code to activate or not the contacless function of the
                          card depending on the cardholder choice at the subscription<br>Possible values are 'true' or
                          'false'
                      consentIndicator:
                        type: boolean
                        description: >-
                          Consent Indicator<br>Indicator to register if the cardholder has given its consent to publish
                          its card agreement and card data to the card networks.
                      consentUpdateDateTime:
                        type: string
                        format: date-time
                        description: >-
                          Date and time of the update of the consent<br>Date and time when the consent indicator was
                          updated<br>The date and time are specified in the following form <YYYY-MM-DDThh:mm:ssz>
                          (ISO8601 datetime format)
                    additionalProperties: false
                  debitType:
                    type: string
                    enum:
                      - DEFR
                      - DPIW
                      - IMMT
                    x-enumDescriptions:
                      DEFR: Deferred
                      DPIW: Deferred Payment, Immediate Withdrawal
                      IMMT: Immediate
                    description: >-
                      Type of debit<br>Value :
                      Label<br>---------------------------------------------------------------------<br>DEFR :
                      Deferred<br>DPIW : Deferred Payment, Immediate Withdrawal<br>IMMT : Immediate
                  designCode:
                    type: string
                    minLength: 1
                    maxLength: 50
                    description: >-
                      Card design code defined by the distribution<br>Code to define the design selected by the
                      cardholder during the subscription and to be used to print the card
                  embossedComplementaryData:
                    type: string
                    minLength: 1
                    maxLength: 35
                    description: >-
                      Complementary embossed zone label<br>Complementary line for the embossed zone to be printed on the
                      card
                  embossedZone:
                    type: string
                    minLength: 1
                    maxLength: 35
                    description: >-
                      Card embossed zone label<br>Label to use for the embossed zone printed on the card in case the
                      default format needs to be overridden
                  paymentAccountReference:
                    type: string
                    pattern: ^[0-9A-Za-z]{1,29}$
                    description: Payment account reference<br>Payment account reference for schemes.
                  productCode:
                    type: string
                    minLength: 1
                    maxLength: 50
                    description: >-
                      Product Code<br>Product code of the card contract/agreement<br>The values to be used are defined
                      in the parameters associated to the product catalog.
                  productType:
                    type: string
                    enum:
                      - CRDT
                      - DEBT
                    x-enumDescriptions:
                      CRDT: Credit
                      DEBT: Debit
                    description: >-
                      Product type<br>Type of product indicating whether the card is a debit or a credit card<br>Value :
                      Label<br>---------------------------------------------------------------------<br>DEBT  :
                      Debit<br>CRDT  : Credit
                  supplementZone1:
                    type: string
                    minLength: 1
                    maxLength: 500
                    description: >-
                      First supplementary information to be sent to the card manufacturer<br>First supplementary
                      information to be sent to the card manufacturer.<br>This is used for printing the letter for the
                      card
                  supplementZone2:
                    type: string
                    minLength: 1
                    maxLength: 500
                    description: >-
                      Second supplementary information to be sent to the card manufacturer<br>Second supplementary
                      information to be sent to the card manufacturer.<br>This is used for printing the letter for the
                      mailer
                  supportType:
                    $ref: '#/components/schemas/CardSupportTypeCodeset'
                additionalProperties: false
            additionalProperties: false
      additionalProperties: false
    CardAgreementTerminationReq:
