    description: >-
      Generated server url. When deploying this API it is important to keep the basePath as 'issuing' like in the
      example above.
tags:
  - name: Card Agreements
    description: Card agreements management (including the card creation service)
  - name: Cards
    description: Cards management
  - name: Card Holders
    description: Card holders data updates provided by the bank
  - name: Card Agreement Owners
    description: Card agreement owners data updates provided by the bank
paths:
  /card-agreement-owners/{id}/action-data-providing:
    post:
      operationId: provideCardAgreementOwnerData
      summary: Information of updates to card agreement owner data (CMS5_004)
      description: >-
        Request to provide the indication that data of a card agreement owner have been updated in the banking
        system.<br>The owner data are provided in the request :<br>    - For an individual owner, the following data are
        required ownerCivility, ownerFirstName and ownerLastName<br>    - For a business owner, the ownerCompanyName is
        required<br>The service is intended for banks which expose a service to retrieve owner data by the CMS so that
        the banks can provide new data between retrievals initiated by the CMS.<br>This service should be used when the
        bank is using the CMS services to send data to other parties related to card management (for example, operations
        management, concierge services) so that the CMS can forward these updates to these parties.<br>If the bank
        doesn't need the CMS to send data to other parties, this service is not required to be used as the CMS will
        retrieve data from the bank when needed.<br>Note : The data are not stored by the CMS.
      tags:
        - Card Agreement Owners
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            pattern: ^[0-9a-zA-Z\-]{1,36}$
            description: >-
              Card agreement owner id<br>Technical identifier of the owner of the card agreement in the banking
              system.<br>This identifier can be provided during the subscription by the bank if the owner of the card
              agreement is different from the cardholder.<br>Afterwards, it is used by the CMS to retrieve the owner
              data from the bank.
          description: >-
            Technical identifier of the owner of the card agreement in the banking system.<br>This identifier can be
            provided during the subscription by the bank if the owner of the card agreement is different from the
            cardholder.<br>Afterwards, it is used by the CMS to retrieve the owner data from the bank.
        - name: acquiringChannel
          in: header
          description: "Communication channel used to initiate the request<br>This channel identifies the origin of the request such as a web banking application, a branch system, a back-office system, etc.<br>Value<br>---------------------------------------------------------------------<br>BKOF : Back office (back-office agents)<br>BTCH : Batch processing (reserved value for the processor’s batch processing of files<br>BRNH : Branch (customer advisor)<br>CCNT : Call Center<br>OBNK :Open banking (selfcare on mobiles or tablets)<br>UNKN : Unknown<br>USR1 : User defined 1 (usage defined by the bank)<br>USR2 : User defined 2 \_(usage defined by the bank)<br>USIN : User interface (reserved value for the processor’s UIs)<br>WBNK : Web banking (selfcare on a computer)"
          required: false
          schema:
            $ref: '#/components/schemas/Shared'
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/XInstitutionId'
        - $ref: '#/components/parameters/XUserId'
        - $ref: '#/components/parameters/XUserContextId'
        - $ref: '#/components/parameters/IdempotencyKeyRequired'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CardAgreementOwnerDataReq'
      responses:
        '204':
          description: Data received
          headers:
            X-Request-Id:
              $ref: '#/components/headers/EchoRequestId'
            X-Correlation-Id:
              $ref: '#/components/headers/EchoCorrelationId'
            X-Institution-Id:
              $ref: '#/components/headers/EchoInstitutionId'
            X-User-Id:
              $ref: '#/components/headers/EchoUserId'
            X-UserContext-Id:
              $ref: '#/components/headers/EchoUserContextId'
            X-Processing-Route-Id:
              $ref: '#/components/headers/ProcessingRouteId'
