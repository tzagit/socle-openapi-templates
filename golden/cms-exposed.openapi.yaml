          maxLength: 200
          description: >-
            Card agreement additional information zone<br>This data allows to send discretionnary data from the bank to
            the card manufacturer or, in return, from the card manufacturer to the bank.<br>The CMS does not perform any
            action on this data.
      additionalProperties: false
    CardholderDataReq:
      title: CardholderDataReq
      type: object
      description: ''
      properties:
        civility:
          type:
            - string
            - 'null'
          minLength: 1
          maxLength: 16
          description: >-
            cardholder title<br>Civility of the cardholder<br>The data is defined as a 16 characters string but at this
            stage the CMS service only uses the first 10 characters
        firstName:
          type: string
          minLength: 1
          maxLength: 70
          description: >-
            first name<br>The first name is defined as 70 characters strings but, at this stage, the CMS service only
            uses up to the first 40 characters.
        lastName:
          type: string
          minLength: 1
          maxLength: 70
          description: >-
            last name<br>The last name is defined as 70 characters strings but, at this stage, the CMS service only uses
            up to the first 40 characters.
        dateOfBirth:
          type:
            - string
            - 'null'
          format: date
          description: Date of birth of cardholder
        birthPlace:
          type:
            - string
            - 'null'
          minLength: 1
          maxLength: 50
          description: Cardholder birth place
        birthCountryCode:
          type:
            - string
            - 'null'
          pattern: ^[0-9]{3}$
          description: Cardholder birth country code<br>Birth country code of the cardholder (ISO 3166, Numeric-3 code)
        countryCode:
          type: string
          pattern: ^[0-9]{3}$
          description: country code of cardholder<br>Cardholder residence country code (ISO 3166, Numeric-3 code)
        gender:
          type:
            - string
            - 'null'
          minLength: 1
          maxLength: 10
          description: Cardholder Gender
        localLanguageCode:
          type: string
          pattern: ^[a-z]{2,3}$
          description: >-
            local language code <br>Language to be used for communication with the cardholder<br>This language is sent
            by the CMS to the card manufacturer for the manufacturer to edit letters in the cardholder's language<br>The
            language code is defined in accordance with ISO 639-1 and ISO 639-2.<br>Example : fra
        cellPhone:
          type:
            - string
            - 'null'
          pattern: ^\+(\d{1,3})[-\s]?(\d{1,3})[-\s]?(\d{6,10})$
          description: >-
            Cardholder cellphone number<br>Cardholder personal cellular phone number<br>Format : International phone
            number E164 standard<br>Example : +14151231234
        phoneNumber:
          type:
            - string
            - 'null'
          pattern: ^\+(\d{1,3})[-\s]?(\d{1,3})[-\s]?(\d{6,10})$
          description: >-
            phone number<br>Cardholder personal landline phone number<br>Format : International phone number E164
            standard<br>Example : +14151231234
        proPhone:
          type:
            - string
            - 'null'
          pattern: ^\+(\d{1,3})[-\s]?(\d{1,3})[-\s]?(\d{6,10})$
          description: >-
            Cardholder pro phone number<br>Cardholder professional phone number<br>Format : International phone number
            E164 standard<br>Example : +14151231234
        email:
          type:
            - string
            - 'null'
          format: email
          description: email address
        postalAddress:
          type: object
          properties:
            postalAddressID:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 36
            room:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 70
            floor:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 70
            streetName:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 70
            postBox:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 16
            townNameLocation:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 70
            postCode:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 16
            townName:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 70
            countryCode:
              type:
                - string
                - 'null'
              pattern: ^[0-9]{3}$
          description: >-
            Postal Address<br>Principal postal address of a cardholder used by default when non explicit shipping
            conditions are provided by the bank<br>postalAddressID is the postalAddress identifier which may be provided
            by the bank in the subscription and which will correspond to the identifier provided upon retrieval of the
            cardholder details.<br>The data are used to format the address on a letter as follows :<br>- Line 1 is set
            using the civility/firstName/lastName data which are provided separately<br>- Line 2 is set using the
            room<br>- Line 3 is set using the floor<br>- Line 4 is set using the streetName<br>- Line 5 is set by
            concatenating the postBox and the townNameLocation<br>- Line 6 is set by concatenating the postCode and the
            townName<br>- Line 7 is set using the countryCode (country name determined from the ISO3166 numeric-3
            code)<br>postalAddressID, townName and countryCode are required.<br>At least one of (room, floor, streetName
            or townNameLocation) is required.<br>The room, floor, streetName, townNameLocation and townName are defined
            as 70 characters  strings but, at this stage, the CMS service only uses up to the first 38 characters.
        secondaryPostalAddress:
          type:
            - object
            - 'null'
          properties:
            postalAddressID:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 36
            room:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 70
            floor:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 70
            streetName:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 70
            postBox:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 16
            townNameLocation:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 70
            postCode:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 16
            townName:
              type:
                - string
                - 'null'
              minLength: 1
              maxLength: 70
            countryCode:
              type:
                - string
                - 'null'
              pattern: ^[0-9]{3}$
          description: >-
            Cardholder secondary postal address<br>postalAddressID is the postalAddress identifier which may be provided
            by the bank in the subscription and which will correspond to the identifier provided upon retrieval of the
            cardholder details.<br>The data are used to format the address on a letter as follows :<br>- Line 1 is set
            using the civility/firstName/lastName data which are provided separately <br>- Line 2 is set using the
            room<br>- Line 3 is set using the floor<br>- Line 4 is set using the streetName<br>- Line 5 is set by
            concatenating the postBox and the townNameLocation<br>- Line 6 is set by concatenating the postCode and the
            townName<br>- Line 7 is set using the countryCode (country name determined from the ISO3166 numeric-3
            code)<br>postalAddressID, townName and countryCode are required.<br>At least one of (room, floor, streetName
            or townNameLocation) is required.<br>The room, floor, streetName, townNameLocation and townName are defined
            as 70 characters strings but, at this stage, the CMS service only uses up to the first 38 characters.
      additionalProperties: false
      required:
        - firstName
        - lastName
        - countryCode
        - localLanguageCode
        - postalAddress
    CardStatusCodeset:
      type: string
      enum:
        - ACIP
        - ACTV
        - BLIP
        - BLKD
        - CREA
        - DCTD
        - DEIP
        - VALD
      x-enumDescriptions:
        ACIP: Activation in progress
        ACTV: Activated
        BLIP: Blocking in progress
        BLKD: Blocked
        CREA: Created/declared
        DCTD: Deactivated
        DEIP: Deactivation in progress
        VALD: Validated
      description: >-
        Card status<br>Status of the card indicating the capacity to use the card or not<br>After subscription or
        remanufacturing, depending of the card product configuration, the cardStatus can be either 'validated' or
        'activated'.<br>After card activation, the cardStatus is 'activated'.<br>After card blocking, the cardStatus is
        'blocked'.<br>After card agreement termination, the cardStatus is 'deactivated'.<br>After activation of a new
        card and if the old card is deactivated, the cardStatus of the old card is 'deactivated'.<br>Intermediate
        statuses 'created/declared' or 'in progress' can be visible in UIs or can be obtained on research API services
        only in case of errors but they are not present in events<br>Value :
        Label<br>---------------------------------------------------------------------<br>CREA  :
        Created/declared<br>VALD : Validated<br>ACIP  : Activation in progress<br>ACTV : Activated<br>BLIP  : Blocking
        in progress<br>BLKD  : Blocked<br>DEIP  : Deactivation in progress<br>DCTD  : Deactivated
    CardSupportTypeCodeset:
      type: string
      enum:
        - DGTL
        - PHSL
      x-enumDescriptions:
        DGTL: Digital
        PHSL: Physical
      description: >-
        Card support type<br>Type of support for the card<br>The card can be physically manufactured (in this case, the
        card may be used digitally depending on the product configuration) or created as a digital card only<br>Value :
        Label<br>---------------------------------------------------------------------<br>PHSL  : Physical<br>DGTL  :
        Digital
    GetCardDataRes:
      title: GetCardDataRes
      type: object
      description: ''
      properties:
        primaryAccountNumberId:
          type: string
          format: uuid
          description: >-
            Primary Account Number ID<br>Identifier (also called PANid) associated to the PAN of the card.<br>The PANid
            is generated (in the form of an UUID v4) by Estreem during the processing of the subscription request sent
            to the CMS (either when the PAN is calculated by the CMS or when the PAN is provided by the bank).<br>The
            PANid is provided to the bank in the subscription response.<br>The PANid is used in further exchanges of the
            CMS and the IAS.
        encryptedPrimaryAccountNumber:
          type: string
          pattern: ^[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]*\.[A-Za-z0-9_-]*\.[A-Za-z0-9_-]+$
          description: >-
            encrypted pan<br>The encryption is done using JSON Web Encryption standard.<br>Once decrypted it represents
            a Primary Account Number (PAN), which is a 16 to 19 numeric characters string.
        expiryDate:
          type: string
          pattern: ^([0-9]{4})-(1[0-2]|0[1-9])$
          description: 'Expiry date<br>Format (ISO8601) : YYYY-MM ; Example 2024-12<br>Equivalent to DE14 in ISO8583 based protocols'
      additionalProperties: false
      required:
        - primaryAccountNumberId
        - expiryDate
    GetCardSecretCodeRes:
      title: GetCardSecretCodeRes
      type: object
      description: ''
      properties:
        encryptedEphemeralSecurePinBlockKey:
          type: string
          minLength: 1
          maxLength: 64
          description: Ephemeral Symetric Secure PinBlock Key encrypted by ephemeral Transport Key
        encryptedEphemeralTransportKey:
          type: string
          minLength: 256
          maxLength: 800
          description: Ephemeral Symetric Transport Key encrypted by a public RSA key
        pinBlockFormat:
          type: string
          enum:
            - ISO0
            - ISO1
            - ISO2
            - ISO3
            - ISO4
          x-enumDescriptions:
            ISO0: PIN diversified with the card account number, conforming to the standard ISO 9564-2.
            ISO1: PIN completed with random padding characters, conforming to the standard ISO 9564-2.
            ISO2: PIN without diversification characters, conforming to the standard ISO 9564-2.
            ISO3: PIN diversified with the card account number and random characters, conforming to the standard ISO 9564-2.
            ISO4: PIN format used with AES encryption, conforming to the new ISO SC2 format.
          description: >-
            Format of pin block<br>Value :
            Label<br>---------------------------------------------------------------------<br>ISO0  : PIN diversified
            with the card account number, conforming to the standard ISO 9564-2.<br>ISO1  : PIN completed with random
            padding characters, conforming to the standard ISO 9564-2.<br>ISO2  : PIN without diversification
            characters, conforming to the standard ISO 9564-2.<br>ISO3  : PIN diversified with the card account number
            and random characters, conforming to the standard ISO 9564-2.<br>ISO4  : PIN format used with AES
            encryption, conforming to the new ISO SC2 format. <br>ISO5  : (NOT USED by JV) Alternative PIN format used
            with AES encryption, conforming to the new ISO SC2 format.<br>NPIN  : No pin
        encryptedPinBlock:
          type: string
          pattern: ^([0-9A-F][0-9A-F]){8,16}$
          description: Encrypted Data<br>The data are encrypted using the key provided in the request
      additionalProperties: false
      required:
        - encryptedEphemeralSecurePinBlockKey
        - encryptedEphemeralTransportKey
        - pinBlockFormat
        - encryptedPinBlock
    GetCardSecurityCodeRes:
      title: GetCardSecurityCodeRes
      type: object
      description: ''
      properties:
        encryptedCardSecurityCode:
          type: string
          pattern: ^[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]*\.[A-Za-z0-9_-]*\.[A-Za-z0-9_-]+$
          description: >-
            Field used to transmit the encrypted card security code (CVx)<br>The encryption is done using JSON Web
            Encryption standard.<br>Once decrypted it represents the card security code (CVx), which is a 3 numeric
            characters string.
      additionalProperties: false
      required:
        - encryptedCardSecurityCode
    CardslistRes:
      title: CardslistRes
      type: object
      description: ''
      properties:
        cardAgreement:
          type: object
          description: ''
          properties:
            closingDateTime:
              type: string
              format: date-time
              description: >-
                Card agreement closing date and time<br>Date and time for the closure of the card agreement<br><br>On
                the closure request :<br>   - If the date and time are present, the card agreement will be closed on
                that specific date and time<br>   - Otherwise, the card agreement will be closed on the expiration of
                current active card (as a consequence stopping the automatic renewal process)<br><br>The date and time
                are specified in the following form <YYYY-MM-DDThh:mm:ssz> (ISO8601 datetime format)
            optionList:
              type: array
              items:
                type: object
                description: ''
                properties:
                  code:
                    type: string
                    minLength: 1
                    maxLength: 50
                    description: >-
                      Card agreement option code<br>Code defining the option associated to the card agreement<br>The
                      values to be used are defined in the parameters associated to the product catalog.<br>Example of
                      values and
                      label<br>---------------------------------------------------------------------<br>TRAVEL_OPTION :
                      Travel option (subscription for reduced or canceled fees when using card in foreign
                      countries)<br>CASH_LIMIT : Limit for cash that can be provided to a cardholder (used for premium
                      cards) the amount must be provided in the optionData<br>DELEGATED_WITHDRAWAL_LIMIT : Limit for
                      delegated withdrawal (used for premium cards) the amount must be provided in the optionData
                  data:
                    type: string
                    minLength: 1
                    maxLength: 35
                    description: >-
                      Data for the option<br>The values depend on the option code and are defined in the parameters
                      associated to the product catalog.<br>For example, the value must be present if optionCode is
                      CASH_LIMIT or DELEGATED_WITHDRAWAL_LIMIT
                  startDateTime:
                    type: string
                    format: date-time
                    description: >-
                      Start date/time of the option<br>Start date/time of the option if the option has to be activated
                      for a limited period of time<br>The date and time are specified in the following form
                      <YYYY-MM-DDThh:mm:ssz> (ISO8601 datetime format)
                  endDateTime:
                    type: string
                    format: date-time
                    description: >-
                      End date/time of the option<br>End date/time of the option if the option has to be activated for a
                      limited period of time<br>The date and time are specified in the following form
                      <YYYY-MM-DDThh:mm:ssz> (ISO8601 datetime format)
                additionalProperties: false
            shippingConditionList:
              type: array
              items:
                type: object
                description: ''
                properties:
                  code:
                    type: string
                    minLength: 1
                    maxLength: 50
                    description: >-
                      Shipping condition code<br>Shipping condition code of the card contract/agreement<br>The values to
                      be used are defined in the parameters associated to the product catalog.
                  entityId:
                    type: string
                    minLength: 1
                    maxLength: 36
                    description: >-
                      Shipping condition entity Id<br>Identifier of the physical entity to be used for the shipping
                      condition<br>For example, a branch to send the card
                  postalAddressId:
                    type: string
                    pattern: ^[0-9a-zA-Z\-]{1,36}$
                    description: >-
                      Shipping condition postal address identifier<br>The data of the postal address (this identifier
                      and its corresponding details) will be obtained upon retrieval of the cardholder data.
                  postalAddress:
                    $ref: '#/components/schemas/PostalAddress'
                  startDateTime:
                    type: string
                    format: date-time
                    description: >-
                      Start date and time of the temporary shipping condition<br>When a temporary shipping condition is
                      set a start date and time is defined<br>The date and time are specified in the following form
                      <YYYY-MM-DDThh:mm:ssz> (ISO8601 datetime format)
                  endDateTime:
                    type: string
                    format: date-time
                    description: >-
                      End date and time of the temporary shipping condition<br>When a temporary shipping condition is
                      set an end date and time is defined<br>The date and time are specified in the following form
                      <YYYY-MM-DDThh:mm:ssz> (ISO8601 datetime format)
                additionalProperties: false
            usageLimitList:
              type: array
              items:
                type: object
                description: ''
                properties:
                  code:
                    $ref: '#/components/schemas/Code'
                  type:
                    type: string
                    enum:
                      - OTHR
                      - STRD
                      - TEMP
                    x-enumDescriptions:
                      OTHR: Other
                      STRD: Standard
                      TEMP: Temporary
                    description: >-
                      Usage limit type<br>Code defining the type of the usage limit<br>Value :
                      Label<br>---------------------------------------------------------------------<br>OTHR : Other
                      (reserved for future use)<br>STRD  : Standard<br>TEMP  : Temporary (reserved for future use)
                  valueType:
                    $ref: '#/components/schemas/ValueType'
                  amount:
                    type: object
                    properties:
                      amount:
                        type: string
                        pattern: ^\-?[0-9]{1,18}(\.?[0-9]{0,5})?$
                      currency:
                        type: string
                        pattern: ^[0-9]{3}$
                    description: >-
                      Amount of the usage limit<br>Amount and currency of the usage limit set at the product level in
                      the configuration of the CMS (this is the default amount and currency of the limit)<br>This amount
                      and currency are significant if the usageLimitValueType is set as AMNT<br>The curency is provided
                      as a ISO 4217, Numeric-3 code.<br>The amount is provided as a number of monetary units specified
                      by the currency code in compliance with ISO4217. The decimal separator is a dot.
                  personalizedAmount:
                    $ref: '#/components/schemas/PersonalizedAmount'
                  number:
                    type: string
                    pattern: ^[0-9A-Za-z]{1,20}$
                    description: >-
                      Number of the usage limit<br>Number of the usage limit set at the product level in the
                      configuration of the CMS (this is the default number of the limit)<br>This number is significant
                      if the usageLimitValueType is set as NUBR (RFU)
                  personalizedNumber:
                    type: string
                    pattern: ^[0-9A-Za-z]{1,18}$
                    description: >-
                      Personalized number of the usage limit<br>Number of the usage limit provided by the bank during
                      the subscription or modified after the subscription (this number overrides the default number of
                      the limit)<br>This number is significant if the usageLimitValueType is set as NUBR (RFU)<br>This
                      number can be temporary if a start and end date/time are defined or permanent if no date/time are
                      defined.
                  startDateTime:
                    type: string
                    format: date-time
                    description: >-
                      Starting date and time of the temporary limit/usage<br>The date and time are specified in the
                      following form <YYYY-MM-DDThh:mm:ssz> (ISO8601 datetime format)
                  endDateTime:
                    type: string
                    format: date-time
                    description: >-
                      Ending date and time of the temporary limit/usage<br>The date and time are specified in the
                      following form <YYYY-MM-DDThh:mm:ssz> (ISO8601 datetime format)
                additionalProperties: false
            usageCurrentValueList:
              type: array
              items:
                type: object
                description: ''
                properties:
                  code:
                    type: string
                    enum:
                      - PDOM
                      - PINT
                      - PTOT
                      - WGRD
                      - WGRI
                      - WNGD
                      - WNGI
                      - WTOT
                    x-enumDescriptions:
                      PDOM: Purchase DOMestic
                      PINT: Purchase INTernational
                      PTOT: Purchase TOTal
                      WGRD: Withdrawal GRoup Domestic
                      WGRI: Withdrawal GRoup International
                      WNGD: Withdrawal Not Group Domestic
                      WNGI: Withdrawal Not Group International
                      WTOT: Withdrawal TOTal
                    description: >-
                      Card usage code<br>Code defining the context of use of the usage current value<br>The usage
                      current value code must be identical to the corresponding usage limit code<br><br>Value :
                      Label<br>---------------------------------------------------------------------<br>PDOM : Paiement
                      domestique (Purchase DOMestic)<br>PINT : Paiement international (Purchase INTernational)​<br>PTOT
                      : Paiement total (Purchase TOTal)<br>WGRD : Retrait domestique groupe (Withdrawal GRoup
                      Domestic)<br>WNGD : Retrait domestique hors groupe et cash manuel domestique (Withdrawal Not Group
                      Domestic)​<br>WGRI : Retrait international groupe (Withdrawal GRoup International)​<br>WNGI :
                      Retrait international hors groupe et cash manuel international (Withdrawal Not Group
                      International)<br>WTOT : Retrait total (Withdrawal TOTal)​
                  type:
                    type: string
                    enum:
                      - OTHR
                      - STRD
                      - TEMP
                    x-enumDescriptions:
                      OTHR: Other
                      STRD: Standard
                      TEMP: Temporary
                    description: >-
                      Card limit type<br>Code defining the type of the usage current value and the usage current value
                      limit <br>The usage current value limit type must be identical to the corresponding usage limit
                      type<br>Value :
                      Label<br>---------------------------------------------------------------------<br>OTHR : Other
                      (reserved for future use)<br>STRD  : Standard<br>TEMP  : Temporary (reserved for future use)
                  valueType:
                    type: string
                    enum:
                      - AMNT
                      - NUBR
                    x-enumDescriptions:
                      AMNT: Amount
                      NUBR: Number
                    description: >-
                      valueType set at the product level<br>Type defining whether the usage current value and the usage
                      current value limit are an amount or a number<br>In the current definition, only amounts are
                      supported.<br>The definition of the "number" type is reserved for future use<br>Value :
                      Label<br>---------------------------------------------------------------------<br>AMNT  :
                      Amount<br>NUBR  : Number (RFU)
                  limitAmount:
                    type: object
                    properties:
                      amount:
                        type: string
                        pattern: ^\-?[0-9]{1,18}(\.?[0-9]{0,5})?$
                      currency:
                        type: string
                        pattern: ^[0-9]{3}$
                    description: >-
                      Current amount active for the limit<br>Current amount and currency active for the limit<br>This
                      amount and currency are significant if the usageCurrentValueType is set as AMNT<br>This can be
                      either the temporary personalized amount or the permanent personalized amount or the default
                      amount<br>The amount is provided as a number of monetary units specified by the currency code in
                      compliance with ISO4217. The decimal separator is a dot.<br>The curency is provided as a ISO 4217,
                      Numeric-3 code.
                  currentAmount:
                    type: object
                    properties:
                      amount:
                        type: string
                        pattern: ^\-?[0-9]{1,18}(\.?[0-9]{0,5})?$
                    description: >-
                      Amount of the current usage value<br>Current amount used on the limit<br>This amount is
                      significant if the usageCurrentValueType is set as AMNT<br>The amount is provided as a number of
                      monetary units specified in a currency where the unit of currency is implied by the context and
                      compliant with ISO 4217. The decimal separator is a dot.
                  limitNumber:
                    type: string
                    pattern: ^[0-9A-Za-z]{1,20}$
                    description: >-
                      Number of the usage limit<br>Current number active for the limit<br>This number is significant if
                      the usageCurrentValueType is set as NUBR (RFU)<br>This number can be either the temporary or
                      permanent personnalizedNumber or the default number
                  currentNumber:
                    type: string
                    pattern: ^[0-9A-Za-z]{1,20}$
                    description: >-
                      Number of the current usage value<br>Current number used on the limit<br>This number is
                      significant if the usageCurrentValueType is set as NUBR (RFU)
                additionalProperties: false
            usageRestrictionList:
              type: array
              items:
                type: object
                description: ''
                properties:
                  code:
                    type: string
                    minLength: 1
                    maxLength: 100
                    description: >-
                      Card usage restriction code<br>Code defining the usage restriction of the card<br>Value :
                      Label<br>---------------------------------------------------------------------<br>MOTO :
                      Restriction on MOTO transactions<br>WDRL : Restriction on withdrawal transactions<br>PRCH :
                      Restriction on purchase transactions<br>CTLS : Restriction on contactless transactions<br>GEOB :
                      Restriction on geoblocking : the zone/region for which the geoblocking is applied must be provided
                      in the usageRestrictionData
                  data:
                    type: string
                    minLength: 1
                    maxLength: 256
                    description: >-
                      Card usage restriction data<br>Data to be used for the usage restriction<br>The values depend on
                      the usage restriction code.<br>The value must be used if usageRestrictionCode is GEOB to represent
                      the zone/region on which the geoblocking is
                      applied<br>Value<br>---------------------------------------------------------------------<br>ZONE_A<br>ZONE_B<br>ZONE_C<br>ZONE_D<br>ZONE_E<br>ZONE_F<br>ZONE_G
                  startDateTime:
                    type: string
                    format: date-time
                    description: >-
                      startDateTime<br>Start date/time of the usage restriction if the usage restriction has to be
                      activated for a limited period of time<br>The date and time are specified in the following form
                      <YYYY-MM-DDThh:mm:ssz> (ISO8601 datetime format)
                  endDateTime:
                    type: string
                    format: date-time
                    description: >-
                      endDateTime<br>End date/time of the usage restriction if the usage restriction has to be activated
                      for a limited period of time<br>The date and time are specified in the following form
                      <YYYY-MM-DDThh:mm:ssz> (ISO8601 datetime format)
                additionalProperties: false
          additionalProperties: false
        cardList:
          type: array
          items:
            type: object
            description: ''
            properties:
              id:
                type: string
                format: uuid
                description: >-
                  Card identifier<br>Unique identifier of the card.<br>This identifier is generated by the CMS during
                  the subscription, during a remanufacturing or during an opposition if a card is
                  remanufactured.<br>Afterwards, it is used to access the card ressource on other APIs.
              maskedPrimaryAccountNumber:
                type: string
                minLength: 1
                maxLength: 30
                description: Masked Primary Account Number<br>Displayable version of the PAN with masked caracters
              sequenceNumber:
                type: string
                pattern: ^[0-9]{2,3}$
                description: Card Sequence Number<br>Equivalent to DE23 in ISO8583 based protocols
              creationDate:
                type: string
                format: date-time
                description: Card creation date<br>Date of creation of the card in the CMS
              expiryDate:
                type: string
                pattern: ^([0-9]{4})-(1[0-2]|0[1-9])$
                description: >-
                  Expiry date<br>Format (ISO8601) : YYYY-MM ; Example 2024-12<br>Equivalent to DE14 in ISO8583 based
                  protocols
              status:
                $ref: '#/components/schemas/CardStatusCodeset'
              activationDateTime:
                type: string
                format: date-time
                description: >-
                  Activation date and time<br>The date and time are specified in the following form
                  <YYYY-MM-DDThh:mm:ssz> (ISO8601 datetime format)
              alphaTestIndicator:
                type: boolean
                description: Alpha test indicator<br>Indicates if the card must be manufactured for alpha tests or not
              cardholderPictureId:
                type: string
                minLength: 1
                maxLength: 100
                description: >-
                  Distribution identifier of the card design picture for the cardholder - may be an URL<br>Identifier of
                  the card design picture for the cardholder provided by the bank during the subscription (for example,
                  it may be an URL)
              chainingMaskedPrimaryAccountNumber:
                type: string
                minLength: 1
                maxLength: 30
                description: >-
                  Masked Primary Account Number of the chaining card<br>Displayable version of the PAN with masked
                  caracters of the card to be used for chaining data from a previous card upon renewing the card (for
                  example, retrieving the PIN code or personalized limits)
              chainingSequenceNumber:
                type: string
                pattern: ^[0-9]{2,3}$
                description: >-
                  Card Sequence Number of the chaining card<br>Card sequence number of the card to be used for chaining
                  data from a previous card upon renewing the card (for example, retrieving the PIN code or personalized
                  limits)<br>Equivalent to DE23 in ISO8583 based protocols
              chainingExpiryDate:
                type: string
                pattern: ^([0-9]{4})-(1[0-2]|0[1-9])$
                description: >-
                  Expiry date of the chaining card<br>Expiry date of the card to be used for chaining data from a
                  previous card upon renewing the card (for example, retrieving the PIN code or personalized
                  limits)<br>Format (ISO8601) : YYYY-MM ; Example 2024-12<br>Equivalent to DE14 in ISO8583 based
                  protocols
              contactlessPresenceOnChipIndicator:
                type: boolean
                description: >-
                  Contactless presence on the chip<br>Indicates whether the contacless feature is present on the chip or
                  not
              context:
                type: object
                description: ''
                properties:
                  blockingDateTime:
                    type: string
                    format: date-time
                    description: >-
                      Blocking date and time<br>The date and time are specified in the following form
                      <YYYY-MM-DDThh:mm:ssz> (ISO8601 datetime format)
                  blockingReasonCode:
                    $ref: '#/components/schemas/BlockingReasonCode'
                  blockingReference:
                    type: string
                    pattern: ^[0-9a-zA-Z\-]{1,36}$
                    description: Blocking reference<br>Reference generated by the CMS when processing a card blocking request
                  contactlessActivationChoiceCode:
                    type: boolean
                    description: >-
                      Contactless activation choice code<br>Code to activate or not the contacless function of the card
                      depending on the cardholder choice at the subscription<br>Possible values are 'true' or 'false'
                  contactlessIndicator:
                    type: boolean
                    description: Contactless indicator<br>Indicates whether the contactless feature is activated or not on the card
                  lockingIndicator:
                    type: boolean
                    description: Card locking indicator<br>Indicates if the card is locked or not
                  lockingReasonCode:
                    $ref: '#/components/schemas/LockingReasonCode'
                  urgentManufacturingIndicator:
                    type: boolean
                    description: >-
                      Urgent manufacturing indicator<br>Indicator to request an urgent manufacturing of the card<br>By
                      default no urgent manufacturing is requested
                additionalProperties: false
              designCode:
                type: string
                minLength: 1
                maxLength: 50
                description: >-
                  Card design code defined by the distribution<br>Code to define the design selected by the cardholder
                  during the subscription and to be used to print the card
              dynamicCardSecurityCodeIndicator:
                type: boolean
                description: Dynamic card security code indicator <br>Indicates whether the card security code is dynamic or not
              embossedComplementaryData:
                type: string
                minLength: 1
                maxLength: 35
                description: >-
                  Complementary embossed zone label<br>Complementary line for the embossed zone to be printed on the
                  card
              embossedZone:
                type: string
                minLength: 1
                maxLength: 35
                description: >-
                  Card embossed zone label<br>Label to use for the embossed zone printed on the card in case the default
                  format needs to be overridden
              manufacturingReasonCode:
                type: string
                enum:
                  - AUTO
                  - CLOS
                  - EMRP
                  - EXTL
                  - INIT
                  - REQD
                  - RNWL
                  - SUBS
                  - TCLS
                x-enumDescriptions:
                  AUTO: Automatical
                  CLOS: Closure
                  EMRP: Emergency_pan
                  EXTL: External
                  INIT: Initialisation
                  REQD: Requested
                  RNWL: Renewal
                  SUBS: Subscription
                  TCLS: To_close
                description: >-
                  Manufacturing reason code<br>Code indicating the reason of the manufacturing of the card<br>Value :
                  Label<br>---------------------------------------------------------------------<br>INIT  :
                  Initialisation<br>SUBS  : Subscription<br>REQD  : Requested<br>AUTO  : Automatical<br>RNWL  :
                  Renewal<br>EXTL  : External<br>EMRP  : Emergency_pan<br>TCLS  : To_close<br>CLOS  : Closure
              manufacturingRequestForecastDateTime:
                type: string
                format: date-time
                description: >-
                  Forecasted manufacturing date and time<br>Anticipated date and time for the CMS to send the card
                  creation request to the manufacturer<br>The date and time are specified in the following form
                  <YYYY-MM-DDThh:mm:ssz> (ISO8601 datetime format)
              manufacturingRequestRealDateTime:
                type: string
                format: date-time
                description: >-
                  Real manufacturing date and time<br>Real date and time when the CMS sent the card creation request to
                  the manufacturer<br>The date and time are specified in the following form <YYYY-MM-DDThh:mm:ssz>
                  (ISO8601 datetime format)
              manufacturingStatus:
                type: string
                enum:
                  - ACCP
                  - CLOS
                  - DEDO
                  - DEPE
                  - MAND
                  - NDCL
                  - NMAN
                  - RFSD
                x-enumDescriptions:
                  ACCP: Accepted
                  CLOS: Close
                  DEDO: Declar_done
                  DEPE: Declar_pending
                  MAND: Manufactured
                  NDCL: Not_declared
                  NMAN: Not_manufactured
                  RFSD: Refused
                description: >-
                  Manufacturing status<br>Status representing the progress of the card manufacturing process<br>Value :
                  Label<br>---------------------------------------------------------------------<br>NDCL  :
                  Not_declared<br>DEPE  : Declar_pending<br>DEDO  : Declar_done<br>ACCP  : Accepted<br>RFSD  :
                  Refused<br>MAND  : Manufactured<br>NMAN  : Not_manufactured<br>CLOS  : Close
              productCode:
                type: string
                minLength: 1
                maxLength: 50
                description: >-
                  Product Code<br>Product code of the card contract/agreement<br>The values to be used are defined in
                  the parameters associated to the product catalog.
              replacementCode:
                type: string
                enum:
                  - REPL
                  - STND
                x-enumDescriptions:
                  REPL: Replacement/Emergency card
                  STND: Standard card
                description: >-
                  Card replacement Code<br>Code indicating whether the card is a standard (regular) card or a
                  replacement (emergency) card<br>Value :
                  Label<br>---------------------------------------------------------------------<br>STND  :
                  Standard<br>REPL   : Replacement/Emergency card
              replacementMaskedPrimaryAccountNumber:
                type: string
                minLength: 1
                maxLength: 30
                description: >-
                  Masked Primary Account Number of the replacement card<br>If the card product supports the replacement
                  card feature (as indicated by replacementCardIndicator in the card agreement parameters), the PAN of
                  the replacement card which can be displayed with masked caracters
              remanufacturingReasonCode:
                $ref: '#/components/schemas/RemanufacturingReasonCode'
            additionalProperties: false
      additionalProperties: false
    CardLockingReq:
      title: CardLockingReq
      type: object
      description: ''
      properties:
        lockingReasonCode:
          anyOf:
            - $ref: '#/components/schemas/LockingReasonCode'
            - type: 'null'
      additionalProperties: false
    CardReprintSecretCodeReq:
      title: CardReprintSecretCodeReq
      type: object
      description: ''
      properties:
        context:
          type:
