        This endpoint sends a notification containing a summary of an issuer dispute case (CNT-EM26)

        - **X-Event-Type**: dispute-case-summary
        - **X-Event-Version**: 1.0
      x-event-version: '1.0'
      tags:
        - Dispute Case
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/XInstitutionId'
        - $ref: '#/components/parameters/XUserId'
