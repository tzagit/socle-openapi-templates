openapi: 3.1.1
info:
  title: Notifications Connector API - OpenAPI 3.0
  version: 1.7.0
  description: Example of Notifications connector exposed by the Bank to receive events full or notifications sent by Estreem
  contact:
    name: Estreem
    url: https://estreem.eu
    email: support@estreem.eu
  x-dictionary-version: _DICO_ESTREEM_v21.15.xlsx
  x-socle-version: 0.1.0
  x-socle-type: events
components:
  schemas:
    StandardError:
      type: object
      description: Standard error response used across all APIs
      properties:
        code:
          type: string
          minLength: 1
          maxLength: 20
          description: Functional or technical error code
        text:
          type: string
          minLength: 1
          maxLength: 40
          description: User-friendly error message
        developerText:
          type: string
          minLength: 1
          maxLength: 70
          description: Detailed technical message for debugging
        moreInfo:
          type: string
          minLength: 1
          maxLength: 256
          description: Additional information or documentation link
    DMDisputeCaseSummary:
      description: Objet racine - Evenement de synthèse d'un dossier de contestation émetteur
      type: object
      properties:
        id:
          description: Dispute Case reference<br>Identifiant du dossier de Contestation attribué par le Processeur
          type: string
          example: E102071801051900
          pattern: ^[0-9A-Za-z]{16}$
        qualification:
          anyOf:
            - $ref: '#/components/schemas/Qualification'
            - type: 'null'
        condition:
          anyOf:
            - $ref: '#/components/schemas/Condition'
            - type: 'null'
        creationDateTime:
          description: Creation date time<br>Date  et heure de création du dossier (AAAA-MM-JJTHH:MM:SS) en UTC
          type:
            - string
            - 'null'
          format: date-time
          example: '2025-07-28T15:04:34'
        localDateTime:
          description: Date Time in local region<br>Date  et heure de contestation (AAAA-MM-JJTHH:MM:SS) en UTC
          type:
            - string
            - 'null'
          format: date-time
          example: '2025-07-28T15:04:34'
        closureDateTime:
          description: Closure date time<br>Date  et heure de clôture du dossier (AAAA-MM-JJTHH:MM:SS) en UTC
          type:
            - string
            - 'null'
          format: date-time
          example: '2025-10-28T15:04:34'
        reopeningDateTime:
          description: Reopening date time<br>Date  et heure de dernière ré-ouverture du dossier (AAAA-MM-JJTHH:MM:SS) en UTC
          type:
            - string
            - 'null'
          format: date-time
          example: '2025-08-03T10:04:34'
        psdTypology:
          description: Payment Service Directive typology <br>Typologie DSP (directive des services de paiement) du dossier
          type:
            - string
            - 'null'
          example: OTHE
          enum:
            - AUTH
            - BAEX
            - OTHE
            - UNAU
          x-enumDescriptions:
            AUTH: Authorised
            BAEX: Bad execution
            OTHE: Other
            UNAU: Unauthorised
        caseAdvancementCode:
          description: Case Advancement Code<br>indique le code d'avancement du dossier
          type:
            - string
            - 'null'
          example: CLOS
          enum:
            - ANLY
            - CLOS
            - COMP
            - DERM
            - INCO
            - PURG
            - RECA
            - REOP
          x-enumDescriptions:
            ANLY: Analysed
            CLOS: Closed
            COMP: Complete
            DERM: Decided recovery methods
            INCO: Incomplete
            PURG: Purge
            RECA: Acquirer recovered
            REOP: Reopened
        withoutAnalysysIndicator:
          description: >-
            Indicator specifying that the dispute case should not be analysed<br>indique si, après la prise de décision,
            le dossier doit faire l'objet d'une analyse (true), ou pas (false), par une utilisateur SMC. Si l'indicateur
            est à non, la suite de l'analyse est prise en charge par le batch d'emission des CRE.
          type:
            - boolean
            - 'null'
          example: false
        scoringEligibilityIndicator:
          description: >-
            Indicator used to determine whether the case must be submitted to a prescore calculation<br>Indicateur
            permettant de déterminer si le dossier doit être soumis à un calcul de prescore
          type: boolean
          example: true
        scoringStatus:
          anyOf:
            - $ref: '#/components/schemas/ScoringStatus2'
            - type: 'null'
        insuredIndicator:
          description: >-
            Insured indicator<br>indique si le porteur est assuré (true) ou non (false). Si cette information est non
            renseignée (le booleen est non alimenté)
          type:
            - boolean
            - 'null'
          example: true
        refundDecisionCode:
          description: Decision of the dispute<br>Décision sur l'analyse du dossier
          type:
            - string
            - 'null'
          example: RFDB
          enum:
            - DERM
            - NORE
            - PARE
            - RFDB
          x-enumDescriptions:
            DERM: Decided recovery methods
            NORE: Non refundable
            PARE: Partially refundable
            RFDB: Refundable
        issuer:
          description: objet contenant les informations liées à la banque émettrice
          type: object
          additionalProperties: false
          properties:
            institutionId:
              description: Issuer institution Id<br>Code de la banque émetteur du dossier de contestation
              type:
                - string
                - 'null'
              example: '10207'
              maxLength: 5
              minLength: 1
            institutionName:
              description: Issuer institution Name<br>Libellé de la banque émetteur du dossier de contestation
              type:
                - string
                - 'null'
              example: BP Rives de Paris
              maxLength: 35
              minLength: 1
        card:
          $ref: '#/components/schemas/Card'
        insurance:
          description: objet contenant les informations liées à l'assurance
          type: object
          additionalProperties: false
          properties:
            insuranceContractLabel:
              description: >-
                Insurance contract label<br>Libellé du forfait associé à la carte (ex : Forfait Liaison, Satellis
                Essentiel, Satellis Intégral, Formule individuelle CONFORT )
              type:
                - string
                - 'null'
              example: Bouquet liberté
              maxLength: 255
              minLength: 1
            responsibilityLevel:
              description: Cardholder responsability level<br>Niveau de responsabilité du porteur
              type:
                - string
                - 'null'
              example: EXCL
              enum:
                - EXCL
                - NRSP
                - RESP
              x-enumDescriptions:
                EXCL: Exclusion (insurance not applicable)
                NRSP: Not Responsible
                RESP: Responsible (insurance applicable)
            maxAnnualInsuranceAmount:
              description: Max annual insurance amount<br>Montant annuel maximum de l'assurance signé et devise
              type:
                - object
                - 'null'
              example:
                amount: '2000.00'
                currency: '978'
              properties:
                amount:
                  type: string
                  pattern: ^\-?[0-9]{1,18}(\.?[0-9]{0,5})?$
                currency:
                  type: string
                  pattern: ^[0-9]{3}$
              required:
                - amount
                - currency
            maxSinisterInsuranceAmount:
              description: Max insurance amount per sinister<br>Montant maximum de l'assurance par sinistre signé et devise
              type:
                - object
                - 'null'
              example:
                amount: '1500.00'
                currency: '978'
              properties:
                amount:
                  type: string
                  pattern: ^\-?[0-9]{1,18}(\.?[0-9]{0,5})?$
                currency:
                  type: string
                  pattern: ^[0-9]{3}$
              required:
                - amount
                - currency
            excessAmount:
              description: Excess amount<br>Montant de la franchise  signé et devise
              type:
                - object
                - 'null'
              example:
                amount: '50.00'
                currency: '978'
              properties:
                amount:
                  type: string
                  pattern: ^\-?[0-9]{1,18}(\.?[0-9]{0,5})?$
                currency:
                  type: string
                  pattern: ^[0-9]{3}$
              required:
                - amount
                - currency
        accountingSummary:
          description: objet contenant la synthèse comptable
          type: object
          additionalProperties: false
          properties:
            totalAmount:
              description: Total amount<br>Montant total signé et devise du dossier
              type:
                - object
                - 'null'
              example:
                amount: '-169.80'
                currency: '978'
              properties:
                amount:
                  type: string
                  pattern: ^\-?[0-9]{1,18}(\.?[0-9]{0,5})?$
                currency:
                  type: string
                  pattern: ^[0-9]{3}$
              required:
                - amount
                - currency
            accountingTotalAmount:
              description: Accounting total amount<br>Montant comptable du dossier signé et devise
              type:
                - object
                - 'null'
              example:
                amount: '0.00'
                currency: '978'
              properties:
                amount:
                  type: string
                  pattern: ^\-?[0-9]{1,18}(\.?[0-9]{0,5})?$
                currency:
                  type: string
                  pattern: ^[0-9]{3}$
              required:
                - amount
                - currency
            clientSettlementTotalAmount:
              description: Settlement Total Amount<br>Montant signé et devise du règlement client
              type:
                - object
                - 'null'
              example:
                amount: '129.90'
                currency: '978'
              properties:
                amount:
                  type: string
                  pattern: ^\-?[0-9]{1,18}(\.?[0-9]{0,5})?$
                currency:
                  type: string
                  pattern: ^[0-9]{3}$
              required:
                - amount
                - currency
            creditReserveSettlementTotalAmount:
              description: >-
                Settlement Total Amount<br>Montant signé et devise du règlement effectué sur le contrat de réserve de
                crédit du client
              type:
                - object
                - 'null'
              example:
                amount: '0.00'
                currency: '978'
              properties:
                amount:
                  type: string
                  pattern: ^\-?[0-9]{1,18}(\.?[0-9]{0,5})?$
                currency:
                  type: string
                  pattern: ^[0-9]{3}$
              required:
                - amount
                - currency
            acquirerRecoveryTotalAmount:
              description: >-
                Total Amount<br>Montant recouvré  signé et devise de l'acquéreur (somme des montants pris en charge par
                l'établissement, par NPS et par le porteur)
              type:
                - object
                - 'null'
              example:
                amount: '89.90'
                currency: '978'
              properties:
                amount:
                  type: string
                  pattern: ^\-?[0-9]{1,18}(\.?[0-9]{0,5})?$
                currency:
                  type: string
                  pattern: ^[0-9]{3}$
              required:
                - amount
                - currency
            chargebackTotalAmount:
              description: Total Amount<br>Montant signé et devise des impayés
              type:
                - object
                - 'null'
              example:
                amount: '89.90'
                currency: '978'
              properties:
                amount:
                  type: string
                  pattern: ^\-?[0-9]{1,18}(\.?[0-9]{0,5})?$
                currency:
                  type: string
                  pattern: ^[0-9]{3}$
              required:
                - amount
                - currency
            presentmentTotalAmount:
              description: Total Amount<br>Montant signé et devise des représentations
              type:
                - object
                - 'null'
              example:
                amount: '0.00'
                currency: '978'
              properties:
                amount:
                  type: string
                  pattern: ^\-?[0-9]{1,18}(\.?[0-9]{0,5})?$
                currency:
                  type: string
                  pattern: ^[0-9]{3}$
              required:
                - amount
                - currency
            recourseTotalAmount:
              description: Total Amount<br>Montant signé et devise des recours
              type:
                - object
                - 'null'
              example:
                amount: '0.00'
                currency: '978'
              properties:
                amount:
                  type: string
                  pattern: ^\-?[0-9]{1,18}(\.?[0-9]{0,5})?$
                currency:
                  type: string
                  pattern: ^[0-9]{3}$
              required:
                - amount
                - currency
            insuranceRecoveryTotalAmount:
              description: Total Amount<br>Montant signé et devise recouvré par l'assurance
              type:
                - object
                - 'null'
              example:
                amount: '0.00'
                currency: '978'
              properties:
                amount:
                  type: string
                  pattern: ^\-?[0-9]{1,18}(\.?[0-9]{0,5})?$
                currency:
                  type: string
                  pattern: ^[0-9]{3}$
              required:
                - amount
                - currency
            establishmentRecoveryTotalAmount:
              description: Total Amount<br>Montant signé et devise pris en charge par l'établissement
              type:
                - object
                - 'null'
              example:
                amount: '40.00'
                currency: '978'
              properties:
                amount:
                  type: string
                  pattern: ^\-?[0-9]{1,18}(\.?[0-9]{0,5})?$
                currency:
                  type: string
                  pattern: ^[0-9]{3}$
              required:
                - amount
                - currency
            npsRecoveryTotalAmount:
              description: Total Amount<br>Montant signé et devise pris en charge par NPS
              type:
                - object
                - 'null'
              example:
                amount: '0.00'
                currency: '978'
              properties:
                amount:
                  type: string
                  pattern: ^\-?[0-9]{1,18}(\.?[0-9]{0,5})?$
                currency:
                  type: string
                  pattern: ^[0-9]{3}$
              required:
                - amount
                - currency
            cardholderRecoveryTotalAmount:
              description: Total Amount<br>Montant signé et devise pris en charge par le porteur
              type:
                - object
                - 'null'
              example:
                amount: '-39.90'
                currency: '978'
              properties:
                amount:
                  type: string
                  pattern: ^\-?[0-9]{1,18}(\.?[0-9]{0,5})?$
                currency:
                  type: string
                  pattern: ^[0-9]{3}$
              required:
                - amount
                - currency
        settlementList:
          type:
            - array
            - 'null'
          items:
            type: object
            description: Liste des règlements du dossier
            properties:
              refundNature:
                anyOf:
                  - $ref: '#/components/schemas/RefundNature'
                  - type: 'null'
              totalAmount:
                description: Total Amount<br>Montant signé et devise du règlement
                type:
                  - object
                  - 'null'
                example:
                  amount: '40.00'
                  currency: '978'
                properties:
                  amount:
                    type: string
                    pattern: ^\-?[0-9]{1,18}(\.?[0-9]{0,5})?$
                  currency:
                    type: string
                    pattern: ^[0-9]{3}$
                required:
                  - amount
                  - currency
              feesAmount:
                description: Fees Amount<br>Montant signé et devise de la commission
                type:
                  - object
                  - 'null'
                example:
                  feesAmount: '0.00'
                  currency: '978'
                properties:
                  feesAmount:
                    type: string
                    pattern: ^\-?[0-9]{1,5}(\.?[0-9]{0,10})?$
                  currency:
                    type: string
                    pattern: ^[0-9]{3}$
                required:
                  - feesAmount
                  - currency
              accoutingDateTime:
                description: Accounting Date Time<br>Date et heure comptable du règlement (AAAA-MM-JJTHH:MM:SS) en UTC
                type:
                  - string
                  - 'null'
                format: date-time
                example: '2025-07-29T00:00:00'
              localDateTime:
                description: Date Time in local region<br>Date et heure de valeur du règlement (AAAA-MM-JJTHH:MM:SS) en UTC
                type:
                  - string
                  - 'null'
                format: date-time
                example: '2025-07-28T15:04:34'
              statusLabel:
                description: Label of the settlement status<br>Libellé du statut du règlement
                type:
                  - string
                  - 'null'
                example: Transmis établissement
                maxLength: 255
                minLength: 1
            additionalProperties: false
          maxItems: 100
          minItems: 1
        transactionList:
          type:
            - array
            - 'null'
          items:
            type: object
            description: Liste des transactions rattachées au dossier
            properties:
              identification:
                description: objet contenant les informations pour l'identification de la transaction
                type:
                  - object
                  - 'null'
                additionalProperties: false
                properties:
                  reference:
                    description: Transaction Reference<br>Identifiant unique de transaction attribué par le Processeur (COIDOP)
                    type:
                      - string
                      - 'null'
                    example: R3079017501428448
                    maxLength: 35
                    minLength: 1
                  localDateTime:
                    description: Date Time in local region<br>Date et heure de la transaction (AAAA-MM-JJTHH:MM:SS) en UTC
                    type:
                      - string
                      - 'null'
                    format: date-time
                    example: '2025-07-26T15:04:34'
              clearingDate:
                description: Expected Date of Clearing<br>Date de compensation (AAAA-MM-JJ) en UTC
                type:
                  - string
                  - 'null'
                format: date-time
                example: '2025-07-27'
              grossAmount:
                description: (Brut) amount of the transaction<br>Montant brut signé et devise
                type:
                  - object
                  - 'null'
                example:
                  amount: '-39.90'
                  currency: '978'
                properties:
                  amount:
                    type: string
                    pattern: ^\-?[0-9]{1,18}(\.?[0-9]{0,5})?$
                  currency:
                    type: string
                    pattern: ^[0-9]{3}$
                required:
                  - amount
                  - currency
              feesAmount:
                description: Fees Amount<br>Montant des frais signé et devise
                type:
                  - object
                  - 'null'
                example:
                  feesAmount: '0.00'
                  currency: '978'
                properties:
                  feesAmount:
                    type: string
                    pattern: ^\-?[0-9]{1,5}(\.?[0-9]{0,10})?$
                  currency:
                    type: string
                    pattern: ^[0-9]{3}$
                required:
                  - feesAmount
                  - currency
              merchantName:
                description: Merchant Name used by all acquisition services.<br>Raison sociale du commerçant
                type:
                  - string
                  - 'null'
                example: Pizza WEB
                maxLength: 70
                minLength: 1
              refundIndicator:
                description: Refund indicator<br>indique si la transaction est remboursée (true/false)
                type:
                  - boolean
                  - 'null'
                example: false
              nonrefundReasonCode:
                description: >-
                  Code reason of the nonrefund of the dispute<br>Code motif Banque de France de raison du refus de
                  remboursement
                type:
                  - string
                  - 'null'
                example: HAB
                pattern: ^[0-9A-Za-z]{3}$
              nonrefundReasonLabel:
                description: Resaon of the nonrefund of the dispute<br>indique la raison du refus de remboursement
                type:
                  - string
                  - 'null'
                example: Escroquerie commerçant - HAB
                maxLength: 255
                minLength: 1
              nonrefundReasonTechnicalInternalId:
                description: >-
                  Technical internal reference of the nonrefund of the dispute<br>Identifiant technique interne du motif
                  de refus de remboursement
                type:
                  - string
                  - 'null'
                example: '5001'
                pattern: ^[0-9]{1,19}$
              recoveryMode:
                description: Recovey mode of the dispute<br>Mode de recouvrement
                type:
                  - string
                  - 'null'
                example: ACQU
                enum:
                  - ACQU
                  - AUTA
                  - CLDE
                  - INSU
                  - ISSU
                  - NORE
                x-enumDescriptions:
                  ACQU: Acquirer
                  AUTA: Automatic acquirer
                  CLDE: Client debit
                  INSU: Insurance
                  ISSU: Issuer
                  NORE: Non recovered
              context:
                description: objet contenant le contexte de la transaction
                type:
                  - object
                  - 'null'
                additionalProperties: false
                properties:
                  operationNature:
                    description: Disputed operation type label<br>Type de transaction
                    type:
                      - string
                      - 'null'
                    example: TRIN
                    enum:
                      - ANTR
                      - TRIN
                    x-enumDescriptions:
                      ANTR: Transaction cancellation
                      TRIN: 'Initial transaction : captured'
                  transactionNature:
                    description: Nature of transaction<br>Nature de la transaction
                    type:
                      - string
                      - 'null'
                    example: PUGS
                    enum:
                      - AICE
                      - ATMW
                      - AVFI
                      - CACP
                      - CARE
                      - CRED
                      - FIMA
                      - FTCR
                      - FTDE
                      - FTWC
                      - MACA
                      - PCSB
                      - PUGS
                      - QCAR
                      - QUCA
                      - VMAA
                      - WCDI
                    x-enumDescriptions:
                      AICE: 'Authorisation to issue a certificate - cf CB2A 1.6 Value : 15'
                      ATMW: 'ATM withdrawal  -  cf CBAE 1.5 Value : 01'
                      AVFI: 'Available funds inquiry  - cf CBAE 1.5 Value : 30'
                      CACP: 'Card capture - cf CBAE 1.5 Value : 14'
                      CARE: 'Card return - cf CBAE 1.5 Value : 37'
                      CRED: 'Credit - CBAE 1.5 Value : 20'
                      FIMA: File Management
                      FTCR: 'Funds transfer, credit - cf CBAE 1.5 Value : 42'
                      FTDE: 'Funds transfer, debit  - cf CBAE 1.5 Value : 41'
                      FTWC: >-
                        Financial transaction without cash dispensing (e.g. bank transfer request ) - cf CB2A 1.6 Value
                        : 10
                      MACA: 'Manual cash - CBAE 1.5 Value : 17'
                      PCSB: Purchase with cashback
                      PUGS: 'Purchase of goods or  services : Cf CBAE 1.5 Value : 00'
                      QCAR: 'Quasi-cash refund - cf CBAE 1.5 Value : 28'
                      QUCA: 'Quasi-cash - cf CBAE 1.5 Value : 11'
                      VMAA: 'VMAAS eligibility inquiry - cf CB2A 1.6 Value : 39'
                      WCDI: 'Balance Inquiry - copy - cf CB2A 1.6 Value : 36'
                  schemeNature:
                    description: Scheme nature<br>Réseau de compensation de la transaction
                    type:
                      - string
                      - 'null'
                    example: VISA
                    enum:
                      - CBFR
                      - INTR
                      - MACD
                      - VISA
                    x-enumDescriptions:
                      CBFR: CB
                      INTR: INTRA
                      MACD: MasterCard
                      VISA: VISA
                  eeaIndicator:
                    description: EEA (espace economic area) indicator<br>Indicateur EEE
                    type:
                      - boolean
                      - 'null'
                    example: true
                  acceptanceModeLabel:
                    description: Acceptance mode label<br>Mode d'acceptation de la transaction (re-calculé par le processeur)
                    type:
                      - string
                      - 'null'
                    example: Internet sécurisé (50)
                    maxLength: 255
                    minLength: 1
                  manualIndicator:
                    description: >-
                      Manual indicator<br>indique que la transaction a été ajoutée via une saisie manuelle (et non pas
                      par une recherche - cas d'une transaction non disponible dans l'historique)<br>false: Transaction 
                      non saisie manuellement<br>true: Transaction saisie manuellement
                    type:
                      - boolean
                      - 'null'
                    example: false
                  scoringEligibilityIndicator:
                    description: >-
                      Indicator used to determine whether the transaction must be submitted to a prescore
                      calculation<br>Indicateur permettant de déterminer si la transaction doit être soumise à un calcul
                      de prescore
                    type: boolean
                    example: true
                  disputePrescore:
                    description: objet contenant les information préscore de la transaction
                    type:
                      - object
                      - 'null'
                    additionalProperties: false
                    properties:
                      scoringStatus:
                        anyOf:
                          - $ref: '#/components/schemas/ScoringStatus'
                          - type: 'null'
                      scoreLabelling:
                        anyOf:
                          - $ref: '#/components/schemas/ScoreLabelling'
                          - type: 'null'
                      labellingDateTime:
                        description: Labelling date time<br>Date de labélisation (AAAA-MM-JJTHH:MM:SS) en UTC
                        type:
                          - string
                          - 'null'
                        format: date-time
                        example: '2025-07-28T15:04:34'
                required:
                  - scoringEligibilityIndicator
            additionalProperties: false
          maxItems: 100
          minItems: 1
        eventList:
          type:
            - array
            - 'null'
          items:
            type: object
            description: Liste des evenemenents litiges associées au dossier
            properties:
              transactionReference:
                description: Transaction Reference<br>Identifiant unique de transaction attribué par le Processeur (COIDOP)
                type:
                  - string
                  - 'null'
                example: R3079017501428448
                maxLength: 35
                minLength: 1
              localDateTime:
                description: Date of the event<br>date de l'évenement (AAAA-MM-JJTHH:MM:SS) en UTC
                type:
                  - string
                  - 'null'
                format: date-time
                example: '2025-07-30T15:04:34'
              statusCode:
                description: Stautus code of the event<br>Code statut de l'évenement
                type:
                  - string
                  - 'null'
                example: TERM
