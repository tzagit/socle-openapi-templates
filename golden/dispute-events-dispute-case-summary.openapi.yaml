                  Authentication method usage consistency score.<br>Score déterminant la cohérence de l'utilisateur dans
                  l'utilisation de la méthode d'authentification <br>BIOB : le client a utilisé la biométrie pour
                  authentifier le paiement contesté, comme pour tous les autres paiements précédents.<br>BIOC : le
                  client a utilisé la biométrie pour authentifier le paiement contesté, tandis que certains paiements
                  précédents ont été validés par code.<br>CODE : Le client a utilisé le code pour authentifier le
                  paiement contesté (l'opération précédente avec le code n'a pas été contestée).<br>CODB : Le client a
                  utilisé le code pour authentifier le paiement contesté et a validé le paiement précédant celui qu'il
                  conteste à l'aide de la biométrie.<br>CODC : Le client a utilisé le code pour authentifier le paiement
                  contesté et a validé le paiement précédant celui qu'il conteste à l'aide du même code.
