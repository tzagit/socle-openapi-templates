                    The customer used biometrics to authenticate the disputed payment, just like all the other previous
                    payments.
                  BIOC: >-
                    The customer used biometrics to authenticate the disputed payment, while some previous payments were
                    validated by code.
                  CODB: >-
                    The customer used the code to authenticate the disputed payment and validated the payment preceding
                    the one they are disputing with biometrics.
                  CODC: >-
                    The customer used the code to authenticate the disputed payment and validated the payment preceding
                    the one they are disputing with the PIN, which has been disputed.
                  CODE: >-
                    The customer used the code to authenticate the disputed payment (previous operation with code was
                    not disputed).
