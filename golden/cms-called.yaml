  /v1/card-agreement-owners/{id}:
    get:
      operationId: getCardAgreementOwnerById
      summary: Retrieve information of a card agreement owner
      description: >-
        For an individual owner, the following data are required ownerCivility,
        ownerFirstName and ownerLastName<br>For a business owner, the
        ownerCompanyName is required
      parameters:
        - name: id
          in: path
          description: >-
            Technical identifier of the owner of the card agreement in the
            banking system.<br>This identifier can be provided during the
            subscription by the bank if the owner of the card agreement is
            different from the cardholder.<br>Afterwards, it is used by the CMS
            to retrieve the owner data from the bank.
          required: true
          schema:
            description: >-
              Card agreement owner id<br>Technical identifier of the owner of
              the card agreement in the banking system.<br>This identifier can
              be provided during the subscription by the bank if the owner of
              the card agreement is different from the
              cardholder.<br>Afterwards, it is used by the CMS to retrieve the
              owner data from the bank.
            type: string
            pattern: ^[0-9a-zA-Z\-]{1,36}$
        - name: X-Request-Id
          in: header
          description: >-
            If provided in the request header, it should be the same in the
            response header as the one provided in the request.<br>If not
            provided in the request header, a value is calculated and provided
            in the response header.
          required: false
          schema:
            description: >-
              If provided in the request header, it should be the same in the
              response header as the one provided in the request.<br>If not
              provided in the request header, a value is calculated and provided
              in the response header.
            type: string
            format: uuid
        - name: X-Correlation-Id
