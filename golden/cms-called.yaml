            type: string
            format: uuid
        - name: X-User-Id
          in: header
          description: Unique ID attached to the source user of the action
          required: false
          schema:
            description: Unique ID attached to the source user of the action
            type: string
            maxLength: 128
            minLength: 1
        - name: X-UserContext-Id
          in: header
          description: Unique ID allowing to identify the user group
          required: false
          schema:
            description: Unique ID allowing to identify the user group
            type: string
            maxLength: 128
            minLength: 4
        - name: X-Institution-Id
          in: header
          description: Identifier of the bank in the CMS and IAS
          required: true
          schema:
            description: Identifier of the bank in the CMS and IAS
            type: string
            maxLength: 20
            minLength: 3
      responses:
        '200':
          description: Owner OK
          headers:
            X-Request-Id:
              required: false
              description: >-
                If provided in the request header, it should be the same in the
                response header as the one provided in the request.<br>If not
