          in: path
          description: >-
            Identifier of the physical or logical entity linked to the card
            contract/agreement (entity that signed the contract with the
            cardholder; for example, a branch).<br>This identifier is provided
            to the CMS during the subscription by the bank.<br>Afterwards, it is
            used by the CMS to retrieve the entity data from the bank. (the API
            to retrieve these data are not supported in this version and the
            retrieval of these data is simulated by the CMS) and by the IAS in
            messages sent to the bank
          required: true
          schema:
            description: >-
              Card agreement entity Id<br>Identifier of the physical or logical
              entity linked to the card contract/agreement (entity that signed
              the contract with the cardholder; for example, a branch).<br>This
              identifier is provided to the CMS during the subscription by the
              bank.<br>Afterwards, it is used by the CMS to retrieve the entity
              data from the bank. (the API to retrieve these data are not
              supported in this version and the retrieval of these data is
              simulated by the CMS) and by the IAS in messages sent to the bank
            type: string
            maxLength: 36
            minLength: 1
        - name: X-Request-Id
          in: header
          description: >-
            If provided in the request header, it should be the same in the
            response header as the one provided in the request.<br>If not
            provided in the request header, a value is calculated and provided
            in the response header.
          required: false
          schema:
            description: >-
              If provided in the request header, it should be the same in the
              response header as the one provided in the request.<br>If not
              provided in the request header, a value is calculated and provided
              in the response header.
            type: string
