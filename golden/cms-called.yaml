openapi: 3.1.1
info:
  description: >-
    The purpose of this API is for the Card Management System to call the bank
    to retrieve cardholder data and card agreement owner data
  contact:
    name: ESTREEM API support team
    url: https://estreem.eu
    email: support@estreem.eu
  x-dictionary-version: _DICO_ESTREEM_v21.8.xlsx
  title: APIs called by the Card Management System
  version: 1.4.0
servers:
  - url: ''
    description: To be defined by the bank
paths:
