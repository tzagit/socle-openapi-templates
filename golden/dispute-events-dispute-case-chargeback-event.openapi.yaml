openapi: 3.1.1
info:
  title: Notifications Connector API - OpenAPI 3.0
  version: 1.7.0
  description: Example of Notifications connector exposed by the Bank to receive events full or notifications sent by Estreem
  contact:
    name: Estreem
    url: https://estreem.eu
    email: support@estreem.eu
  x-dictionary-version: _DICO_ESTREEM_v21.15.xlsx
  x-socle-version: 0.1.0
  x-socle-type: events
components:
  schemas:
    StandardError:
      type: object
      description: Standard error response used across all APIs
      properties:
        code:
          type: string
          minLength: 1
          maxLength: 20
          description: Functional or technical error code
        text:
          type: string
          minLength: 1
          maxLength: 40
          description: User-friendly error message
        developerText:
          type: string
          minLength: 1
          maxLength: 70
          description: Detailed technical message for debugging
        moreInfo:
          type: string
          minLength: 1
          maxLength: 256
          description: Additional information or documentation link
    CBDisputeEvent:
      description: Objet racine - Evenement suite à l'intégration d'un evenement litige
      type: object
      properties:
        disputeCase:
          description: objet contenant les données sur le dossier de contestation
          type:
            - object
            - 'null'
          additionalProperties: false
          properties:
            id:
              description: Dispute Case reference<br>Identifiant du dossier de Contestation attribué par le Processeur
              type: string
              example: S102072507285324
              pattern: ^[0-9A-Za-z]{16}$
          required:
            - id
        card:
          description: objet contenant les données carte
          type:
            - object
            - 'null'
          additionalProperties: false
          properties:
            encryptedPrimaryAccountNumber:
              description: >-
                encrypted pan<br>Numéro de carte (PAN) chiffré.<br>Le chiffrement respecte le standard JWE. Une fois
                déchiffrée la donnée représente un PAN, sous forme d'une chaine de 16 à 19 caractères numériques.
              type:
                - string
                - 'null'
              example: >-
                eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiYWRtaW4iOnRydWV9.dyt0CoTl4WoVjAHI9Q.wSKhl6d_9rhM3NrXuJttkao.k_CwSKhwcCI6IktZSI6
              pattern: ^[A-Za-z0-9_-]+\.[A-Za-z0-9_-]+\.[A-Za-z0-9_-]*\.[A-Za-z0-9_-]*\.[A-Za-z0-9_-]+$
            primaryAccountNumberId:
              description: Primary Account Number ID<br>Identifiant de substitution du PAN (PAN Id)
              type: string
              format: uuid
              example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
            maskedPrimaryAccountNumber:
              description: Masked Primary Account Number<br>Numéro de carte (PAN) caviardé
              type: string
              example: 1234 45XX XXXX 1234
              maxLength: 30
              minLength: 1
            productCode:
              description: Product Code<br>Code produit carte défini au niveau du CMS
              type: string
              example: 2I
              maxLength: 50
              minLength: 1
          required:
            - primaryAccountNumberId
            - maskedPrimaryAccountNumber
            - productCode
        transaction:
          description: objet contenant plusieurs données liées à la transaction
          type:
            - object
            - 'null'
          additionalProperties: false
          properties:
            identification:
              description: objet contenant les informations pour l'identification de la transaction
              type:
                - object
                - 'null'
              additionalProperties: false
              properties:
                reference:
                  description: >-
                    Transaction Reference<br>Identifiant unique de transaction attribué par le Processeur (COIDOP) et
                    fourni dans les événements alimentant les historiques.
                  type:
                    - string
                    - 'null'
                  example: R20250719FOND1029
                  maxLength: 35
                  minLength: 1
            context:
              description: objet contenant le contexte de la transaction
              type:
                - object
                - 'null'
              additionalProperties: false
              properties:
                schemeNature:
                  $ref: '#/components/schemas/SchemeNature2'
              required:
                - schemeNature
        eventProcessing:
          description: objet contenant plusieurs données liées à l'évenement
          type:
            - object
            - 'null'
          additionalProperties: false
          properties:
            nature:
              description: Event processing nature, text explaination of the step in  processing data.<br>type d'evenement litige
              type: string
              example: Réception représentation
              maxLength: 50
              minLength: 1
            statusCode:
              description: Stautus code of the event<br>Status code of the event
              type: string
              example: TBPR
              enum:
                - TBPR
                - TERM
                - WAIT
              x-enumDescriptions:
                TBPR: To be processed
                TERM: Terminated
                WAIT: Waiting
            localDateTime:
              description: Date of the event<br>date de l'évenement (AAAA-MM-JJTHH:MM:SS) en UTC
              type: string
              format: date-time
              example: '2025-08-30T16:56:23'
            amount:
              description: Amount of the event<br>Montant et devise de la transaction
              type: object
              example:
                amount: '50.50'
                currency: '978'
              properties:
                amount:
                  type: string
                  pattern: ^\-?[0-9]{1,18}(\.?[0-9]{0,5})?$
                currency:
                  type: string
                  pattern: ^[0-9]{3}$
              required:
                - amount
                - currency
            manualIndicator:
              description: Manual indicator<br>indique si l'evenement est manuel (true/false)
              type: boolean
              example: false
          required:
            - nature
            - statusCode
            - localDateTime
            - amount
            - manualIndicator
        chargeback:
          description: objet contenant plusieurs données liées à l'impayé
          type:
            - object
            - 'null'
          additionalProperties: false
          properties:
            id:
              description: 'Chargeback id<br>pour CB : REF_IMPAYE de LED<br>pour VISA VCR_CASE_NUM<br>pour MC : Claim Id'
              type:
                - string
                - 'null'
              example: '1638125042'
              maxLength: 19
              minLength: 1
            reasonCode:
              description: Reason code of the chargeback<br>Code du motif impayé
              type:
                - string
                - 'null'
              example: '10.2'
              maxLength: 6
              minLength: 1
            reasonLabel:
              description: Label of the reason of the chargeback<br>Libellé du motif impayé
              type:
                - string
                - 'null'
              example: Transfert de responsabilité EMV- Carte Perdue/Volée
              maxLength: 255
              minLength: 1
            acquirerInstitutionId:
              description: Bank Institution Identifier<br>Code banque acquéreur
              type:
                - string
                - 'null'
              example: '30056'
              maxLength: 5
              minLength: 1
            bankTransferDate:
              description: Date of the acquiring bank's transfer<br>Date du virement (AAAA-MM-JJTHH:MM:SS) en UTC
              type:
                - string
                - 'null'
              format: date-time
              example: '2025-08-30T16:56:23'
            representmentReasonCode:
              description: Reason code of the representment<br>Code du motif de répresentation
              type:
                - string
                - 'null'
              example: '4807'
              pattern: ^[0-9A-Za-z]{1,6}$
        processing:
          description: objet contenant plusieurs données liées au traitement de l'évenement
          type:
            - object
            - 'null'
          additionalProperties: false
          properties:
            unboundEventIndicator:
              description: Unbound event indicator<br>Indicateur de non rapprochement (true/false)
              type: boolean
              example: true
            unboundEventReason:
              description: Unbound event reason<br>Raison du non rapprochement
              type:
                - string
                - 'null'
              example: Opération inexistante dans les dossiers
              maxLength: 255
              minLength: 1
            incompatibilityEventIndicator:
              description: Incompatibility event indicator<br>Indicateur d'incompatibilité (true/false)
              type: boolean
              example: true
            incompatibilityEventReason:
              description: Incompatibility event resaon<br>Raison d'incompatibilité (dossier clos, …)
              type:
                - string
                - 'null'
              example: dossier clos
              maxLength: 255
              minLength: 1
          required:
            - unboundEventIndicator
            - incompatibilityEventIndicator
      additionalProperties: false
      title: CBDisputeEvent
    SchemeNature2:
      description: Scheme nature<br>caractérise le réseau de la transaction
      type: string
      example: VISA
      enum:
        - CBFR
        - INTR
        - MACD
        - VISA
      x-enumDescriptions:
        CBFR: CB
        INTR: INTRA
        MACD: MasterCard
        VISA: VISA
  parameters:
    XRequestId:
      name: X-Request-Id
      in: header
      required: false
      description: >-
        A universally unique identifier (UUID) assigned to this individual request, used for tracing and debugging
        across distributed services.
      schema:
        type: string
        format: uuid
      example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
    XCorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      description: >-
        A universally unique identifier (UUID) that groups multiple related requests belonging to the same logical
        operation or business transaction, enabling cross-service correlation.
      schema:
        type: string
        format: uuid
      example: 7d5c2b9e-2f3a-4c1d-8e6f-9a0b1c2d3e4f
    XInstitutionId:
      name: X-Institution-Id
      in: header
      required: true
      description: A unique identifier representing the banking institution context (bank code) associated with the request.
      schema:
        type: string
        minLength: 3
        maxLength: 20
      example: '30004'
    XUserId:
      name: X-User-Id
      in: header
      required: false
      description: A unique identifier representing the authenticated user who initiated the action.
      schema:
        type: string
        maxLength: 128
      example: user-42
    XUserContextId:
      name: X-UserContext-Id
      in: header
      required: false
      description: >-
        A unique identifier representing the user group or organizational context under which the request is being
        performed.
      schema:
        type: string
        maxLength: 4
      example: u42
    XProcessingRouteId:
      name: X-Processing-Route-Id
      in: header
      required: false
      description: An identifier indicating the processing route selected by the infrastructure for this message.
      schema:
        type: string
        maxLength: 36
      example: prod.eu-west-1.silo-1
    XEventId:
      name: X-Event-Id
      in: header
      required: true
      description: Unique identifier of the event. Used to identify technical duplicates.
      schema:
        type: string
        format: uuid
      example: 1c9d4e2f-8a7b-4c3d-9e1f-2a3b4c5d6e7f
    XEventVersion:
      name: X-Event-Version
      in: header
      required: true
      description: >-
        Specifies the version of the JSON schema used to structure the event payload, allowing consumers to handle
        schema evolution gracefully.
      schema:
        type: string
      example: '1.0'
    XOriginalRequestId:
      name: X-Original-Request-Id
      in: header
      required: false
      description: Value of the X-Request-Id header of the original request initiated by the bank.
      schema:
        type: string
        format: uuid
      example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
    XOriginalCorrelationId:
      name: X-Original-Correlation-Id
      in: header
      required: false
      description: Value of the X-Correlation-Id header of the original request initiated by the bank.
      schema:
        type: string
        format: uuid
      example: 7d5c2b9e-2f3a-4c1d-8e6f-9a0b1c2d3e4f
    OriginalIdempotencyKey:
      name: Original-Idempotency-Key
      in: header
      required: false
      description: Value of the Idempotency-Key header of the original request initiated by the bank.
      schema:
        type: string
        format: uuid
      example: 9b2e4a17-6c3d-4f2a-b1e8-0d7c5a3f2b91
  headers:
    EchoRequestId:
      description: Echoes the corresponding request header if provided in the request.
      required: false
      schema:
        type: string
        format: uuid
      example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
    EchoCorrelationId:
      description: Echoes the corresponding request header if provided in the request.
      required: false
      schema:
        type: string
        format: uuid
      example: 7d5c2b9e-2f3a-4c1d-8e6f-9a0b1c2d3e4f
    EchoInstitutionId:
      description: Echoes the corresponding request header if provided in the request.
      required: false
      schema:
        type: string
        minLength: 3
        maxLength: 20
      example: '30004'
    EchoUserId:
      description: Echoes the corresponding request header if provided in the request.
      required: false
      schema:
        type: string
        maxLength: 128
      example: user-42
    EchoUserContextId:
      description: Echoes the corresponding request header if provided in the request.
      required: false
      schema:
        type: string
        maxLength: 4
      example: u42
    ProcessingRouteId:
      description: An identifier indicating the processing route selected by the infrastructure for this message.
      required: false
      schema:
        type: string
        maxLength: 36
      example: prod.eu-west-1.silo-1
  responses:
    Error400:
      description: >-
        Bad request (400). The request contains invalid parameters, malformed syntax, or missing required fields. Check
        the error details in the response body for specific validation issues.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/EchoRequestId'
        X-Correlation-Id:
          $ref: '#/components/headers/EchoCorrelationId'
        X-Institution-Id:
          $ref: '#/components/headers/EchoInstitutionId'
        X-User-Id:
          $ref: '#/components/headers/EchoUserId'
        X-UserContext-Id:
          $ref: '#/components/headers/EchoUserContextId'
        X-Processing-Route-Id:
          $ref: '#/components/headers/ProcessingRouteId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
    Error401:
      description: >-
        Unauthorized (401). Authentication is required but was not provided or the provided credentials are invalid.
        Ensure you have included a valid Bearer token in the Authorization header.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/EchoRequestId'
        X-Correlation-Id:
          $ref: '#/components/headers/EchoCorrelationId'
        X-Institution-Id:
          $ref: '#/components/headers/EchoInstitutionId'
        X-User-Id:
          $ref: '#/components/headers/EchoUserId'
        X-UserContext-Id:
          $ref: '#/components/headers/EchoUserContextId'
        X-Processing-Route-Id:
          $ref: '#/components/headers/ProcessingRouteId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
    Error403:
      description: >-
        Forbidden (403). The request is authenticated but lacks the necessary permissions to access the requested
        resource. Contact your administrator to request access.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/EchoRequestId'
        X-Correlation-Id:
          $ref: '#/components/headers/EchoCorrelationId'
        X-Institution-Id:
          $ref: '#/components/headers/EchoInstitutionId'
        X-User-Id:
          $ref: '#/components/headers/EchoUserId'
        X-UserContext-Id:
          $ref: '#/components/headers/EchoUserContextId'
        X-Processing-Route-Id:
          $ref: '#/components/headers/ProcessingRouteId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
    Error405:
      description: >-
        Method Not Allowed (405). The HTTP method used is not supported for the requested resource. Check the API
        documentation for allowed methods on this endpoint.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/EchoRequestId'
        X-Correlation-Id:
          $ref: '#/components/headers/EchoCorrelationId'
        X-Institution-Id:
          $ref: '#/components/headers/EchoInstitutionId'
        X-User-Id:
          $ref: '#/components/headers/EchoUserId'
        X-UserContext-Id:
          $ref: '#/components/headers/EchoUserContextId'
        X-Processing-Route-Id:
          $ref: '#/components/headers/ProcessingRouteId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
    Error406:
      description: >-
        Not Acceptable (406). The requested resource is capable of generating only content not acceptable according to
        the Accept headers sent in the request. Adjust the Accept header to a supported media type.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/EchoRequestId'
        X-Correlation-Id:
          $ref: '#/components/headers/EchoCorrelationId'
        X-Institution-Id:
          $ref: '#/components/headers/EchoInstitutionId'
        X-User-Id:
          $ref: '#/components/headers/EchoUserId'
        X-UserContext-Id:
          $ref: '#/components/headers/EchoUserContextId'
        X-Processing-Route-Id:
          $ref: '#/components/headers/ProcessingRouteId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
    Error409:
      description: >-
        Conflict (409). The request conflicts with the current state of the resource (e.g., duplicate entry, resource
        already exists, or version mismatch). Review the error details for more information.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/EchoRequestId'
        X-Correlation-Id:
          $ref: '#/components/headers/EchoCorrelationId'
        X-Institution-Id:
          $ref: '#/components/headers/EchoInstitutionId'
        X-User-Id:
          $ref: '#/components/headers/EchoUserId'
        X-UserContext-Id:
          $ref: '#/components/headers/EchoUserContextId'
        X-Processing-Route-Id:
          $ref: '#/components/headers/ProcessingRouteId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
    Error422:
      description: >-
        Unprocessable Entity (422). The request is well-formed but contains semantic errors that prevent processing
        (e.g., invalid values, unsupported operations). Check the error details for specific issues.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/EchoRequestId'
        X-Correlation-Id:
          $ref: '#/components/headers/EchoCorrelationId'
        X-Institution-Id:
          $ref: '#/components/headers/EchoInstitutionId'
        X-User-Id:
          $ref: '#/components/headers/EchoUserId'
        X-UserContext-Id:
          $ref: '#/components/headers/EchoUserContextId'
        X-Processing-Route-Id:
          $ref: '#/components/headers/ProcessingRouteId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
    Error429:
      description: >-
        Too Many Requests (429). Rate limit has been exceeded. Wait before making additional requests. Check response
        headers for rate limit information.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/EchoRequestId'
        X-Correlation-Id:
          $ref: '#/components/headers/EchoCorrelationId'
        X-Institution-Id:
          $ref: '#/components/headers/EchoInstitutionId'
        X-User-Id:
          $ref: '#/components/headers/EchoUserId'
        X-UserContext-Id:
          $ref: '#/components/headers/EchoUserContextId'
        X-Processing-Route-Id:
          $ref: '#/components/headers/ProcessingRouteId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
    Error500:
      description: >-
        Internal Server Error (500). An unexpected error occurred on the server. Please retry the request. If the
        problem persists, contact support with the X-Request-Id from the response.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/EchoRequestId'
        X-Correlation-Id:
          $ref: '#/components/headers/EchoCorrelationId'
        X-Institution-Id:
          $ref: '#/components/headers/EchoInstitutionId'
        X-User-Id:
          $ref: '#/components/headers/EchoUserId'
        X-UserContext-Id:
          $ref: '#/components/headers/EchoUserContextId'
        X-Processing-Route-Id:
          $ref: '#/components/headers/ProcessingRouteId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
    Error502:
      description: >-
        Bad Gateway (502). An error occurred while the gateway received an invalid response from an upstream server.
        Please retry the request. If the problem persists, contact support.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/EchoRequestId'
        X-Correlation-Id:
          $ref: '#/components/headers/EchoCorrelationId'
        X-Institution-Id:
          $ref: '#/components/headers/EchoInstitutionId'
        X-User-Id:
          $ref: '#/components/headers/EchoUserId'
        X-UserContext-Id:
          $ref: '#/components/headers/EchoUserContextId'
        X-Processing-Route-Id:
          $ref: '#/components/headers/ProcessingRouteId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
    Error503:
      description: >-
        Service Unavailable (503). The service is temporarily unavailable, likely due to maintenance or high load.
        Please retry after a few moments.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/EchoRequestId'
        X-Correlation-Id:
          $ref: '#/components/headers/EchoCorrelationId'
        X-Institution-Id:
          $ref: '#/components/headers/EchoInstitutionId'
        X-User-Id:
          $ref: '#/components/headers/EchoUserId'
        X-UserContext-Id:
          $ref: '#/components/headers/EchoUserContextId'
        X-Processing-Route-Id:
          $ref: '#/components/headers/ProcessingRouteId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
    Error504:
      description: >-
        Gateway Timeout (504). The gateway did not receive a timely response from an upstream server. The request may or
        may not have been processed. Please retry with idempotency key to ensure safe retry.
      headers:
        X-Request-Id:
          $ref: '#/components/headers/EchoRequestId'
        X-Correlation-Id:
          $ref: '#/components/headers/EchoCorrelationId'
        X-Institution-Id:
          $ref: '#/components/headers/EchoInstitutionId'
        X-User-Id:
          $ref: '#/components/headers/EchoUserId'
        X-UserContext-Id:
          $ref: '#/components/headers/EchoUserContextId'
        X-Processing-Route-Id:
          $ref: '#/components/headers/ProcessingRouteId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardError'
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
  - bearerAuth: []
webhooks:
  dispute-case-chargeback-event:
    post:
      operationId: disputeCaseChargebackEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CBDisputeEvent'
      responses:
        '204':
          description: Event acquitté par le partenaire (No Content).
          headers:
            X-Request-Id:
              $ref: '#/components/headers/EchoRequestId'
            X-Correlation-Id:
              $ref: '#/components/headers/EchoCorrelationId'
            X-Institution-Id:
              $ref: '#/components/headers/EchoInstitutionId'
            X-User-Id:
              $ref: '#/components/headers/EchoUserId'
            X-UserContext-Id:
              $ref: '#/components/headers/EchoUserContextId'
            X-Processing-Route-Id:
              $ref: '#/components/headers/ProcessingRouteId'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '405':
          $ref: '#/components/responses/Error405'
        '406':
          $ref: '#/components/responses/Error406'
        '409':
          $ref: '#/components/responses/Error409'
        '422':
          $ref: '#/components/responses/Error422'
        '429':
          $ref: '#/components/responses/Error429'
        '500':
          $ref: '#/components/responses/Error500'
        '502':
          $ref: '#/components/responses/Error502'
        '503':
          $ref: '#/components/responses/Error503'
        '504':
          $ref: '#/components/responses/Error504'
      summary: >-
        This endpoint sends a notification following the integration of a dispute event (examples: unpaid issuance,
        dispute cancellation, domestic recovery closure with accounting, etc.) (CNT-EM36)
        (dispute-case-chargeback-event)
      tags:
        - Dispute Case
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/XInstitutionId'
