# Règles Spectral de conformité au socle, appliquées aux contrats BUNDLÉS (build/*.openapi.yaml).
# Complète Redocly (validité OpenAPI) par les conventions maison. Sévérité error = bloquant.
extends: ["spectral:oas"]

rules:

  # --- Servers : requis seulement s'il y a des paths (un contrat webhook/events n'en a pas) ---
  oas3-api-servers: "off"
  socle-servers-when-paths:
    description: Un contrat exposant des paths doit déclarer au moins un server.
    severity: warn
    given: "$"
    then:
      function: schema
      functionOptions:
        schema:
          if:
            required: [paths]
            properties: { paths: { type: object, minProperties: 1 } }
          then:
            required: [servers]
            properties: { servers: { type: array, minItems: 1 } }

  # --- Sécurité ---
  socle-no-api-key:
    description: Authentification par API key interdite (politique interne).
    message: "securityScheme '{{property}}' de type apiKey interdit — bearer JWT attendu."
    severity: error
    given: "$.components.securitySchemes[*]"
    then:
      field: type
      function: pattern
      functionOptions:
        notMatch: "^apiKey$"
  socle-security-required:
    description: Le contrat doit déclarer une sécurité globale.
    severity: error
    given: "$"
    then:
      field: security
      function: truthy
  socle-operation-secured:
    description: Sécurité désactivée sur cette opération (security: []) — autorisé mais à confirmer.
    message: "Sécurité désactivée (security: []) sur cette opération — vérifiez que c'est intentionnel."
    severity: warn
    given:
      - "$.paths[*][get,put,post,delete,patch].security"
      - "$.webhooks[*][get,put,post,delete,patch].security"
    then:
      function: length
      functionOptions:
        min: 1

  # --- Traçabilité du socle ---
  socle-version-stamp:
    description: Le contrat doit porter info.x-socle-version (version du socle générateur).
    severity: error
    given: "$.info"
    then:
      field: x-socle-version
      function: truthy

  # --- Opérations ---
  socle-operation-id:
    description: Chaque opération doit avoir un operationId.
    severity: error
    given:
      - "$.paths[*][get,put,post,delete,patch,options,head,trace]"
      - "$.webhooks[*][get,put,post,delete,patch,options,head,trace]"
    then:
      field: operationId
      function: truthy
  socle-operation-tagged:
    description: Chaque opération de path doit être taggée.
    severity: error
    given: "$.paths[*][get,put,post,delete,patch]"
    then:
      field: tags
      function: truthy

  # --- Schémas ---
  socle-array-items:
    description: Un schéma de type array (même nullable) doit définir le type de ses items.
    severity: error
    given: "$..[?(@.type)]"
    then:
      function: schema
      functionOptions:
        schema:
          if:
            anyOf:
              - properties: { type: { const: array } }
              - properties: { type: { type: array, contains: { const: array } } }
          then:
            required: [items]

  # --- Format d'erreur commun ---
  socle-standard-error:
    description: Le schéma commun d'erreur StandardError doit être présent.
    severity: error
    given: "$.components.schemas"
    then:
      field: StandardError
      function: truthy

  # --- Headers communs de requête (présents sur chaque opération ; X-Institution-Id requis) ---
  socle-common-request-headers:
    description: Les headers communs de requête doivent être présents (X-Institution-Id obligatoire).
    severity: error
    given:
      - "$.paths[*][get,put,post,delete,patch]"
      - "$.webhooks[*][get,put,post,delete,patch]"
    then:
      field: parameters
      function: schema
      functionOptions:
        schema:
          type: array
          allOf:
            - contains: { type: object, required: [name, in, required], properties: { name: { const: X-Institution-Id }, in: { const: header }, required: { const: true } } }
            - contains: { type: object, properties: { name: { const: X-Request-Id } }, required: [name] }
            - contains: { type: object, properties: { name: { const: X-Correlation-Id } }, required: [name] }
            - contains: { type: object, properties: { name: { const: X-User-Id } }, required: [name] }
            - contains: { type: object, properties: { name: { const: X-UserContext-Id } }, required: [name] }

  # --- Idempotency-Key : obligatoire sur POST/PATCH ---
  socle-idempotency-required:
    description: POST/PATCH doivent exiger Idempotency-Key (required=true).
    severity: error
    given:
      - "$.paths[*].post"
      - "$.paths[*].patch"
    then:
      field: parameters
      function: schema
      functionOptions:
        schema:
          type: array
          contains:
            type: object
            required: [name, in, required]
            properties:
              name: { const: Idempotency-Key }
              in: { const: header }
              required: { const: true }

  # --- Idempotency-Key : optionnel sur PUT/DELETE ---
  socle-idempotency-optional:
    description: PUT/DELETE doivent proposer Idempotency-Key (required=false).
    severity: error
    given:
      - "$.paths[*].put"
      - "$.paths[*].delete"
    then:
      field: parameters
      function: schema
      functionOptions:
        schema:
          type: array
          contains:
            type: object
            required: [name, in, required]
            properties:
              name: { const: Idempotency-Key }
              in: { const: header }
              required: { const: false }

  # --- Identifiants : format uuid ---
  socle-uuid-only-on-string:
    description: Le format uuid ne s'applique qu'à une chaîne (string, éventuellement nullable).
    severity: error
    given: "$..[?(@.format=='uuid')]"
    then:
      field: type
      function: schema
      functionOptions:
        schema:
          anyOf:
            - const: string
            - type: array
              contains: { const: string }
  socle-path-id-uuid:
    description: Un identifiant de ressource (paramètre de path de type string) devrait être un uuid.
    severity: warn
    given: "$.paths[*][get,put,post,delete,patch].parameters[?(@.in=='path')]"
    then:
      field: schema
      function: schema
      functionOptions:
        schema:
          if:
            required: [type]
            properties: { type: { const: string } }
          then:
            required: [format]
            properties: { format: { const: uuid } }

  # --- Header de réponse X-Processing-Route-Id sur chaque réponse (paths) ---
  socle-response-processing-route:
    description: Chaque réponse (paths) doit porter le header X-Processing-Route-Id.
    severity: error
    given: "$.paths[*][get,put,post,delete,patch].responses[*]"
    then:
      field: headers
      function: schema
      functionOptions:
        schema:
          type: object
          required: [X-Processing-Route-Id]
