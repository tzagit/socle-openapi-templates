# Équivalent GitHub Actions du .gitlab-ci.yml (pour le miroir GitHub).
# Reproduit les vérifications : lint des contrats + non-régression du socle (oasdiff).
name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test                  # tests unitaires (node:test)
      - run: npm run check:dictionary  # conformité au dictionnaire Estreem (avant génération)
      - run: npm run build
      - run: npm run lint        # Redocly : validité OpenAPI
      - run: npm run spectral    # Spectral : conformité au socle

  non-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install oasdiff
        run: |
          VER=1.11.7
          curl -fsSL "https://github.com/oasdiff/oasdiff/releases/download/v${VER}/oasdiff_${VER}_linux_amd64.tar.gz" \
            | sudo tar xz -C /usr/local/bin oasdiff
          oasdiff --version
      - run: npm ci
      - run: npm run check:regression
