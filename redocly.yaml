# Ruleset Redocly aligné sur les conventions du socle de templating.
# Les documents générés sont des OpenAPI 3.1 valides ; on désactive ici les règles
# "recommended" qui entrent en conflit avec des choix d'architecture assumés.
extends:
  - recommended
rules:
  # Le build tree-shake les composants : le contrat ne porte que ce qu'il utilise.
  # On peut donc exiger l'absence de composant inutilisé.
  no-unused-components: error
  # Sécurité gérée au niveau gateway ; signature des webhooks reportée (SPEC §12).
  security-defined: off
  # Un profil "events" (webhooks) n'a pas de servers : c'est le partenaire qui héberge.
  no-empty-servers: off
  # APIs internes : pas de champ license imposé.
  info-license: off
